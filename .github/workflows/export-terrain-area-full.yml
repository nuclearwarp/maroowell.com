name: Export terrain area full files

on:
  push:
    branches: ["main"]
    paths:
      - "public/export-terrain-area-trigger.txt"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build full replacement TXT files
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          out_dir = Path("exports")
          out_dir.mkdir(exist_ok=True)

          path = Path("public/zipcode_search")
          text = path.read_text(encoding="utf-8")
          text = re.sub(
            r'^      function formatTerrainArea\(value\) \{.*?^      \}',
            '''      function formatTerrainArea(value) {
        const sqm = terrainNumber(value);
        if (sqm == null || sqm < 0) return "-";
        return `${(sqm / 1000000).toLocaleString("ko-KR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        })}㎢`;
      }''',
            text,
            count=1,
            flags=re.M | re.S
          )
          old = '''          const savedTerrainArea = terrainNumber(terrain?.areaSquareMeters ?? terrain?.area_sqm);
          const areaSquareMeters = savedTerrainArea != null
            ? savedTerrainArea
            : zipAreaSquareMeters(zip);'''
          new = '''          const savedTerrainArea = terrainNumber(
            terrain?.polygonAreaM2 ??
            terrain?.polygon_area_m2 ??
            terrain?.areaSquareMeters ??
            terrain?.area_sqm
          );
          const areaSquareMeters = savedTerrainArea != null
            ? savedTerrainArea
            : zipAreaSquareMeters(zip);'''
          if old in text:
            text = text.replace(old, new, 1)
          old_set = '''          state.terrainByZip.set(zip, {
            ...data.terrain,
            cached: data.cached === true,
            areaSquareMeters: terrainNumber(state.areaByZip.get(zip)) ?? areaSquareMeters
          });'''
          new_set = '''          state.terrainByZip.set(zip, {
            ...data.terrain,
            cached: data.cached === true,
            areaSquareMeters:
              terrainNumber(
                data?.terrain?.polygonAreaM2 ??
                data?.terrain?.polygon_area_m2 ??
                data?.terrain?.areaSquareMeters ??
                data?.terrain?.area_sqm
              ) ??
              terrainNumber(state.areaByZip.get(zip)) ??
              areaSquareMeters
          });'''
          if old_set in text:
            text = text.replace(old_set, new_set, 1)
          text = text.replace("우편번호 면적", "면적")
          if "polygon_area_m2" not in text:
            raise RuntimeError("zipcode_search area mapping missing")
          (out_dir / "zipcode_search_terrain_area_full.txt").write_text(text, encoding="utf-8")

          path = Path("public/coupangRouteMap.html")
          text = path.read_text(encoding="utf-8")
          text = re.sub(
            r'^  function formatTerrainArea\(value\)\{.*?^  \}',
            '''  function formatTerrainArea(value){
    const squareMeters = Number(value);
    if (!Number.isFinite(squareMeters) || squareMeters < 0) return "-";
    return `${(squareMeters / 1000000).toLocaleString("ko-KR", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    })}㎢`;
  }''',
            text,
            count=1,
            flags=re.M | re.S
          )
          text = re.sub(
            r'^  function terrainAreaStatHtml\(pack(?:, backendAreaM2=null)?\)\{.*?^  \}',
            '''  function terrainAreaStatHtml(pack, backendAreaM2=null){
    const localAreaM2 = terrainPackAreaSquareMeters(pack);
    const areaM2 = Number.isFinite(Number(backendAreaM2)) ? Number(backendAreaM2) : localAreaM2;
    return `
      <div class="terrainStat is-area">
        <div class="terrainStatLabel">면적</div>
        <div class="terrainStatValue">${escapeHtml(formatTerrainArea(areaM2))}</div>
      </div>`;
  }''',
            text,
            count=1,
            flags=re.M | re.S
          )
          if "polygonAreaM2: terrainNumber(" not in text:
            anchor = '''      elevationRange: terrainNumber(
        terrain,
        "effectiveRange",
        "effective_range",
        "elevationRange",
        "elevation_range"
      ),
      flatPercent:'''
            insert = '''      elevationRange: terrainNumber(
        terrain,
        "effectiveRange",
        "effective_range",
        "elevationRange",
        "elevation_range"
      ),
      polygonAreaM2: terrainNumber(
        terrain,
        "polygonAreaM2",
        "polygon_area_m2",
        "areaSquareMeters",
        "area_sqm"
      ),
      flatPercent:'''
            if anchor not in text:
              raise RuntimeError("route metrics anchor missing")
            text = text.replace(anchor, insert, 1)
          success_anchor = "const metrics = terrainMetricsFromResponse(response);"
          idx = text.find(success_anchor)
          if idx < 0:
            raise RuntimeError("route success anchor missing")
          old_call = "${terrainAreaStatHtml(pack)}"
          new_call = "${terrainAreaStatHtml(pack, metrics.polygonAreaM2)}"
          call_idx = text.find(old_call, idx)
          if call_idx >= 0:
            text = text[:call_idx] + new_call + text[call_idx+len(old_call):]
          if "metrics.polygonAreaM2" not in text:
            raise RuntimeError("route area output missing")
          (out_dir / "coupangRouteMap_terrain_area_full.txt").write_text(text, encoding="utf-8")
          PY

      - name: Commit exports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/zipcode_search_terrain_area_full.txt exports/coupangRouteMap_terrain_area_full.txt
          git diff --cached --check
          git commit -m "Generate terrain area full replacement files"
          git push origin HEAD:main
