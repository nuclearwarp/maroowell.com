name: One-shot terrain area frontend patch

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/one-shot-terrain-area.yml"

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Patch terrain area display
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly 1 match, found {count}")
              return text.replace(old, new, 1)

          # ---------------------------------------------------------
          # public/zipcode_search
          # ---------------------------------------------------------
          path = Path("public/zipcode_search")
          text = path.read_text(encoding="utf-8")

          if "function formatTerrainArea(value)" not in text:
              old = '''      function formatTerrainInteger(value) {
        const n = terrainNumber(value);
        return n == null ? "-" : Math.max(0, Math.trunc(n)).toLocaleString("ko-KR");
      }

      function terrainErrorMessage(value) {'''
              new = '''      function formatTerrainInteger(value) {
        const n = terrainNumber(value);
        return n == null ? "-" : Math.max(0, Math.trunc(n)).toLocaleString("ko-KR");
      }

      function formatTerrainArea(value) {
        const n = terrainNumber(value);
        if (n == null || n < 0) return "-";
        return `${(n / 1000000).toLocaleString("ko-KR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        })}㎢`;
      }

      function terrainErrorMessage(value) {'''
              text = replace_once(text, old, new, "zipcode_search area formatter")

          if "formatTerrainArea(terrain.polygonAreaM2" not in text:
              old = '''                <div class="terrainMetric">
                  <span class="terrainMetricLabel">P10 ~ P90 표고</span>
                  <strong class="terrainMetricValue">${formatTerrainRange(terrain.p10Elevation, terrain.p90Elevation)}</strong>
                </div>
              </div>'''
              new = '''                <div class="terrainMetric">
                  <span class="terrainMetricLabel">P10 ~ P90 표고</span>
                  <strong class="terrainMetricValue">${formatTerrainRange(terrain.p10Elevation, terrain.p90Elevation)}</strong>
                </div>
                <div class="terrainMetric">
                  <span class="terrainMetricLabel">면적</span>
                  <strong class="terrainMetricValue">${formatTerrainArea(terrain.polygonAreaM2 ?? terrain.polygon_area_m2)}</strong>
                </div>
              </div>'''
              text = replace_once(text, old, new, "zipcode_search area metric")

          path.write_text(text, encoding="utf-8")

          # ---------------------------------------------------------
          # public/coupangRouteMap.html
          # ---------------------------------------------------------
          path = Path("public/coupangRouteMap.html")
          text = path.read_text(encoding="utf-8")

          if "function formatTerrainArea(value)" not in text:
              old = '''  function formatTerrainNumber(value, suffix="", digits=1){
    const number = Number(value);
    if (!Number.isFinite(number)) return "-";
    return `${number.toLocaleString("ko-KR", { maximumFractionDigits: digits })}${suffix}`;
  }

  function setTerrainStatus(message, kind="idle"){'''
              new = '''  function formatTerrainNumber(value, suffix="", digits=1){
    const number = Number(value);
    if (!Number.isFinite(number)) return "-";
    return `${number.toLocaleString("ko-KR", { maximumFractionDigits: digits })}${suffix}`;
  }

  function formatTerrainArea(value){
    const number = Number(value);
    if (!Number.isFinite(number) || number < 0) return "-";
    return `${(number / 1000000).toLocaleString("ko-KR", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    })}㎢`;
  }

  function setTerrainStatus(message, kind="idle"){'''
              text = replace_once(text, old, new, "coupangRouteMap area formatter")

          if 'polygonAreaM2: terrainNumber(terrain, "polygonAreaM2", "polygon_area_m2")' not in text:
              old = '''      elevationRange: terrainNumber(
        terrain,
        "effectiveRange",
        "effective_range",
        "elevationRange",
        "elevation_range"
      ),
      flatPercent: terrainNumber(slope, "flatPercent", "flat_percent") ?? terrainNumber(terrain, "flatPercent", "flat_percent"),'''
              new = '''      elevationRange: terrainNumber(
        terrain,
        "effectiveRange",
        "effective_range",
        "elevationRange",
        "elevation_range"
      ),
      polygonAreaM2: terrainNumber(terrain, "polygonAreaM2", "polygon_area_m2"),
      flatPercent: terrainNumber(slope, "flatPercent", "flat_percent") ?? terrainNumber(terrain, "flatPercent", "flat_percent"),'''
              text = replace_once(text, old, new, "coupangRouteMap area response mapping")

          if "formatTerrainArea(metrics.polygonAreaM2)" not in text:
              old = '''          <div class="terrainStat is-range">
            <div class="terrainStatLabel">구역 고저차</div>
            <div class="terrainStatValue">${formatTerrainNumber(metrics.elevationRange, "m")}</div>
          </div>
        </div>'''
              new = '''          <div class="terrainStat is-range">
            <div class="terrainStatLabel">구역 고저차</div>
            <div class="terrainStatValue">${formatTerrainNumber(metrics.elevationRange, "m")}</div>
          </div>
          <div class="terrainStat">
            <div class="terrainStatLabel">면적</div>
            <div class="terrainStatValue">${formatTerrainArea(metrics.polygonAreaM2)}</div>
          </div>
        </div>'''
              text = replace_once(text, old, new, "coupangRouteMap area metric")

          path.write_text(text, encoding="utf-8")

          # Basic assertions
          zip_text = Path("public/zipcode_search").read_text(encoding="utf-8")
          route_text = Path("public/coupangRouteMap.html").read_text(encoding="utf-8")
          assert "formatTerrainArea(terrain.polygonAreaM2 ?? terrain.polygon_area_m2)" in zip_text
          assert "formatTerrainArea(metrics.polygonAreaM2)" in route_text
          assert "areaPyeong" not in zip_text
          PY

      - name: Commit patched files and remove one-shot workflow
        shell: bash
        run: |
          rm -f .github/workflows/one-shot-terrain-area.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/zipcode_search public/coupangRouteMap.html .github/workflows/one-shot-terrain-area.yml
          git diff --cached --check
          git commit -m "Show terrain polygon area"
          git push origin HEAD:main
