name: Export zipcode sqm comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: write

jobs:
  export:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '/export-zipcode-sqm-final')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build full zipcode_search replacement TXT
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          text = Path('public/zipcode_search').read_text(encoding='utf-8')

          text, count = re.subn(
              r'(?ms)^\s{6}function formatTerrainArea\(value\) \{.*?^\s{6}\}',
              '''      function formatTerrainArea(value) {
        const sqm = terrainNumber(value);
        if (sqm == null || sqm < 0) return "-";
        return `${Math.round(sqm).toLocaleString("ko-KR")}㎡`;
      }''',
              text,
              count=1,
          )
          if count != 1:
              raise RuntimeError(f'formatTerrainArea matches: {count}')

          text = text.replace(
              'const savedTerrainArea = terrainNumber(terrain?.areaSquareMeters ?? terrain?.area_sqm);',
              '''const savedTerrainArea = terrainNumber(
            terrain?.polygonAreaM2 ??
            terrain?.polygon_area_m2 ??
            terrain?.areaSquareMeters ??
            terrain?.area_sqm
          );''',
              1,
          )

          text = text.replace(
              'areaSquareMeters: terrainNumber(state.areaByZip.get(zip)) ?? areaSquareMeters',
              '''areaSquareMeters:
              terrainNumber(
                data?.terrain?.polygonAreaM2 ??
                data?.terrain?.polygon_area_m2 ??
                data?.terrain?.areaSquareMeters ??
                data?.terrain?.area_sqm
              ) ??
              terrainNumber(state.areaByZip.get(zip)) ??
              areaSquareMeters''',
              1,
          )

          text = text.replace('우편번호 면적', '면적')

          formatter_start = text.find('function formatTerrainArea')
          formatter_end = text.find('function terrainErrorMessage', formatter_start)
          formatter = text[formatter_start:formatter_end]
          if '㎢' in formatter:
              raise RuntimeError('km2 remains in formatter')
          if '㎡' not in formatter:
              raise RuntimeError('sqm unit missing')
          if 'polygon_area_m2' not in text:
              raise RuntimeError('polygon area mapping missing')

          out = Path('exports')
          out.mkdir(exist_ok=True)
          target = out / 'zipcode_search_terrain_area_sqm_full.txt'
          target.write_text(text, encoding='utf-8')
          print(f'generated {target} ({len(text)} chars)')
          PY

      - name: Commit generated full TXT
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/zipcode_search_terrain_area_sqm_full.txt
          if git diff --cached --quiet; then
            echo "No generated change"
            exit 0
          fi
          git diff --cached --check
          git commit -m "Generate zipcode sqm full replacement TXT"
          git push origin HEAD:main
