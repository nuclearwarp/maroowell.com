<!doctype html>
<html lang="ko">
<head>
  <script src="/config.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="origin" />
  <title>마루웰 라우트 편집기</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />

  <style>
    :root{
      --bg:#0b1220;
      --txt:#e6eefc;
      --muted:#93a4c7;
      --line:rgba(255,255,255,.08);
      --btn:#162744;
      --btn2:#1a2f55;
      --danger:#6b1b1b;
      --ok:#1a5a3a;
      --warn:#6a4b13;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family:system-ui,-apple-system,"Noto Sans KR",Segoe UI,Roboto,Arial,sans-serif; background:#0a0f1a;}
    .wrap{display:flex;height:100%;position:relative;}

    .left{
      width:360px;
      min-width:340px;
      max-width:420px;
      background:linear-gradient(180deg,var(--bg),#070b13);
      color:var(--txt);
      border-right:1px solid var(--line);
      padding:14px 14px 10px 14px;
      overflow:auto;
    }

    .title{
      font-size:18px;
      font-weight:900;
      letter-spacing:.2px;
      margin:2px 0 10px;
      display:flex;
      align-items:center;
      gap:8px;
    }
    .title a{display:flex;align-items:center;text-decoration:none}
    .title img{width:24px;height:24px;transform:translateY(-2px);cursor:pointer}
    .titleText{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .titleSpacer{flex:1;}

    .topIconBtn{
      height:34px;
      padding:0 12px;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--txt);
      cursor:pointer;
      font-weight:900;
      font-size:12px;
      white-space:nowrap;
    }
    .topIconBtn:hover{background:rgba(255,255,255,.10)}
    .topIconBtn.danger{background:rgba(107,27,27,.35);border-color:rgba(255,60,60,.22)}
    .mobileOnly{display:none;}

    .group{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:10px;margin:10px 0;}
    .label{font-size:12px;color:var(--muted);margin:6px 0 6px;}
    .label.sectionTitle{text-align:center;font-weight:900;letter-spacing:.2px;}
    input[type="text"]{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:var(--txt);outline:none;}
    input[type="text"]:focus{border-color:rgba(255,255,255,.25)}
    .row{display:flex;gap:8px;align-items:center;}
    .row>*{flex:1}
    .btn{padding:10px;border-radius:999px;border:1px solid var(--line);background:var(--btn);color:var(--txt);cursor:pointer;font-weight:800;font-size:13px;white-space:nowrap;}
    .btn:hover{background:var(--btn2)}
    .btn.danger{background:rgba(107,27,27,.35);border-color:rgba(255,60,60,.22)}
    .btn.ok{background:rgba(26,90,58,.35);border-color:rgba(0,255,140,.18)}
    .btn.warn{background:rgba(106,75,19,.35);border-color:rgba(255,180,0,.18)}
    .sep{height:1px;background:var(--line);margin:10px 0;}
    .btnSearch{padding:10px 14px;min-width:86px;}

    .kv{border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.18);padding:6px 10px;}
    .kvRow{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:40px;}
    .kvRow + .kvRow{border-top:1px solid var(--line);}
    .kvLabel{flex:0 0 92px;height:40px;display:flex;align-items:center;font-size:12px;color:rgba(230,238,252,.72);white-space:nowrap;}
    .kvValue{flex:1;height:40px;display:flex;align-items:center;justify-content:flex-end;font-size:13px;font-weight:900;color:rgba(255,255,255,.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .pillRow{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;gap:10px;}
    .pillX{width:22px;height:22px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
    .pillX:hover{background:rgba(255,255,255,.12);}

    .logWrap{border-radius:12px;border:1px solid var(--line);overflow:hidden;background:rgba(0,0,0,.25);margin-top:10px;}
    .logHeader{padding:8px 10px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);}
    .pill{display:inline-block;padding:3px 8px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);font-size:12px;color:var(--muted);font-weight:900;}
    .log{height:170px;overflow:auto;padding:8px 10px;font-family:ui-monospace,Menlo,Monaco,Consolas,"Courier New",monospace;font-size:12px;white-space:pre-wrap;color:#d9e5ff;}

    .map{flex:1;position:relative;background:#0a0f1a;}
    #mapWrap{position:absolute;inset:0;display:flex;min-width:0;min-height:0;}
    #map,#roadview{flex:1;width:100%;height:100%;min-width:0;min-height:0;}
    #roadview{display:none;}
    #mapWrap.roadview-open #roadview{display:block;}

    .map-controls{position:absolute;top:10px;right:10px;z-index:25;display:flex;gap:8px;flex-wrap:wrap;pointer-events:auto;}
    .map-controls button{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.14);color:#fff;padding:8px 12px;border-radius:999px;cursor:pointer;font-weight:900;font-size:12px;backdrop-filter:blur(6px);}
    .map-controls .hint{padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.55);color:#cbd5e1;font-size:12px;display:none;}
    .floatingHint{position:absolute;top:10px;left:10px;z-index:20;background:rgba(0,0,0,.55);color:#fff;border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:8px 10px;font-size:12px;max-width:520px;display:none;pointer-events:none;}

    .sidebar-fab{
      display:none;
      position:absolute;
      top:10px;
      left:10px;
      z-index:30;
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      padding:8px 12px;
      border-radius:999px;
      cursor:pointer;
      font-weight:900;
      font-size:12px;
      backdrop-filter:blur(6px);
    }

    /* Modal */
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(2px);}
    .modalCard{width:min(720px, calc(100% - 40px));max-height:min(720px, calc(100% - 40px));background:linear-gradient(180deg, rgba(15,26,45,.96), rgba(8,14,26,.96));border:1px solid rgba(255,255,255,.12);border-radius:18px;box-shadow:0 22px 80px rgba(0,0,0,.55);overflow:hidden;display:flex;flex-direction:column;}
    .modalTop{padding:14px 14px 10px;border-bottom:1px solid rgba(255,255,255,.10);display:flex;gap:10px;align-items:center;justify-content:space-between;}
    .modalTitle{font-weight:900;color:#eaf2ff;letter-spacing:.2px;white-space:nowrap;}
    .miniBtn{height:36px;padding:0 14px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff;cursor:pointer;font-weight:900;font-size:13px;white-space:nowrap;}
    .modalMeta{padding:10px 14px;color:rgba(230,238,252,.70);font-size:12px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .modalBody{flex:1;overflow:auto;padding:12px 14px;}

    .resultCard{border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.16);border-radius:14px;padding:12px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;cursor:pointer;}
    .resultCard:hover{border-color:rgba(255,255,255,.18);background:rgba(0,0,0,.22);}
    .resultLeft{flex:1;min-width:0;}
    .resultTitle{font-weight:900;color:#fff;margin-bottom:6px;line-height:1.2;word-break:keep-all;}
    .resultSub{color:rgba(230,238,252,.70);font-size:12px;line-height:1.45;white-space:pre-line;}

    .createBox{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);margin-top:12px;}
    .createHead{font-weight:900;font-size:14px;letter-spacing:.2px;}
    .createDesc{margin-top:6px;color:rgba(230,238,252,.62);font-size:12px;line-height:1.4;}
    .createForm{margin-top:12px;display:grid;grid-template-columns:1fr;gap:10px;}
    @media (min-width:860px){.createForm{grid-template-columns:1fr 1fr;}}
    .createField{display:flex;flex-direction:column;gap:6px;min-width:0;}
    .createLabel{font-size:12px;color:rgba(230,238,252,.70);font-weight:900;}
    .createInput{width:100%;height:40px;padding:0 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.18);color:#fff;outline:none;}
    .createActions{margin-top:12px;display:flex;align-items:center;justify-content:flex-end;gap:10px;}
    .createBtn{height:40px;padding:0 16px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg, rgba(58,130,255,.45), rgba(58,130,255,.22));color:#fff;font-weight:900;cursor:pointer;}
    .createBtn:disabled{opacity:.55;cursor:not-allowed;}

    .waveGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;}
    .waveBtn{border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.20);color:#fff;cursor:pointer;padding:14px 12px;text-align:left;font-weight:900;}
    .waveBtn:hover{background:rgba(0,0,0,.30)}
    .waveBtn .sub{display:block;margin-top:6px;color:rgba(230,238,252,.70);font-size:12px;font-weight:800;}

    @media (max-width: 860px){
      .mobileOnly{display:inline-flex;}
      .left{
        position:absolute;
        top:0;
        left:0;
        bottom:0;
        width:min(92vw,420px);
        max-width:420px;
        min-width:0;
        transform:translateX(0);
        transition:transform .18s ease;
        z-index:120;
        box-shadow:12px 0 40px rgba(0,0,0,.35);
      }
      .wrap.sidebar-hidden .left{transform:translateX(-105%);}
      .sidebar-fab{display:inline-flex;}
      .floatingHint{top:56px;left:10px;}
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=add4ce93b38c0ff9d9b9053728e067b3&autoload=false&libraries=services"></script>
</head>

<body>
<div class="wrap">
  <div class="left">
    <div class="title">
      <a href="/index.html"><img src="/favicon.ico" alt="Maroowell" /></a>
      <span class="titleText">라우트 편집기</span>
      <span class="titleSpacer"></span>
      <button id="sidebarHideBtn" class="topIconBtn mobileOnly" type="button" title="메뉴 숨기기">⟨</button>
      <button id="logoutBtn" class="topIconBtn danger" type="button" title="로그아웃">로그아웃</button>
    </div>

    <div class="group">
      <div class="label">캠프 이름 (예: 평양1)</div>
      <input id="campInput" type="text" />
      <div class="label">라우트 코드 (예: 405A 405B)</div>
      <input id="codeInput" type="text" />
    </div>

    <div class="group">
      <div class="label sectionTitle">벤더 정보(서브라우트 단위)</div>
      <div class="kv">
        <div class="kvRow">
          <div class="kvLabel">주간 (2W)</div>
          <div class="kvValue" id="vendorWeekValue">-</div>
        </div>
        <div class="kvRow">
          <div class="kvLabel">야간 (1W)</div>
          <div class="kvValue" id="vendorNightValue">-</div>
        </div>
      </div>

      <div style="height:10px"></div>
      <div class="row" style="gap:10px;">
        <input id="vendorSearchInput" type="text" placeholder="벤더명/사업자번호 일부 입력 후 Enter" style="flex:1;" />
        <button id="vendorSearchBtn" class="btn btnSearch" type="button">검색</button>
      </div>

      <div style="height:10px"></div>
      <div class="row">
        <button id="vendorSaveBtn" class="btn ok" type="button">벤더 저장</button>
        <button id="vendorClearBtn" class="btn danger" type="button">벤더 비우기</button>
      </div>

      <div style="height:8px"></div>
      <div id="vendorPickedWrap" class="pillRow" style="display:none;margin-top:8px;">
        <div id="vendorPickedText"></div>
        <button id="vendorPickedClearBtn" class="pillX" type="button" title="선택 해제">✕</button>
      </div>
    </div>

    <div class="group">
      <div class="label sectionTitle">입차지 정보(서브라우트 단위)</div>
      <div class="row" style="gap:10px;">
        <input id="deliveryNameInput" type="text" placeholder="입차지(모바일캠프명) 검색 후 Enter" style="flex:1;" />
        <button id="deliverySearchBtn" class="btn btnSearch" type="button">검색</button>
      </div>
      <div style="height:8px"></div>
      <input id="deliveryAddrInput" type="text" placeholder="입차지 주소 (camps 테이블에서 자동 조회)" readonly />

      <div style="height:10px"></div>
      <div class="row">
        <button id="deliverySaveBtn" class="btn ok" type="button">입차지 저장</button>
        <button id="deliveryClearBtn" class="btn danger" type="button">입차지 비우기</button>
        <button id="deliveryShowBtn" class="btn" type="button">입차지 표시</button>
      </div>
    </div>

    <div class="group" id="addressListGroup" style="display:none">
      <div class="label">배송지 목록 (입차지→배송지 네비)</div>
      <div id="addressList" style="max-height:300px; overflow-y:auto; margin-top:8px;"></div>
    </div>

    <div class="group">
      <div class="row">
        <button id="loadBtn" class="btn" type="button">불러오기</button>
        <button id="drawNewBtn" class="btn warn" type="button">새로 그리기</button>
        <button id="drawAddBtn" class="btn warn" type="button">구역 추가</button>
      </div>

      <div style="height:8px"></div>
      <div class="row">
        <button id="saveBtn" class="btn ok" type="button">저장</button>
        <button id="deletePolyBtn" class="btn danger" type="button">폴리곤 삭제</button>
        <button id="vendorLabelToggleBtn" class="btn" type="button">벤더 라벨 OFF</button>
      </div>

      <div style="height:8px"></div>
      <div class="row">
        <button id="labelToggleBtn" class="btn" type="button">라우트 라벨 ON</button>
        <button id="resetBtn" class="btn" type="button">지도 초기화</button>
        <button id="addrSearchBtn" class="btn" type="button">주소검색</button>
      </div>

      <div style="height:8px"></div>
      <div class="row">
        <button id="shareBtn" class="btn ok" style="width:100%;flex:1;" type="button">🔗 공유 링크 생성</button>
      </div>

      <div class="label" style="margin-top:10px;">
        Enter 규칙: (입력값 변경됨) → 검색 / (선택 라우트 + 입력값 변경 없음) → 편집모드
      </div>
    </div>

    <div class="logWrap">
      <div class="logHeader">
        <span class="pill" id="statusPill">READY</span>
        <span class="small" id="selectedInfo">선택: 없음</span>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="map">
    <button id="sidebarFabBtn" class="sidebar-fab mobileOnly" type="button" title="메뉴">☰</button>

    <div id="mapWrap">
      <div id="map"></div>
      <div id="roadview"></div>
    </div>

    <div class="map-controls">
      <button id="toggleMapType" title="일반/위성 전환">위성</button>
      <button id="toggleRoadview" title="로드뷰 보기/종료">로드뷰</button>
      <span id="roadviewHint" class="hint">로드뷰: 지도 클릭</span>
    </div>

    <div class="floatingHint" id="hint"></div>
  </div>
</div>

<!-- 벤더 모달 -->
<div class="modal" id="vendorModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true">
    <div class="modalTop">
      <div class="modalTitle">벤더 선택</div>
      <button id="vendorModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>클릭: 선택 · ESC: 닫기</div>
      <div id="vendorMetaCount">0개</div>
    </div>
    <div class="modalBody" id="vendorResults"></div>
  </div>
</div>

<!-- 1W/2W 모달 -->
<div class="modal" id="waveModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true" style="width:min(520px, calc(100% - 40px)); max-height:none;">
    <div class="modalTop">
      <div class="modalTitle" id="waveModalTitle">저장 구분 선택</div>
      <button id="waveModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>주간/야간 중 선택</div>
      <div class="pill" id="waveModalVendorPill" style="display:none"></div>
    </div>
    <div class="waveGrid">
      <button id="wave2WBtn" class="waveBtn" type="button">주간 (2W)<span class="sub">2W로 저장</span></button>
      <button id="wave1WBtn" class="waveBtn" type="button">야간 (1W)<span class="sub">1W로 저장</span></button>
    </div>
  </div>
</div>

<!-- 입차지 모달 -->
<div class="modal" id="deliveryCampModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true">
    <div class="modalTop">
      <div class="modalTitle">입차지 선택</div>
      <button id="deliveryCampModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>클릭: 선택 · 결과 없으면 아래 “없음 등록”</div>
      <div id="deliveryCampMetaCount">0개</div>
    </div>
    <div class="modalBody" id="deliveryCampResults"></div>
  </div>
</div>

<script>
(async () => {
  "use strict";
  if (window.__mwRouteFixInit) return;
  window.__mwRouteFixInit = true;

  // Auth (Supabase) - config.js 기반
  const { SUPABASE_URL, SUPABASE_ANON_KEY, PATHS } = (window.MARUWELL_CONFIG || {});
  const LOGIN_PATH = (PATHS?.login || "/login.html");
  const authStorage = (()=>{ try { return window.sessionStorage; } catch { return null; } })();
  const mwSupabase = (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase?.createClient)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          persistSession: !!authStorage,
          storage: authStorage || undefined,
          autoRefreshToken: true,
          detectSessionInUrl: true
        }
      })
    : null;

  async function ensureLoggedIn(){
    if (!mwSupabase?.auth) return true;
    try{
      const { data: { session } } = await mwSupabase.auth.getSession();
      if (session) return true;
    }catch(e){}
    const next = location.pathname + location.search;
    location.replace(`${LOGIN_PATH}?next=${encodeURIComponent(next)}`);
    return false;
  }

  // 로그인 세션 없으면 login.html로 이동
  if (!(await ensureLoggedIn())) return;

  const API_BASE = "https://route.maroowell.com";
  const ROUTE_ENDPOINT = `${API_BASE}/route`;
  const ADDRESS_ENDPOINT = `${API_BASE}/addresses`;
  const VENDORS_ENDPOINT = `${API_BASE}/vendors`;
  const CAMPS_ENDPOINT = `${API_BASE}/camps`;

  const GOLDEN_ANGLE = 137.50776405003785;

  const $ = (id) => document.getElementById(id);
  const wrapEl = document.querySelector(".wrap");

  const logEl = $("log");
  const statusPill = $("statusPill");
  const selectedInfo = $("selectedInfo");
  const hintEl = $("hint");

  const sidebarHideBtn = $("sidebarHideBtn");
  const sidebarFabBtn = $("sidebarFabBtn");
  const logoutBtn = $("logoutBtn");
  const addrSearchBtn = $("addrSearchBtn");

  const campInput = $("campInput");
  const codeInput = $("codeInput");

  const vendorWeekValue = $("vendorWeekValue");
  const vendorNightValue = $("vendorNightValue");

  const vendorSearchInput = $("vendorSearchInput");
  const vendorSearchBtn = $("vendorSearchBtn");
  const vendorSaveBtn = $("vendorSaveBtn");
  const vendorClearBtn = $("vendorClearBtn");
  const vendorPickedWrap = $("vendorPickedWrap");
  const vendorPickedText = $("vendorPickedText");
  const vendorPickedClearBtn = $("vendorPickedClearBtn");

  const vendorModalEl = $("vendorModal");
  const vendorModalCloseBtn = $("vendorModalCloseBtn");
  const vendorMetaCountEl = $("vendorMetaCount");
  const vendorResultsEl = $("vendorResults");

  const waveModalEl = $("waveModal");
  const waveModalCloseBtn = $("waveModalCloseBtn");
  const waveModalTitleEl = $("waveModalTitle");

  function escapeHtml(s){

      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");

  async function apiGet(url){
    const r = await fetch(url, { method:"GET" });
    const t = await r.text();
    let j=null; try{ j = t ? JSON.parse(t):null; }catch{}
    if (!r.ok) throw new Error(j?.error || j?.message || t || `HTTP ${r.status}`);
    return j;
  }
  async function apiJson(method, url, body){
    const r = await fetch(url, {
      method,
      headers: {"Content-Type":"application/json"},
      body: body ? JSON.stringify(body) : undefined
    });
    const t = await r.text();
    let j=null; try{ j = t ? JSON.parse(t):null; }catch{}
    if (!r.ok) throw new Error(j?.error || j?.message || t || `HTTP ${r.status}`);
    return j;
  }

  function openModal(el){ el.style.display="flex"; el.setAttribute("aria-hidden","false"); }

  // 어떤 비알파뉴메릭 구분자든 토큰 분리
  function parseCodes(raw){
    return String(raw || "")
      .trim()
      .split(/[^0-9a-zA-Z]+/g)
      .map(s=>s.trim())
      .filter(Boolean);
  }

  function hash32(str){
    str = String(str||"");
    let h = 2166136261;
    for (let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h>>>0;
  }
  function colorByIndex(i, startHue){
    const hue = (startHue + i * GOLDEN_ANGLE) % 360;
    const sat = 58 + (i % 6) * 2;
    const light = 52 + (i % 5);
    return `hsl(${hue.toFixed(1)} ${sat}% ${light}%)`;
  }
  function assignColors(rows){
    const camp = campInput.value.trim();
    const startHue = hash32(camp) % 360;
    const keyOf = (r)=> String(r?.full_code || r?.code || "").trim();
    const keys = Array.from(new Set(rows.map(keyOf).filter(Boolean)))
      .sort((a,b)=> a.localeCompare(b,"en",{numeric:true,sensitivity:"base"}));
    const cmap = new Map();
    keys.forEach((k, idx)=> cmap.set(k, colorByIndex(idx, startHue)));
    rows.forEach(r=>{ r.__color = cmap.get(keyOf(r)) || colorByIndex(0, startHue); });
  }

  function parsePolygonWgs84(v){
    if (!v) return null;
    if (Array.isArray(v)) return v;
    if (typeof v === "string"){
      try{ const p = JSON.parse(v); return Array.isArray(p) ? p : null; }catch{ return null; }
    }
    return null;
  }
  function normalizeRings(p){
    if (!Array.isArray(p) || p.length === 0) return [];
    const f = p[0];
    if (Array.isArray(f) && f.length >= 2 && typeof f[0] === "number") return [p];
    if (Array.isArray(f) && Array.isArray(f[0])) return p;
    return [];
  }
  function ringToLatLngs(ring){
    return ring.map(pt => Array.isArray(pt) && pt.length>=2 ? new kakao.maps.LatLng(pt[1], pt[0]) : null).filter(Boolean);
  }
  function centroid(latlngs){
    let lat=0,lng=0;
    for (const ll of latlngs){ lat += ll.getLat(); lng += ll.getLng(); }
    return new kakao.maps.LatLng(lat/latlngs.length, lng/latlngs.length);
  }
  // Kakao Maps Polygon.getPath() 는 Array.<LatLng> (Google MVCArray 아님)
  function polygonPathToArray(polygon){
    const raw = polygon?.getPath?.();
    if (!raw) return [];
    if (Array.isArray(raw)) return raw;
    if (typeof raw.getLength === "function" && typeof raw.getAt === "function"){
      const arr = [];
      for (let i=0; i<raw.getLength(); i++) arr.push(raw.getAt(i));
      return arr;
    }
    return [];
  }

  // UI 개선: 편집/그리기 점(dot) MarkerImage
  let __mwDotEditImg = null;
  let __mwDotDrawImg = null;
  function makeDotMarkerImage({ size=12, fill="#ffffff", stroke="#0b1220", strokeWidth=2 } = {}){
    const s = Number(size) || 12;
    const cx = s / 2;
    const r = Math.max(1, cx - strokeWidth / 2);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
      <circle cx="${cx}" cy="${cx}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${strokeWidth}"/>
    </svg>`;
    const uri = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    return new kakao.maps.MarkerImage(uri, new kakao.maps.Size(s, s), { offset: new kakao.maps.Point(cx, cx) });
  }
  function editDotImage(){
    if (!__mwDotEditImg) __mwDotEditImg = makeDotMarkerImage({ size: 12, fill: "rgba(255,255,255,0.95)", stroke: "#0b1220", strokeWidth: 2 });
    return __mwDotEditImg;
  }
  function drawDotImage(){
    if (!__mwDotDrawImg) __mwDotDrawImg = makeDotMarkerImage({ size: 10, fill: "#00C2FF", stroke: "#0b1220", strokeWidth: 2 });
    return __mwDotDrawImg;
  }

  function rebuildLabelsFor(id){
    const pack = overlayById.get(id);
    if (!pack) return;
    (pack.labels||[]).forEach(l=>l.setMap(null));
    pack.labels = [];
    if (!routeLabelOn && !vendorLabelOn) return;
    for (const poly of pack.polygons){
      const pts = polygonPathToArray(poly);
      if (pts.length < 3) continue;
      const lb = makeLabelOverlay(pack.row, centroid(pts));
      lb.setMap(map);
      pack.labels.push(lb);
    }
  }
  function rebuildAllLabels(){ for (const id of overlayById.keys()) rebuildLabelsFor(id); }
  function refreshLabelToggleText(){
    labelToggleBtn.textContent = routeLabelOn ? "라우트 라벨 ON" : "라우트 라벨 OFF";

  function stopEditMode(){
    editMarkers.forEach(m=>m.setMap(null));
    editMarkers=[];
    editing=false;
  }

  function enterEditMode(){
    if (!selectedRouteId){ setStatus("선택된 라우트가 없습니다.", "WARN"); return; }
    const pack = overlayById.get(selectedRouteId);
    if (!pack || !pack.polygons.length){ setStatus("편집할 폴리곤이 없습니다.", "WARN"); return; }

    stopEditMode();
    editing=true;

    for (const poly of pack.polygons){
      const path = polygonPathToArray(poly);
      const len = path.length;
      for (let i=0;i<len;i++){
        const mk = new kakao.maps.Marker({ position: path[i], draggable: true, image: editDotImage(), zIndex: 100 });
        mk.setMap(map);
        kakao.maps.event.addListener(mk, "dragend", () => {
          const p = polygonPathToArray(poly).slice();
          p[i] = mk.getPosition();
          poly.setPath(p);
          rebuildLabelsFor(selectedRouteId);
        });
        kakao.maps.event.addListener(mk, "rightclick", () => {
          const p = polygonPathToArray(poly).slice();
          if (p.length <= 3){ setStatus("점 삭제 불가(최소 3점)", "WARN"); return; }
          p.splice(i, 1);
          poly.setPath(p);
          enterEditMode();
        });
        editMarkers.push(mk);
      }
    }
    setStatus("편집모드: 꼭짓점 드래그(우클릭=점삭제) · Enter=저장 · ESC=종료", "OK");
  }

  function stopDrawMode(resetHint){
    drawMode=null;
    drawPoints=[];
    drawPointMarkers.forEach(m=>m.setMap(null));
    drawPointMarkers=[];
    if (drawLine){ drawLine.setMap(null); drawLine=null; }
    if (resetHint) hint("", false);
  }

  function beginDraw(mode){
    if (!selectedRouteId){ setStatus("먼저 라우트를 선택하세요.", "WARN"); return; }
    stopEditMode();
    stopDrawMode(true);
    drawMode=mode;
    drawPoints=[];
    drawLine = new kakao.maps.Polyline({
      path: [],
      strokeWeight: 2,
      strokeColor: "#00C2FF",
      strokeOpacity: 0.9,
      strokeStyle: "shortdash"
    });
    drawLine.setMap(map);
    hint("그리기: 지도 클릭 점추가 · Enter 완료 · 우클릭 마지막 점 취소 · ESC 취소", true);
    setStatus(mode==="new" ? "새로 그리기 시작" : "구역 추가 시작", "OK");

    // 모바일이면 작업 시작 시 사이드바를 자동으로 숨김(지도를 넓게)
    if (mqMobile.matches) setSidebarHidden(true);

  // 선택된 라우트 없이도 새로 그리기/구역 추가가 동작하도록 입력 기반 자동 선택/자동 로드
  function normalizeCodeKey(s){ return String(s||"").trim().toUpperCase(); }
  function findRouteIdByCampAndCodeExact(camp, code){
    const tCamp = String(camp||"").trim();
    const tCode = normalizeCodeKey(code);
    for (const [id, pack] of overlayById.entries()){
      const r = pack?.row;
      if (!r) continue;
      const rCamp = String(r.camp||"").trim();
      const rCode = normalizeCodeKey(r.full_code || r.code);
      if (rCamp === tCamp && rCode === tCode) return id;
    }
    return null;
  }
  async function ensureSelectedRouteFromInputsForDraw(){
    if (selectedRouteId) return true;
    const camp = campInput.value.trim();
    const codes = parseCodes(codeInput.value);

    if (!camp){ setStatus("캠프를 입력하세요.", "WARN"); campInput.focus(); return false; }
    if (codes.length === 0){ setStatus("라우트 코드를 입력하세요.", "WARN"); codeInput.focus(); return false; }
    if (codes.length > 1){ setStatus("새로 그리기/구역 추가는 라우트 코드를 1개만 입력하세요.", "WARN"); return false; }

    const code = codes[0];

    const found = findRouteIdByCampAndCodeExact(camp, code);
    if (found){ selectRoute(found); return true; }

    try{
      setStatus("라우트 자동 불러오기...", "OK");
      await loadRoutes();
    }catch(e){
      setStatus("라우트 자동 불러오기 실패: " + e.message, "ERR");
      return false;
    }

    const found2 = findRouteIdByCampAndCodeExact(camp, code);
    if (found2){ selectRoute(found2); return true; }

    if (overlayById.size === 1){
      const onlyId = overlayById.keys().next().value;
      if (onlyId){ selectRoute(onlyId); return true; }
    }

    setStatus(`선택할 라우트를 찾지 못했습니다. code=${code}`, "WARN");
    return false;
  }

  function addDrawPoint(latlng){
    drawPoints.push(latlng);
    const mk = new kakao.maps.Marker({ position: latlng, image: drawDotImage(), zIndex: 200 });

  function popDrawPoint(){
    if (!drawPoints.length) return;
    drawPoints.pop();
    const mk = drawPointMarkers.pop();
    if (mk) mk.setMap(null);

  }
  function finishDraw(){
    if (!selectedRouteId) return;
    if (drawPoints.length < 3){ setStatus("점이 3개 이상 필요", "WARN"); return; }
    const pack = overlayById.get(selectedRouteId);
    if (!pack) return;

    const poly = new kakao.maps.Polygon({
      path: drawPoints.slice(),
      strokeWeight: 1,
      strokeColor: pack.row.__color,
      strokeOpacity: 1.0,
      fillColor: pack.row.__color,
      fillOpacity: 0.22,
      zIndex: 5
    });
    poly.setMap(map);
    kakao.maps.event.addListener(poly, "click", ()=>{ if (!drawMode && !roadviewOn) selectRoute(selectedRouteId); });

    if (drawMode === "new"){
      pack.polygons.forEach(p=>p.setMap(null));
      pack.polygons=[poly];
    } else {
      pack.polygons.push(poly);
    }
    stopDrawMode(true);
    rebuildLabelsFor(selectedRouteId);
    setStatus("폴리곤 생성 완료(저장 버튼으로 서버 반영)", "OK");
  }

  function clearOverlays(){

  function selectRoute(id){
    const pack = overlayById.get(id);
    if (!pack) return;
    selectedRouteId=id;

    stopEditMode();
    stopDrawMode(true);
    highlightSelection();

    campInput.value = String(pack.row.camp || "").trim();

    selectedInfo.textContent = `선택: ${campInput.value} / ${codeInput.value} (id=${id})`;
    setStatus("라우트 선택됨 (Enter=편집모드)", "OK");

    addressList.innerHTML = "";

  async function loadRoutes(){
    stopEditMode();
    stopDrawMode(true);

    const camp = campInput.value.trim();
    if (!camp){ setStatus("camp가 비었습니다.", "ERR"); return; }

    const codes = parseCodes(codeInput.value);
    setStatus("라우트 조회 중...", "OK");

    const all=[];
    const seen=new Set();

    async function fetchOne(prefix){
      const url = new URL(ROUTE_ENDPOINT);
      url.searchParams.set("camp", camp);
      url.searchParams.set("mode", "prefix");
      if (prefix) url.searchParams.set("code", prefix);
      const data = await apiGet(url.toString());
      (data?.rows || []).forEach(r=>{
        const id = r.id ?? `${r.camp||""}/${r.full_code||r.code||""}`;
        if (seen.has(id)) return;
        seen.add(id);
        all.push(r);
      });
    }

    if (codes.length === 0) await fetchOne("");
    else for (const c of codes){ try{ await fetchOne(c); }catch(e){ log(`조회 실패(${c}): ${e.message}`); } }

    clearOverlays();
    routeRows = all;

    if (!routeRows.length){ setStatus("조회된 라우트가 없습니다.", "WARN"); return; }

    assignColors(routeRows);

    const bounds = new kakao.maps.LatLngBounds();
    let any=false;
    for (const row of routeRows){
      const id = row.id ?? `${row.camp||""}/${row.full_code||row.code||""}`;
      const color = row.__color;

      const polyRaw = parsePolygonWgs84(row.polygon_wgs84);
      const rings = normalizeRings(polyRaw);

      const pack = { row, polygons: [], labels: [] };

      for (const ring of rings){
        const latlngs = ringToLatLngs(ring);
        if (latlngs.length < 3) continue;

        const polygon = new kakao.maps.Polygon({
          path: latlngs,
          strokeWeight: 1,
          strokeColor: color,
          strokeOpacity: 1.0,
          fillColor: color,
          fillOpacity: 0.22,
          zIndex: 1
        });
        polygon.setMap(map);
        kakao.maps.event.addListener(polygon, "click", ()=>{ if (!roadviewOn && !drawMode) selectRoute(id); });

        pack.polygons.push(polygon);
        any=true;
        latlngs.forEach(ll=>bounds.extend(ll));
      }

      overlayById.set(id, pack);
    }

    if (any) map.setBounds(bounds);
    rebuildAllLabels();

    campDirty=false; codeDirty=false;
    setStatus(`로드 완료: ${routeRows.length}개`, "OK");
    if (mqMobile.matches) setSidebarHidden(true);
  }

  function polygonsToWgs84(polygons){
    const out=[];
    for (const p of polygons){
      const path = polygonPathToArray(p);
      const ring=[];
      for (let i=0;i<path.length;i++){
        const ll = path[i];
        ring.push([ll.getLng(), ll.getLat()]);
      }
      if (ring.length>=3) out.push(ring);
    }
    return out.length ? out : null;
  }

  function kstYYYYMMDDHHMM(){
    const now = new Date();
    const kst = new Date(now.getTime() + 9*60*60*1000);
    const yyyy = String(kst.getUTCFullYear());
    const mm = String(kst.getUTCMonth()+1).padStart(2,"0");
    const dd = String(kst.getUTCDate()).padStart(2,"0");
    const HH = String(kst.getUTCHours()).padStart(2,"0");
    const MM = String(kst.getUTCMinutes()).padStart(2,"0");
    return `${yyyy}${mm}${dd}${HH}${MM}`;
  }

  let deliveryPinMarker=null;
  function inferLoadedDeliveryIfUnique(){
    const addrSet = new Set();
    const nameSet = new Set();
    for (const pack of overlayById.values()){
      const a = String(pack?.row?.delivery_location_address || "").trim();
      if (a) addrSet.add(a);
      const n = String(pack?.row?.delivery_location_name || "").trim();
      if (n) nameSet.add(n);
    }
    if (addrSet.size === 1){
      return { address: Array.from(addrSet)[0], name: nameSet.size === 1 ? Array.from(nameSet)[0] : "" };
    }
    return null;
  }

  function showDeliveryPin(){
    let addr = deliveryAddrInput.value.trim();
    if (!addr){
      const inferred = inferLoadedDeliveryIfUnique();
      if (inferred?.address){
        addr = inferred.address;
        deliveryAddrInput.value = addr;
        if (!deliveryNameInput.value.trim() && inferred.name) deliveryNameInput.value = inferred.name;
      }
    }
    if (!addr){
      setStatus("입차지 주소가 없습니다. (노선 선택 또는, 불러온 라우트들이 동일 입차지를 가져야 합니다.)","WARN");
      return;
    }
    geocoder.addressSearch(addr, (res, st)=>{
      if (st !== kakao.maps.services.Status.OK || !res?.length){ setStatus("입차지 주소를 찾을 수 없습니다.","ERR"); return; }
      const pos = new kakao.maps.LatLng(Number(res[0].y), Number(res[0].x));
      if (deliveryPinMarker) deliveryPinMarker.setMap(null);
      deliveryPinMarker = new kakao.maps.Marker({ position: pos, zIndex: 999 });
      deliveryPinMarker.setMap(map);
      map.panTo(pos);
      setStatus("입차지 표시 완료","OK");
    });
  }

    if (canEdit){

      const modalWasOpen =
        (vendorModalEl.style.display==="flex") ||
        (waveModalEl.style.display==="flex") ||
        (deliveryCampModalEl.style.display==="flex");
      if (vendorModalEl.style.display==="flex") closeModal(vendorModalEl);
      if (waveModalEl.style.display==="flex") closeModal(waveModalEl);
      if (deliveryCampModalEl.style.display==="flex") closeModal(deliveryCampModalEl);
      if (modalWasOpen) return;

      if (drawMode){ stopDrawMode(true); setStatus("그리기 취소","OK"); return; }
      if (editing){ stopEditMode(); setStatus("편집 종료(선택 유지)","OK"); return; }
      if (selectedRouteId){ clearSelection(); return; }
      return;
    }

    if (e.key !== "Enter") return;
    if (isTypingInInput()) return;

    if (drawMode){ e.preventDefault(); finishDraw(); return; }
    if (!selectedRouteId) return;
    e.preventDefault();
    if (editing) saveCurrent().catch(err=>setStatus(err.message,"ERR"));

    setStatus("초기화 완료","OK");
  });
  shareBtn.addEventListener("click", generateShareLink);

  vendorSearchInput.addEventListener("keydown",(e)=>{ if(!e.isComposing && e.key==="Enter"){ e.preventDefault(); runVendorSearch(); }});
  vendorSearchBtn.addEventListener("click", runVendorSearch);
  vendorPickedClearBtn.addEventListener("click", ()=> setVendorCandidate(null));
  vendorSaveBtn.addEventListener("click", ()=> { if(!vendorCandidate){ setStatus("벤더를 먼저 검색/선택하세요.","WARN"); return; } openWaveModal("save"); });
  vendorClearBtn.addEventListener("click", ()=> openWaveModal("clear"));
  vendorModalCloseBtn.addEventListener("click", ()=> closeModal(vendorModalEl));
  waveModalCloseBtn.addEventListener("click", ()=> closeModal(waveModalEl));
  wave1WBtn.addEventListener("click", async ()=>{ closeModal(waveModalEl); await saveVendorWave("1W", waveAction==="clear"); });
  wave2WBtn.addEventListener("click", async ()=>{ closeModal(waveModalEl); await saveVendorWave("2W", waveAction==="clear"); });

  deliveryNameInput.addEventListener("keydown",(e)=>{ if(!e.isComposing && e.key==="Enter"){ e.preventDefault(); runCampSearch(); }});
  deliverySearchBtn.addEventListener("click", runCampSearch);
  deliveryCampModalCloseBtn.addEventListener("click", ()=> closeModal(deliveryCampModalEl));
  deliverySaveBtn.addEventListener("click", ()=> saveDelivery(false).catch(err=>setStatus(err.message,"ERR")));
  deliveryClearBtn.addEventListener("click", ()=> saveDelivery(true).catch(err=>setStatus(err.message,"ERR")));
  deliveryShowBtn.addEventListener("click", showDeliveryPin);

  kakao.maps.load(()=> {
    map = new kakao.maps.Map($("map"), { center: new kakao.maps.LatLng(37.5665,126.9780), level: 7 });
    geocoder = new kakao.maps.services.Geocoder();

    let isSatellite=false;
    toggleMapTypeBtn.addEventListener("click", ()=> {
      isSatellite=!isSatellite;
      map.setMapTypeId(isSatellite ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);
      toggleMapTypeBtn.textContent = isSatellite ? "일반" : "위성";
    });

    function ensureRoadview(){
      if (roadview && roadviewClient) return;
      roadview = new kakao.maps.Roadview($("roadview"));
      roadviewClient = new kakao.maps.RoadviewClient();
    }
    function setRoadviewAt(latlng){
      ensureRoadview();
      roadviewClient.getNearestPanoId(latlng, 200, (panoId)=>{
        if (!panoId){ alert("근처 로드뷰가 없습니다."); return; }
        mapWrapEl.classList.add("roadview-open");
        roadview.setPanoId(panoId, latlng);
        roadviewHintEl.style.display = "none";
      });
    }
    let rvClick=null;
    function setRoadviewOn(on){
      roadviewOn=!!on;
      toggleRoadviewBtn.textContent = roadviewOn ? "로드뷰 종료" : "로드뷰";
      roadviewHintEl.style.display = roadviewOn ? "inline-flex" : "none";
      if (!roadviewOn){
        mapWrapEl.classList.remove("roadview-open");
        if (rvClick) kakao.maps.event.removeListener(map, "click", rvClick);
        rvClick=null;
        return;
      }
      rvClick = (e)=> e?.latLng && setRoadviewAt(e.latLng);
      kakao.maps.event.addListener(map, "click", rvClick);
    }
    toggleRoadviewBtn.addEventListener("click", ()=> setRoadviewOn(!roadviewOn));

    kakao.maps.event.addListener(map, "click", (e)=>{ if (drawMode) addDrawPoint(e.latLng); });
    kakao.maps.event.addListener(map, "rightclick", ()=>{ if (drawMode) popDrawPoint(); });

    setStatus("지도 로드 완료", "OK");
  });

})();
</script>
</body>
</html>
