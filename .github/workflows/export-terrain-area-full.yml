name: Export terrain area full files

on:
  push:
    branches: ["main"]
    paths:
      - "public/export-terrain-area-trigger.txt"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Build full replacement TXT files
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected exactly 1 match, found {count}")
              return text.replace(old, new, 1)

          out_dir = Path("exports")
          out_dir.mkdir(exist_ok=True)

          # =========================================================
          # zipcode_search
          # =========================================================
          text = Path("public/zipcode_search").read_text(encoding="utf-8")

          old = '''      function formatTerrainArea(value) {
        const sqm = terrainNumber(value);
        if (sqm == null) return "경계 로드 후 계산";

        const safeSqm = Math.max(0, sqm);
        const sqmText = `${Math.round(safeSqm).toLocaleString("ko-KR")}㎡`;

        if (safeSqm < 10000) return sqmText;

        const squareKm = safeSqm / 1000000;
        const kmText = squareKm.toLocaleString("ko-KR", {
          minimumFractionDigits: squareKm < 1 ? 3 : 2,
          maximumFractionDigits: squareKm < 1 ? 3 : 2
        });

        return `${kmText}㎢ · ${sqmText}`;
      }'''
          new = '''      function formatTerrainArea(value) {
        const sqm = terrainNumber(value);
        if (sqm == null || sqm < 0) return "-";

        return `${(sqm / 1000000).toLocaleString("ko-KR", {
          minimumFractionDigits: 0,
          maximumFractionDigits: 2
        })}㎢`;
      }'''
          text = replace_once(text, old, new, "zipcode_search formatTerrainArea")

          old = '''          const savedTerrainArea = terrainNumber(terrain?.areaSquareMeters ?? terrain?.area_sqm);
          const areaSquareMeters = savedTerrainArea != null
            ? savedTerrainArea
            : zipAreaSquareMeters(zip);'''
          new = '''          const savedTerrainArea = terrainNumber(
            terrain?.polygonAreaM2 ??
            terrain?.polygon_area_m2 ??
            terrain?.areaSquareMeters ??
            terrain?.area_sqm
          );
          const areaSquareMeters = savedTerrainArea != null
            ? savedTerrainArea
            : zipAreaSquareMeters(zip);'''
          text = replace_once(text, old, new, "zipcode_search DB area mapping")

          text = text.replace(
              '<span class="terrainMetricLabel">우편번호 면적</span>',
              '<span class="terrainMetricLabel">면적</span>'
          )

          if 'terrain?.polygon_area_m2' not in text:
              raise RuntimeError("zipcode_search polygon_area_m2 mapping missing")
          if '우편번호 면적' in text:
              raise RuntimeError("zipcode_search old area label remains")

          Path("exports/zipcode_search_terrain_area_full.txt").write_text(text, encoding="utf-8")

          # =========================================================
          # coupangRouteMap.html
          # =========================================================
          text = Path("public/coupangRouteMap.html").read_text(encoding="utf-8")

          old = '''  function formatTerrainArea(value){
    const squareMeters = Number(value);
    if (!Number.isFinite(squareMeters) || squareMeters < 0) return "폴리곤 로드 후 계산";

    const safeSquareMeters = Math.max(0, squareMeters);
    const squareMetersText = `${Math.round(safeSquareMeters).toLocaleString("ko-KR")}㎡`;
    if (safeSquareMeters < 10000) return squareMetersText;

    const squareKilometers = safeSquareMeters / 1000000;
    const squareKilometersText = squareKilometers.toLocaleString("ko-KR", {
      minimumFractionDigits: squareKilometers < 1 ? 3 : 2,
      maximumFractionDigits: squareKilometers < 1 ? 3 : 2
    });
    return `${squareKilometersText}㎢ · ${squareMetersText}`;
  }

  function terrainAreaStatHtml(pack){
    return `
      <div class="terrainStat is-area">
        <div class="terrainStatLabel">구역 면적</div>
        <div class="terrainStatValue">${escapeHtml(formatTerrainArea(terrainPackAreaSquareMeters(pack)))}</div>
      </div>`;
  }'''
          new = '''  function formatTerrainArea(value){
    const squareMeters = Number(value);
    if (!Number.isFinite(squareMeters) || squareMeters < 0) return "-";

    return `${(squareMeters / 1000000).toLocaleString("ko-KR", {
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    })}㎢`;
  }

  function terrainAreaStatHtml(pack, backendAreaM2=null){
    const localAreaM2 = terrainPackAreaSquareMeters(pack);
    const areaM2 = Number.isFinite(Number(backendAreaM2))
      ? Number(backendAreaM2)
      : localAreaM2;

    return `
      <div class="terrainStat is-area">
        <div class="terrainStatLabel">면적</div>
        <div class="terrainStatValue">${escapeHtml(formatTerrainArea(areaM2))}</div>
      </div>`;
  }'''
          text = replace_once(text, old, new, "coupangRouteMap area formatter")

          old = '''      elevationRange: terrainNumber(
        terrain,
        "effectiveRange",
        "effective_range",
        "elevationRange",
        "elevation_range"
      ),
      flatPercent: terrainNumber(slope, "flatPercent", "flat_percent") ?? terrainNumber(terrain, "flatPercent", "flat_percent"),'''
          new = '''      elevationRange: terrainNumber(
        terrain,
        "effectiveRange",
        "effective_range",
        "elevationRange",
        "elevation_range"
      ),
      polygonAreaM2: terrainNumber(
        terrain,
        "polygonAreaM2",
        "polygon_area_m2",
        "areaSquareMeters",
        "area_sqm"
      ),
      flatPercent: terrainNumber(slope, "flatPercent", "flat_percent") ?? terrainNumber(terrain, "flatPercent", "flat_percent"),'''
          text = replace_once(text, old, new, "coupangRouteMap DB area mapping")

          old = '''        <div class="terrainStatsGrid">
          ${terrainAreaStatHtml(pack)}
          <div class="terrainStat">'''
          new = '''        <div class="terrainStatsGrid">
          ${terrainAreaStatHtml(pack, metrics.polygonAreaM2)}
          <div class="terrainStat">'''
          text = replace_once(text, old, new, "coupangRouteMap success area value")

          if 'metrics.polygonAreaM2' not in text:
              raise RuntimeError("coupangRouteMap polygon area output missing")
          if '<div class="terrainStatLabel">구역 면적</div>' in text:
              raise RuntimeError("coupangRouteMap old area label remains")

          Path("exports/coupangRouteMap_terrain_area_full.txt").write_text(text, encoding="utf-8")
          PY

      - name: Commit exported TXT files
        shell: bash
        run: |
          rm -f public/export-terrain-area-trigger.txt
          rm -f .github/workflows/export-terrain-area-full.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exports/zipcode_search_terrain_area_full.txt exports/coupangRouteMap_terrain_area_full.txt public/export-terrain-area-trigger.txt .github/workflows/export-terrain-area-full.yml
          git diff --cached --check
          git commit -m "Export terrain area full replacement files"
          git push origin HEAD:main
