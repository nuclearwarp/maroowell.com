name: Deploy cleansing history worker

on:
  push:
    branches: ["main"]
    paths:
      - "cleansing_history_worker.js"
      - "cleansing-history-wrangler.toml"
      - ".github/workflows/deploy-cleansing-history-worker.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy cleansing history API worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "3"
          command: deploy --config cleansing-history-wrangler.toml
