<!doctype html>
<html lang="ko">
<head>
  <script src="/config.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="origin" />
  <title>마루웰 라우트 편집기</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2d;
      --txt:#e6eefc;
      --muted:#93a4c7;
      --line:rgba(255,255,255,.08);
      --btn:#162744;
      --btn2:#1a2f55;
      --danger:#6b1b1b;
      --ok:#1a5a3a;
      --warn:#6a4b13;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,"Noto Sans KR",Segoe UI,Roboto,Arial,sans-serif;background:#0a0f1a;}
    .wrap{display:flex;height:100%;}
    .left{width:360px;min-width:340px;max-width:420px;background:linear-gradient(180deg,var(--bg),#070b13);color:var(--txt);border-right:1px solid var(--line);padding:14px;overflow:auto;}
    .title{font-size:18px;font-weight:900;margin:2px 0 10px;display:flex;align-items:center;gap:8px;}
    .title a{display:flex;align-items:center;text-decoration:none}
    .title img{width:24px;height:24px;transform:translateY(-2px);cursor:pointer}
    .group{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;padding:10px;margin:10px 0;}
    .label{font-size:12px;color:var(--muted);margin:6px 0 6px;}
    .label.sectionTitle{text-align:center;font-weight:900;}
    input[type="text"]{width:100%;padding:10px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.25);color:var(--txt);outline:none;}
    .row{display:flex;gap:8px;align-items:center;}
    .row>*{flex:1}
    .btn{padding:10px;border-radius:999px;border:1px solid var(--line);background:var(--btn);color:var(--txt);cursor:pointer;font-weight:800;font-size:13px;white-space:nowrap;}
    .btn:hover{background:var(--btn2)}
    .btn.danger{background:rgba(107,27,27,.35);border-color:rgba(255,60,60,.22)}
    .btn.ok{background:rgba(26,90,58,.35);border-color:rgba(0,255,140,.18)}
    .btn.warn{background:rgba(106,75,19,.35);border-color:rgba(255,180,0,.18)}
    .sep{height:1px;background:var(--line);margin:10px 0;}
    .kv{border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.18);padding:6px 10px;}
    .kvRow{display:flex;align-items:center;justify-content:space-between;gap:10px;min-height:40px;}
    .kvRow + .kvRow{border-top:1px solid var(--line);}
    .kvLabel{flex:0 0 92px;height:40px;display:flex;align-items:center;font-size:12px;color:rgba(230,238,252,.72);white-space:nowrap;}
    .kvValue{flex:1;height:40px;display:flex;align-items:center;justify-content:flex-end;font-size:13px;font-weight:900;color:rgba(255,255,255,.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .btnSearch{padding:10px 14px;min-width:86px;}
    .pillRow{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);font-size:12px;gap:10px;}
    .pillX{width:22px;height:22px;border-radius:999px;border:1px solid var(--line);background:rgba(255,255,255,.06);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;}
    .map{flex:1;position:relative;background:#0a0f1a;}
    #mapWrap{position:absolute;inset:0;display:flex;min-width:0;min-height:0;}
    #map,#roadview{flex:1;width:100%;height:100%;}
    #roadview{display:none;}
    #mapWrap.roadview-open #roadview{display:block;}
    .map-controls{position:absolute;top:10px;right:10px;z-index:25;display:flex;gap:8px;flex-wrap:wrap;}
    .map-controls button{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.14);color:#fff;padding:8px 12px;border-radius:999px;cursor:pointer;font-weight:900;font-size:12px;}
    .map-controls .hint{padding:8px 10px;border-radius:10px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.55);color:#cbd5e1;font-size:12px;display:none;}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center;z-index:2000;backdrop-filter:blur(2px);}
    .modalCard{width:min(720px, calc(100% - 40px));max-height:min(720px, calc(100% - 40px));background:linear-gradient(180deg, rgba(15,26,45,.96), rgba(8,14,26,.96));border:1px solid rgba(255,255,255,.12);border-radius:18px;overflow:hidden;display:flex;flex-direction:column;}
    .modalTop{padding:14px;border-bottom:1px solid rgba(255,255,255,.10);display:flex;gap:10px;align-items:center;justify-content:space-between;}
    .modalTitle{font-weight:900;color:#eaf2ff;white-space:nowrap;}
    .miniBtn{height:36px;padding:0 14px;border-radius:999px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.25);color:#fff;cursor:pointer;font-weight:900;font-size:13px;}
    .modalMeta{padding:10px 14px;color:rgba(230,238,252,.70);font-size:12px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center;gap:10px;}
    .modalBody{flex:1;overflow:auto;padding:12px 14px;}
    .resultCard{border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.16);border-radius:14px;padding:12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
    .resultLeft{flex:1;min-width:0;}
    .resultTitle{font-weight:900;color:#fff;margin-bottom:6px;line-height:1.2;word-break:keep-all;}
    .resultSub{color:rgba(230,238,252,.70);font-size:12px;line-height:1.45;white-space:pre-line;}
    .tagPill{flex:0 0 auto;margin-left:10px;padding:6px 10px;border-radius:999px;border:1px solid rgba(255,255,255,.14);color:rgba(230,238,252,.85);font-weight:900;font-size:12px;background:rgba(255,255,255,.04);white-space:nowrap;}
    .emptyMsg{padding:10px 6px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-weight:900;font-size:13px;}
    .createBox{padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.04);margin-top:12px;}
    .createHead{font-weight:900;font-size:14px;}
    .createDesc{margin-top:6px;color:rgba(230,238,252,.62);font-size:12px;line-height:1.4;}
    .createForm{margin-top:12px;display:grid;grid-template-columns:1fr;gap:10px;}
    .createField{display:flex;flex-direction:column;gap:6px;}
    .createLabel{font-size:12px;color:rgba(230,238,252,.70);font-weight:900;}
    .createInput{width:100%;height:40px;padding:0 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.18);color:#fff;outline:none;}
    .createActions{margin-top:12px;display:flex;align-items:center;justify-content:flex-end;gap:10px;}
    .createBtn{height:40px;padding:0 16px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:linear-gradient(180deg, rgba(58,130,255,.45), rgba(58,130,255,.22));color:#fff;font-weight:900;cursor:pointer;}
    .waveGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px;}
    .waveBtn{border-radius:16px;border:1px solid rgba(255,255,255,.14);background:rgba(0,0,0,.20);color:#fff;cursor:pointer;padding:14px 12px;text-align:left;font-weight:900;}
    .waveBtn .sub{display:block;margin-top:6px;color:rgba(230,238,252,.70);font-size:12px;font-weight:800;}
    .log{height:140px;overflow:auto;padding:8px 10px;font-family:ui-monospace,Menlo,Monaco,Consolas,"Courier New",monospace;font-size:12px;white-space:pre-wrap;color:#d9e5ff;border-top:1px solid var(--line);}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=add4ce93b38c0ff9d9b9053728e067b3&autoload=false&libraries=services"></script>
</head>

<body>
<div class="wrap">
  <div class="left">
    <div class="title">
      <a href="/index.html"><img src="/favicon.ico" alt="Maroowell" /></a>
      <span>라우트 편집기</span>
    </div>

    <div class="group">
      <div class="label">캠프 이름 (예: 평양1)</div>
      <input id="campInput" type="text" />

      <div class="label">라우트 코드 (예: 101A,101B) — 비우면 camp 전체 표시</div>
      <input id="codeInput" type="text" />

      <div class="sep"></div>

      <div class="label sectionTitle">벤더 정보(서브라우트 단위)</div>
      <div class="kv">
        <div class="kvRow">
          <div class="kvLabel">주간 (2W)</div>
          <div class="kvValue" id="vendorWeekValue">-</div>
        </div>
        <div class="kvRow">
          <div class="kvLabel">야간 (1W)</div>
          <div class="kvValue" id="vendorNightValue">-</div>
        </div>
      </div>

      <div style="height:10px"></div>
      <div class="row" style="gap:10px;">
        <input id="vendorSearchInput" type="text" placeholder="벤더명/사업자번호 일부 입력 후 Enter" style="flex:1;" />
        <button id="vendorSearchBtn" class="btn btnSearch" type="button">검색</button>
      </div>

      <div style="height:10px"></div>
      <div class="row">
        <button id="vendorSaveBtn" class="btn ok" type="button">벤더 저장</button>
        <button id="vendorClearBtn" class="btn danger" type="button">벤더 비우기</button>
      </div>

      <div style="height:8px"></div>
      <div id="vendorPickedWrap" class="pillRow" style="display:none;margin-top:8px;">
        <div id="vendorPickedText"></div>
        <button id="vendorPickedClearBtn" class="pillX" type="button" title="선택 해제">✕</button>
      </div>

      <div class="sep"></div>

      <div class="label sectionTitle">입차지 정보(서브라우트 단위)</div>
      <div class="row" style="gap:10px;">
        <input id="deliveryNameInput" type="text" placeholder="입차지(모바일캠프명) 검색 후 Enter" style="flex:1;" />
        <button id="deliverySearchBtn" class="btn btnSearch" type="button">검색</button>
      </div>
      <div style="height:8px"></div>
      <input id="deliveryAddrInput" type="text" placeholder="입차지 주소(자동/선택)" readonly />

      <div style="height:10px"></div>
      <div class="row">
        <button id="deliverySaveBtn" class="btn ok" type="button">입차지 저장</button>
        <button id="deliveryClearBtn" class="btn danger" type="button">입차지 비우기</button>
        <button id="deliveryShowBtn" class="btn" type="button">입차지 표시</button>
      </div>
    </div>

    <div class="group">
      <div class="row">
        <button id="loadBtn" class="btn" type="button">불러오기</button>
        <button id="saveBtn" class="btn ok" type="button">저장</button>
        <button id="deletePolyBtn" class="btn danger" type="button">폴리곤 삭제</button>
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <button id="toggleMapType" class="btn" type="button">위성</button>
        <button id="toggleRoadview" class="btn" type="button">로드뷰</button>
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <button id="shareBtn" class="btn ok" style="width:100%;" type="button">🔗 공유 링크 생성</button>
      </div>
    </div>

    <div class="group" style="padding:0;">
      <div style="padding:10px;">
        <div id="selectedInfo" style="font-size:12px;color:rgba(230,238,252,.75);font-weight:900;">선택: 없음</div>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="map">
    <div id="mapWrap">
      <div id="map"></div>
      <div id="roadview"></div>
    </div>
    <div class="map-controls">
      <button id="toggleMapType2" type="button" style="display:none">위성</button>
      <button id="toggleRoadview2" type="button" style="display:none">로드뷰</button>
      <span id="roadviewHint" class="hint">로드뷰: 지도 클릭</span>
    </div>
  </div>
</div>

<!-- 벤더 모달 -->
<div class="modal" id="vendorModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true">
    <div class="modalTop">
      <div class="modalTitle">벤더 선택</div>
      <button id="vendorModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>클릭: 선택 · ESC: 닫기</div>
      <div id="vendorMetaCount">0개</div>
    </div>
    <div class="modalBody" id="vendorResults"></div>
  </div>
</div>

<!-- 1W/2W 선택 모달 -->
<div class="modal" id="waveModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true" style="width:min(520px, calc(100% - 40px)); max-height:none;">
    <div class="modalTop">
      <div class="modalTitle" id="waveModalTitle">저장 구분 선택</div>
      <button id="waveModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>주간/야간 중 선택</div>
      <div class="tagPill" id="waveModalVendorPill" style="display:none"></div>
    </div>
    <div class="waveGrid">
      <button id="wave2WBtn" class="waveBtn" type="button">주간 (2W)<span class="sub">2W로 저장</span></button>
      <button id="wave1WBtn" class="waveBtn" type="button">야간 (1W)<span class="sub">1W로 저장</span></button>
    </div>
  </div>
</div>

<!-- 입차지 모달 -->
<div class="modal" id="deliveryCampModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true">
    <div class="modalTop">
      <div class="modalTitle">입차지 선택</div>
      <button id="deliveryCampModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>클릭: 선택 · 결과 없으면 아래 “없음 등록”</div>
      <div id="deliveryCampMetaCount">0개</div>
    </div>
    <div class="modalBody" id="deliveryCampResults"></div>
  </div>
</div>

<script>
(async () => {
  "use strict";
  const logEl = document.getElementById("log");
  const selectedInfo = document.getElementById("selectedInfo");
  const log = (m) => { logEl.textContent += m + "\n"; logEl.scrollTop = logEl.scrollHeight; };

  const { SUPABASE_URL, SUPABASE_ANON_KEY, PATHS } = (window.MARUWELL_CONFIG || {});
  const LOGIN_PATH = (PATHS?.login || "/login.html");
  const DEFAULT_NEXT = (PATHS?.route || "/coupangRouteMap.html");
  const safeNextPath = (p) => (!p || !p.startsWith("/") || p.startsWith("http")) ? DEFAULT_NEXT : p;

  const getProjectRef = (url) => { try { return new URL(url).hostname.split(".")[0] || ""; } catch { return ""; } };
  const projectRef = getProjectRef(SUPABASE_URL);

  const tokenKey = `sb-${projectRef}-auth-token`;
  const verifierPrefix = `sb-${projectRef}-auth-token-code-verifier`;
  const sessionHasToken = () => { try { return !!sessionStorage.getItem(tokenKey); } catch { return false; } };

  function readSessionEntries(){
    const out=[];
    try{
      for(let i=0;i<sessionStorage.length;i++){
        const k=sessionStorage.key(i);
        if(!k) continue;
        if(k===tokenKey || k.startsWith(tokenKey) || k===verifierPrefix || k.startsWith(verifierPrefix)){
          out.push({key:k,value:sessionStorage.getItem(k)});
        }
      }
    }catch{}
    return out;
  }
  function writeSessionEntries(entries){
    const allow=(k)=>k===tokenKey || k.startsWith(tokenKey) || k===verifierPrefix || k.startsWith(verifierPrefix);
    try{
      for(const row of (entries||[])){
        if(!row || !allow(row.key)) continue;
        if(row.value==null) sessionStorage.removeItem(row.key);
        else sessionStorage.setItem(row.key,row.value);
      }
    }catch{}
  }

  function startResponding(){
    if(!projectRef) return;
    const origin=location.origin;
    const channelName=`mw-auth-bridge:${projectRef}`;
    const tabId=(Date.now().toString(36)+Math.random().toString(36).slice(2));

    window.addEventListener("message",(event)=>{
      if(event.origin!==origin) return;
      const msg=event.data||{};
      if(msg.type!=="MW_SESSION_REQUEST") return;
      if(msg.projectRef!==projectRef) return;
      if(!sessionHasToken()) return;
      try{
        event.source?.postMessage({
          type:"MW_SESSION_RESPONSE",
          projectRef,
          requestId: msg.requestId,
          entries: readSessionEntries(),
          fromTabId: tabId
        }, origin);
      }catch{}
    });

    try{
      if("BroadcastChannel" in window){
        const bc=new BroadcastChannel(channelName);
        bc.addEventListener("message",(ev)=>{
          const msg=ev.data||{};
          if(msg.type!=="MW_SESSION_REQUEST") return;
          if(msg.projectRef!==projectRef) return;
          if(!sessionHasToken()) return;
          try{
            bc.postMessage({
              type:"MW_SESSION_RESPONSE",
              projectRef,
              requestId: msg.requestId,
              entries: readSessionEntries(),
              fromTabId: tabId
            });
          }catch{}
        });
      }
    }catch{}
  }

  async function requestSessionCopy(timeoutMs=1200){
    if(!projectRef) return false;
    if(sessionHasToken()) return true;

    const origin=location.origin;
    const channelName=`mw-auth-bridge:${projectRef}`;
    const tabId=(Date.now().toString(36)+Math.random().toString(36).slice(2));
    const requestId=`${tabId}:${Date.now().toString(36)}`;

    const payload={type:"MW_SESSION_REQUEST",projectRef,requestId,fromTabId:tabId};

    let resolveFn;
    const p=new Promise((resolve)=>resolveFn=resolve);

    function onWindow(event){
      if(event.origin!==origin) return;
      const msg=event.data||{};
      if(msg.type!=="MW_SESSION_RESPONSE") return;
      if(msg.projectRef!==projectRef) return;
      if(msg.requestId!==requestId) return;
      try{ if(Array.isArray(msg.entries)) writeSessionEntries(msg.entries); }catch{}
      cleanup(); resolveFn(sessionHasToken());
    }

    let bc=null;
    function onBC(ev){
      const msg=ev.data||{};
      if(msg.type!=="MW_SESSION_RESPONSE") return;
      if(msg.projectRef!==projectRef) return;
      if(msg.requestId!==requestId) return;
      try{ if(Array.isArray(msg.entries)) writeSessionEntries(msg.entries); }catch{}
      cleanup(); resolveFn(sessionHasToken());
    }

    function cleanup(){
      window.removeEventListener("message", onWindow);
      try{ bc && bc.removeEventListener("message", onBC); }catch{}
      try{ bc && bc.close(); }catch{}
      bc=null;
    }

    window.addEventListener("message", onWindow);
    try{
      if("BroadcastChannel" in window){
        bc=new BroadcastChannel(channelName);
        bc.addEventListener("message", onBC);
      }
    }catch{}

    try{ bc && bc.postMessage(payload); }catch{}
    try{
      if(window.opener && window.opener!==window){
        window.opener.postMessage(payload, origin);
      }
    }catch{}

    setTimeout(()=>{ cleanup(); resolveFn(sessionHasToken()); }, Math.max(300, timeoutMs|0));
    return await p;
  }

  startResponding();
  await requestSessionCopy(1200);

  const supabase =
    (SUPABASE_URL && SUPABASE_ANON_KEY && window.supabase?.createClient)
      ? window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession:true, storage: window.sessionStorage }})
      : null;

  if(supabase?.auth){
    const { data: { session } } = await supabase.auth.getSession();
    if(!session){
      const next=safeNextPath(location.pathname+location.search+location.hash);
      location.replace(`${LOGIN_PATH}?next=${encodeURIComponent(next)}`);
      return;
    }
  }

  window.__MW_getAuthHeader = async () => {
    try{
      const { data: { session } } = await supabase.auth.getSession();
      if(session?.access_token) return { Authorization:`Bearer ${session.access_token}` };
    }catch{}
    return {};
  };

  // 라우트 코어는 기존 파일에 맞춰 유지(여기서는 UI/모듈 동작에 필요한 훅만 제공)
  window.MW_ROUTE = {
    getRouteContext(){
      return {
        camp: document.getElementById("campInput").value.trim(),
        code: document.getElementById("codeInput").value.trim(),
        id: undefined
      };
    },
    async getAuthHeader(){ return await window.__MW_getAuthHeader(); },
    async reloadRoutes(){ /* 필요 시 기존 로더 호출로 교체 */ },
    setStatus(msg,kind="OK"){ log(`[${kind}] ${msg}`); }
  };

  // 최소 지도 init (기존 작업 흐름을 망가뜨리지 않도록 단순 초기화만)
  kakao.maps.load(() => {
    const mapEl=document.getElementById("map");
    const map=new kakao.maps.Map(mapEl,{ center:new kakao.maps.LatLng(37.5665,126.978), level:7 });
    log("[OK] 지도 로드 완료");
  });

  // 로드뷰 토글(간단)
  const mapWrap=document.getElementById("mapWrap");
  const roadviewHint=document.getElementById("roadviewHint");
  let roadviewOn=false;
  document.getElementById("toggleRoadview").addEventListener("click",()=>{
    roadviewOn=!roadviewOn;
    roadviewHint.style.display=roadviewOn?"inline-flex":"none";
    if(!roadviewOn) mapWrap.classList.remove("roadview-open");
  });

  document.getElementById("shareBtn").addEventListener("click",()=>{
    const camp=document.getElementById("campInput").value.trim();
    const code=document.getElementById("codeInput").value.trim();
    if(!camp){ log("[WARN] 캠프를 입력하세요."); return; }
    const shareUrl=new URL("/share.html", location.origin);
    shareUrl.searchParams.set("camp", camp);
    if(code) shareUrl.searchParams.set("code", code);
    navigator.clipboard.writeText(shareUrl.toString()).then(()=>log("[OK] 공유 링크 복사 완료")).catch(()=>prompt("복사:", shareUrl.toString()));
  });
})();
</script>

<script type="module">
  import { initMwRoutePopups } from "/mw_route_popups.js";
  initMwRoutePopups({
    apiBase: "https://route.maroowell.com",
    getAuthHeader: async () => (window.MW_ROUTE?.getAuthHeader ? await window.MW_ROUTE.getAuthHeader() : {}),
    getRouteContext: () => (window.MW_ROUTE?.getRouteContext ? window.MW_ROUTE.getRouteContext() : null),
    onAfterSave: async () => { if (window.MW_ROUTE?.reloadRoutes) await window.MW_ROUTE.reloadRoutes(); }
  });
</script>
</body>
