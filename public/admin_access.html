<!doctype html>
<html lang="ko">
<head>
  <script src="/config.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>마루웰 권한 관리</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root{
      --bg:#0b1220;--bg2:#070b13;--card:#121a2d;--line:rgba(255,255,255,.11);
      --txt:#e6eefc;--muted:#9fb0d2;--blue:#3b82f6;--red:#ef4444;
      --green:#22c55e;--yellow:#f59e0b;--purple:#a855f7
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--txt);font-family:system-ui,-apple-system,"Noto Sans KR",Segoe UI,Roboto,Arial,sans-serif
    }
    .wrap{max-width:1440px;margin:0 auto;padding:22px 18px 40px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}.brand img{width:34px;height:34px}
    .title{font-size:28px;font-weight:950;letter-spacing:-.6px;line-height:1.15}
    .sub,.muted{color:var(--muted);font-size:14px;line-height:1.5}
    .topRight,.row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .card{
      background:rgba(18,26,45,.88);border:1px solid var(--line);border-radius:18px;
      padding:18px 20px;box-shadow:0 18px 60px rgba(0,0,0,.25);margin-bottom:16px
    }
    .sectionTitle{font-size:17px;font-weight:950;margin:0 0 12px}
    .layout{display:grid;grid-template-columns:460px 1fr;gap:16px}
    button{
      min-height:42px;border:1px solid var(--line);border-radius:999px;background:rgba(59,130,246,.24);
      color:#fff;font-weight:900;padding:0 18px;cursor:pointer;white-space:nowrap
    }
    button:hover{background:rgba(59,130,246,.36)}
    button.secondary{background:rgba(255,255,255,.07)}
    button.ok{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.32)}
    button.warn{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.32)}
    button.danger{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.35)}
    button.purple{background:rgba(168,85,247,.18);border-color:rgba(168,85,247,.35)}
    button.small{min-height:32px;padding:0 12px;font-size:12px}
    button:disabled{opacity:.55;cursor:not-allowed}
    input,select{
      height:42px;border-radius:12px;border:1px solid var(--line);background:rgba(0,0,0,.22);
      color:var(--txt);padding:0 13px;min-width:260px;outline:none
    }
    select option{background:#111827;color:#fff}
    input:focus,select:focus{border-color:rgba(96,165,250,.55);box-shadow:0 0 0 2px rgba(96,165,250,.12)}
    .pill{
      display:inline-flex;align-items:center;min-height:34px;border-radius:999px;border:1px solid var(--line);
      padding:0 13px;color:var(--muted);font-size:13px;font-weight:900;background:rgba(255,255,255,.05)
    }
    .okText{color:#bbf7d0}.badText{color:#fecaca}.warnText{color:#fde68a}
    .formGrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
    .field label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px;font-weight:900}
    .field input,.field select{width:100%;min-width:0}
    .btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.btnGrid button{width:100%;padding:0 10px}
    .list{display:grid;gap:9px;margin-top:12px}
    .userCard{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:14px;padding:12px}
    .userCard.admin{border-color:rgba(96,165,250,.36);background:rgba(59,130,246,.11)}
    .userCard.maroowell{border-color:rgba(34,197,94,.27)}
    .userTop{display:block;margin-bottom:8px}
    .name{
      display:block;width:100%;font-weight:950;word-break:keep-all;overflow-wrap:normal;
      white-space:nowrap;font-size:18px;line-height:1.35;cursor:pointer
    }
    .email{font-size:12px;color:#c7d2fe;word-break:break-all;margin-top:2px}
    .meta{font-size:12px;color:var(--muted);line-height:1.45;word-break:break-word}
    .badges{display:flex;align-items:center;justify-content:flex-start;gap:6px;flex-wrap:wrap;margin-top:8px}
    .badge{
      display:inline-flex;align-items:center;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.06);color:var(--muted);padding:4px 8px;font-size:11px;font-weight:950
    }
    .badge.admin{color:#bfdbfe;border-color:rgba(96,165,250,.38);background:rgba(59,130,246,.14)}
    .badge.maroowell{color:#bbf7d0;border-color:rgba(34,197,94,.34);background:rgba(34,197,94,.12)}
    .badge.dragon{color:#fde68a;border-color:rgba(245,158,11,.36);background:rgba(245,158,11,.13)}
    .badge.role{color:#ddd6fe;border-color:rgba(168,85,247,.36);background:rgba(168,85,247,.13)}
    .badge.schedule{color:#fef3c7;border-color:rgba(245,158,11,.38);background:rgba(245,158,11,.13)}
    .badge.scheduleOff,.badge.clhiOff{color:#fecaca;border-color:rgba(239,68,68,.32);background:rgba(239,68,68,.12)}
    .badge.clhi{color:#e9d5ff;border-color:rgba(168,85,247,.38);background:rgba(168,85,247,.13)}
    .userActions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .statGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.04)}
    .statNum{font-size:24px;font-weight:950}.statLab{font-size:12px;color:var(--muted);margin-top:4px}
    .schemaGrid{display:grid;grid-template-columns:430px 1fr;gap:16px}
    .tableList{display:grid;gap:8px;margin-top:12px}
    .tableBtn{text-align:left;height:auto;min-height:42px;border-radius:12px;background:rgba(255,255,255,.045);padding:10px 12px;width:100%}
    .tableBtn.active{border-color:rgba(59,130,246,.6);background:rgba(59,130,246,.17)}
    .tableName{font-weight:950}.mini{font-size:12px;color:var(--muted);margin-top:4px}
    pre{
      white-space:pre-wrap;word-break:break-word;background:rgba(0,0,0,.28);border:1px solid var(--line);
      border-radius:14px;padding:14px;max-height:620px;overflow:auto;
      font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#dbeafe;margin:0
    }
    @media(max-width:980px){
      .layout,.schemaGrid{grid-template-columns:1fr}.statGrid{grid-template-columns:repeat(2,1fr)}
      .top{align-items:flex-start;flex-direction:column}.topRight{justify-content:flex-start}
      input,select{min-width:0;width:100%}.btnGrid{grid-template-columns:1fr}.row button,.row input{width:100%}
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <a href="#" id="mwBoardMenuToggle"><img src="/favicon.ico" alt="MarooWell"></a>
        <div>
          <div class="title">🤖 마루웰 권한 관리</div>
          <div class="sub">이름 기준으로 팀장 / 관리자 / 최고관리자 / 용차 / 스케줄 / 클히 권한을 관리합니다.</div>
        </div>
      </div>
      <div class="topRight">
        <span class="pill" id="loginPill">세션 확인 전</span>
        <button class="secondary" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">관리자 API</div>
      <div class="row">
        <input id="apiBaseInput" placeholder="https://admin-access.maroowell.com" />
        <button id="saveApiBtn" class="secondary">API 저장</button>
        <button id="checkMeBtn">관리자 확인</button>
        <button id="loadUsersBtn" class="ok">권한 목록</button>
        <button id="scanBtn" class="warn">DB/RLS 스캔</button>
        <button id="copyBtn" class="secondary">JSON 복사</button>
      </div>
      <div class="sub" id="statusText">대기 중</div>
    </div>

    <div class="layout">
      <div>
        <div class="card">
          <div class="sectionTitle">권한 부여 / 회수</div>
          <div class="muted">대상은 이름으로 입력해도 됩니다. 동명이인이 있으면 이메일로 입력하세요.</div>
          <div class="formGrid">
            <div class="field">
              <label>대상 이름 또는 이메일</label>
              <input id="targetInput" type="text" placeholder="예: 강수환 또는 rkdtnqhks1@naver.com" autocomplete="off" />
            </div>
            <div class="field">
              <label>메모</label>
              <input id="memoInput" type="text" placeholder="예: 팀장 권한 / 관리자 권한 / 최고관리자 권한" autocomplete="off" />
            </div>
            <div class="field">
              <label>권한 등급 직접 선택</label>
              <select id="roleLevelSelect">
                <option value="">변경 안 함</option>
                <option value="0">0 / 마루웰 게시판 권한 해제</option>
                <option value="30">30 / 팀장</option>
                <option value="60">60 / 관리자</option>
                <option value="90">90 / 최고관리자</option>
              </select>
            </div>
            <div class="field">
              <label>용차 관리자 직접 선택</label>
              <select id="dragonSelect">
                <option value="">변경 안 함</option>
                <option value="true">용차 관리자 ON</option>
                <option value="false">용차 관리자 OFF</option>
              </select>
            </div>
            <div class="field">
              <label>스케줄 쓰기 직접 선택</label>
              <select id="scheduleWriteSelect">
                <option value="">변경 안 함</option>
                <option value="true">스케줄 ON</option>
                <option value="false">스케줄 OFF</option>
              </select>
            </div>
            <div class="field">
              <label>클히 조회 직접 선택</label>
              <select id="clhiSelect">
                <option value="">변경 안 함</option>
                <option value="true">클히 ON</option>
                <option value="false">클히 OFF</option>
              </select>
            </div>
          </div>

          <div class="btnGrid">
            <button id="applyCustomBtn">선택값 적용</button>
            <button id="grant30Btn" class="ok">팀장</button>
            <button id="grant60Btn" class="ok">관리자</button>
            <button id="grant90Btn">최고관리자</button>
            <button id="scheduleOnBtn" class="warn">스케줄 ON</button>
            <button id="scheduleOffBtn" class="warn">스케줄 OFF</button>
            <button id="clhiOnBtn" class="purple">클히 ON</button>
            <button id="clhiOffBtn" class="purple">클히 OFF</button>
            <button id="dragonOnBtn" class="warn">용차 ON</button>
            <button id="dragonOffBtn" class="warn">용차 OFF</button>
            <button id="revokeAdminBtn" class="warn">최고관리자만 해제</button>
            <button id="revokeAllBtn" class="danger">마루웰 해제</button>
          </div>
        </div>

        <div class="card">
          <div class="sectionTitle">현재 권한 목록</div>
          <div class="muted">이름을 클릭하면 좌측 대상 입력칸에 들어갑니다.</div>
          <div class="list" id="userList"></div>
        </div>
      </div>

      <div>
        <div class="card" id="summaryCard" style="display:none">
          <div class="sectionTitle">DB/RLS 스캔 요약</div>
          <div class="statGrid">
            <div class="stat"><div class="statNum" id="statTables">0</div><div class="statLab">테이블</div></div>
            <div class="stat"><div class="statNum" id="statRlsOn">0</div><div class="statLab">RLS ON</div></div>
            <div class="stat"><div class="statNum" id="statPolicies">0</div><div class="statLab">정책</div></div>
            <div class="stat"><div class="statNum" id="statFuncs">0</div><div class="statLab">함수</div></div>
          </div>
        </div>

        <div class="schemaGrid" id="schemaGrid" style="display:none">
          <div class="card">
            <div class="sectionTitle">테이블 목록</div>
            <div class="muted">테이블을 누르면 컬럼/제약/RLS 정책을 확인합니다.</div>
            <div class="tableList" id="tableList"></div>
          </div>
          <div class="card">
            <div class="sectionTitle" id="detailTitle">결과</div>
            <pre id="output">아직 결과가 없습니다.</pre>
          </div>
        </div>

        <div class="card" id="rawOnlyCard">
          <div class="sectionTitle">결과</div>
          <pre id="rawOutput">아직 결과가 없습니다.</pre>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const $ = id => document.getElementById(id);
  const cfg = window.MARUWELL_CONFIG || {};
  const API_STORAGE_KEY = "mw_admin_api_base";
  const defaultApiBase = localStorage.getItem(API_STORAGE_KEY) || cfg.ADMIN_API_BASE || "https://admin-access.maroowell.com";

  let supabaseClient = null;
  let lastSchema = null;
  let selectedTable = "";
  let lastUsers = [];
  let directoryRows = [];
  let scheduleRows = [];
  let clhiRows = [];
  let directoryReady = true;
  let scheduleReady = true;
  let clhiReady = true;

  const setStatus = (msg, type = "") => {
    $("statusText").textContent = msg;
    $("statusText").className = type === "bad" ? "sub badText" : type === "ok" ? "sub okText" : type === "warn" ? "sub warnText" : "sub";
  };

  const setRaw = obj => {
    $("rawOutput").textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  };

  const setSchemaOutput = obj => {
    $("output").textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  };

  const showRawOnly = () => {
    $("rawOnlyCard").style.display = "block";
    $("schemaGrid").style.display = "none";
  };

  const showSchemaGrid = () => {
    $("rawOnlyCard").style.display = "none";
    $("schemaGrid").style.display = "grid";
  };

  const apiBase = () => $("apiBaseInput").value.trim().replace(/\/$/, "");
  const low = v => String(v || "").trim().toLowerCase();

  function escapeHtml(v) {
    return String(v ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }

  function initSupabase() {
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = cfg;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase?.createClient) {
      throw new Error("config.js의 SUPABASE_URL / SUPABASE_ANON_KEY를 확인하세요.");
    }

    const storage = (() => {
      try { return window.sessionStorage; } catch { return undefined; }
    })();

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: !!storage,
        storage,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  }

  async function getToken() {
    if (!supabaseClient) initSupabase();

    const { data, error } = await supabaseClient.auth.getSession();
    if (error) throw error;

    const token = data?.session?.access_token;
    if (!token) throw new Error("로그인이 필요합니다. 먼저 login.html에서 로그인하세요.");

    return token;
  }

  async function adminFetch(path, options = {}) {
    const token = await getToken();
    const headers = new Headers(options.headers || {});
    headers.set("Authorization", "Bearer " + token);

    if (options.body && !headers.has("Content-Type")) {
      headers.set("Content-Type", "application/json");
    }

    const res = await fetch(apiBase() + path, { ...options, headers });
    const text = await res.text();

    let data = null;
    try { data = text ? JSON.parse(text) : null; } catch { data = text; }

    if (!res.ok || data?.ok === false) {
      throw new Error(data?.error || data?.message || text || "요청 실패");
    }

    return data;
  }

  async function rpc(name, args = {}) {
    if (!supabaseClient) initSupabase();

    const { data, error } = await supabaseClient.rpc(name, args);
    if (error) throw error;

    return data;
  }

  const normDir = r => ({
    user_id: r.user_id || r.out_user_id || "",
    email: r.email || r.out_email || "",
    display_name: r.display_name || r.out_display_name || ""
  });

  const normSchedule = r => ({
    user_id: r.user_id || r.out_user_id || "",
    email: r.email || r.out_email || "",
    display_name: r.display_name || r.out_display_name || "",
    can_write: (r.can_write ?? r.out_can_write) === true,
    memo: r.memo || r.out_memo || "",
    created_at: r.created_at || r.out_created_at || "",
    updated_at: r.updated_at || r.out_updated_at || ""
  });

  const normClhi = r => ({
    user_id: r.user_id || r.out_user_id || "",
    email: r.email || r.out_email || "",
    display_name: r.display_name || r.out_display_name || "",
    can_select: (r.can_select ?? r.out_can_select) === true,
    memo: r.memo || r.out_memo || "",
    created_at: r.created_at || r.out_created_at || "",
    updated_at: r.updated_at || r.out_updated_at || ""
  });

  async function loadDirectory() {
    try {
      const rows = await rpc("mw_admin_user_directory");
      directoryReady = true;
      directoryRows = (Array.isArray(rows) ? rows : []).map(normDir);
    } catch (e) {
      directoryReady = false;
      directoryRows = [];
      console.warn("directory RPC unavailable", e);
    }
  }

  async function loadScheduleRows() {
    try {
      const rows = await rpc("mw_admin_list_schedule_write_access");
      scheduleReady = true;
      scheduleRows = (Array.isArray(rows) ? rows : []).map(normSchedule);
    } catch (e) {
      scheduleReady = false;
      scheduleRows = [];
      console.warn("schedule RPC unavailable", e);
    }
  }

  async function loadClhiRows() {
    try {
      const rows = await rpc("mw_admin_list_clhi_access");
      clhiReady = true;
      clhiRows = (Array.isArray(rows) ? rows : []).map(normClhi);
    } catch (e) {
      clhiReady = false;
      clhiRows = [];
      console.warn("clhi RPC unavailable", e);
    }
  }

  function dirBy(row) {
    const uid = String(row?.user_id || "").trim();
    const email = low(row?.email);

    return directoryRows.find(x => (uid && String(x.user_id) === uid) || (email && low(x.email) === email)) || null;
  }

  function displayName(row) {
    return row?.display_name || row?.name || dirBy(row)?.display_name || row?.email || "이름 없음";
  }

  function findUserByEmail(email) {
    const target = low(email);
    return lastUsers.find(row => low(row.email) === target) || null;
  }

  function findSchedule(row) {
    const uid = String(row?.user_id || "").trim();
    const email = low(row?.email);

    return scheduleRows.find(x => (uid && String(x.user_id) === uid) || (email && low(x.email) === email)) || null;
  }

  function findClhi(row) {
    const uid = String(row?.user_id || "").trim();
    const email = low(row?.email);

    return clhiRows.find(x => (uid && String(x.user_id) === uid) || (email && low(x.email) === email)) || null;
  }

  function getLevel(row) {
    if (!row) return 0;

    if (row.max_role_level !== undefined && row.max_role_level !== null) {
      return Number(row.max_role_level || 0);
    }

    if (row.role_level !== undefined && row.role_level !== null) {
      return Number(row.role_level || 0);
    }

    if (row.is_maroowell === true) {
      const memo = String(row.memo || "");
      if (memo.includes("최고관리자")) return 90;
      if (memo.includes("관리자") || row.is_admin === true) return 60;
      return 30;
    }

    return 0;
  }

  function roleMemo(n) {
    n = Number(n || 0);
    if (n >= 90) return "최고관리자 권한";
    if (n >= 60) return "관리자 권한";
    if (n >= 30) return "팀장 권한";
    return "마루웰 권한 해제";
  }

  function roleLabel(n) {
    n = Number(n || 0);
    if (n >= 90) return "최고관리자";
    if (n >= 60) return "관리자";
    if (n >= 30) return "팀장";
    return "권한 없음";
  }

  function basePayload(email, memo) {
    const row = findUserByEmail(email);
    return {
      email,
      is_maroowell: row?.is_maroowell === true,
      is_admin: row?.is_admin === true,
      role_level: getLevel(row),
      is_dragon_car_admin: row?.is_dragon_car_admin === true,
      memo
    };
  }

  function setTarget(name, email) {
    $("targetInput").value = email || name || "";
    if (name || email) {
      $("memoInput").placeholder = `${name || email} 권한 변경`;
    }
  }

  async function resolveTarget() {
    const input = $("targetInput").value.trim();
    if (!input) throw new Error("대상 이름 또는 이메일을 입력하세요.");

    if (input.includes("@")) {
      const email = low(input);
      const found = findUserByEmail(email) || directoryRows.find(x => low(x.email) === email);
      return {
        email,
        label: found ? displayName(found) : input,
        user_id: found?.user_id || ""
      };
    }

    if (directoryRows.length === 0) await loadDirectory();

    const exact = directoryRows.filter(x => low(x.display_name) === low(input));
    if (exact.length === 1) {
      return { email: low(exact[0].email), label: exact[0].display_name, user_id: exact[0].user_id };
    }

    if (exact.length > 1) {
      throw new Error(`동명이인 ${exact.length}명: 이메일로 입력하세요.`);
    }

    const partial = directoryRows.filter(x => low(x.display_name).includes(low(input)));
    if (partial.length === 1) {
      return { email: low(partial[0].email), label: partial[0].display_name, user_id: partial[0].user_id };
    }

    if (partial.length > 1) {
      throw new Error(`이름 검색 결과 ${partial.length}명: 더 정확한 이름 또는 이메일로 입력하세요.`);
    }

    const fromList = lastUsers.find(x => low(displayName(x)) === low(input));
    if (fromList) {
      return { email: low(fromList.email), label: displayName(fromList), user_id: fromList.user_id };
    }

    throw new Error(`대상을 찾지 못했습니다: ${input}`);
  }

  function getMemo(defaultMemo) {
    return $("memoInput").value.trim() || defaultMemo;
  }

  async function setAccessOnly(payload) {
    return adminFetch("/admin/access/set", {
      method: "POST",
      body: JSON.stringify(payload)
    });
  }

  async function setSchedule(target, on) {
    return rpc("mw_admin_set_schedule_write_access", {
      p_email: target.email,
      p_can_write: on,
      p_memo: on ? "마루웰 스케줄 write 허용" : "마루웰 스케줄 write 해제"
    });
  }

  async function setClhi(target, on) {
    return rpc("mw_admin_set_clhi_access", {
      p_target: target.label || target.email,
      p_can_select: on,
      p_memo: on ? "클렌징 히스토리 조회 허용" : "클렌징 히스토리 조회 해제"
    });
  }

  async function setAccess(payload, opts = {}) {
    showRawOnly();

    const result = {
      access: null,
      schedule: null,
      clhi: null
    };

    result.access = await setAccessOnly(payload);

    if (opts.schedule !== undefined) {
      try {
        result.schedule = await setSchedule({ email: payload.email, label: payload.email }, opts.schedule);
      } catch (e) {
        result.schedule = { ok: false, error: e.message };
      }
    }

    if (opts.clhi !== undefined) {
      try {
        result.clhi = await setClhi({ email: payload.email, label: payload.email }, opts.clhi);
      } catch (e) {
        result.clhi = { ok: false, error: e.message };
      }
    }

    setRaw(result);
    await loadUsers();

    return result;
  }

  async function checkMe() {
    showRawOnly();
    setStatus("관리자 세션 확인 중...");

    const data = await adminFetch("/admin/me");
    $("loginPill").textContent = data?.user?.email || data?.user?.id || "관리자 확인됨";
    $("loginPill").className = "pill okText";
    setRaw(data);
    setStatus("관리자 확인 완료", "ok");
  }

  async function loadUsers() {
    showRawOnly();
    setStatus("권한 목록 불러오는 중...");

    const data = await adminFetch("/admin/access/users");
    lastUsers = Array.isArray(data.rows) ? data.rows : [];

    await Promise.all([
      loadDirectory(),
      loadScheduleRows(),
      loadClhiRows()
    ]);

    renderUserList(lastUsers);

    setRaw({
      ...data,
      user_directory: directoryReady ? directoryRows : "RPC 확인 필요",
      schedule_write_access: scheduleReady ? scheduleRows : "RPC 확인 필요",
      clhi_access: clhiReady ? clhiRows : "RPC 확인 필요"
    });

    const warns = [
      !directoryReady && "이름",
      !scheduleReady && "스케줄",
      !clhiReady && "클히"
    ].filter(Boolean);

    setStatus(
      `권한 목록 ${lastUsers.length}건 불러옴${warns.length ? " / " + warns.join(", ") + " RPC 확인 필요" : ""}`,
      warns.length ? "warn" : "ok"
    );
  }

  function setRolePayload(payload, roleLevel) {
    payload.role_level = roleLevel;
    payload.is_maroowell = roleLevel >= 30;

    // 핵심 수정:
    // 관리자 60도 DB의 is_admin=true로 저장한다.
    // 최고관리자 여부는 role_level/max_role_level 90으로 구분한다.
    payload.is_admin = roleLevel >= 60;

    return payload;
  }

  async function applyCustom() {
    const target = await resolveTarget();
    const roleRaw = $("roleLevelSelect").value;
    const dragonRaw = $("dragonSelect").value;
    const scheduleRaw = $("scheduleWriteSelect").value;
    const clhiRaw = $("clhiSelect").value;

    if (roleRaw === "" && dragonRaw === "" && scheduleRaw === "" && clhiRaw === "") {
      throw new Error("변경할 권한을 선택하세요.");
    }

    const roleLevel = roleRaw !== "" ? Number(roleRaw) : null;
    const payload = basePayload(target.email, getMemo(roleLevel === null ? "선택값 적용" : roleMemo(roleLevel)));
    const opts = {};

    if (roleLevel !== null) {
      setRolePayload(payload, roleLevel);

      if (roleLevel >= 30 && roleLevel < 90) {
        opts.schedule = true;
      }
    }

    if (dragonRaw !== "") payload.is_dragon_car_admin = dragonRaw === "true";
    if (scheduleRaw !== "") opts.schedule = scheduleRaw === "true";
    if (clhiRaw !== "") opts.clhi = clhiRaw === "true";

    setStatus("선택값 적용 중...");
    await setAccess(payload, opts);
    setStatus("선택값 적용 완료", "ok");
  }

  async function grantRole(level) {
    const target = await resolveTarget();
    const payload = basePayload(target.email, getMemo(roleMemo(level)));

    setRolePayload(payload, level);

    const opts = level >= 30 && level < 90 ? { schedule: true } : {};

    setStatus(`${target.label || target.email} ${roleMemo(level)} 부여 중...`);
    await setAccess(payload, opts);
    setStatus(`${roleMemo(level)} 부여 완료`, "ok");
  }

  async function scheduleOn() {
    const target = await resolveTarget();
    setStatus("스케줄 ON 처리 중...");

    const data = await setSchedule(target, true);
    await loadUsers();

    setRaw(data);
    setStatus("스케줄 ON 완료", "ok");
  }

  async function scheduleOff() {
    const target = await resolveTarget();
    setStatus("스케줄 OFF 처리 중...");

    const data = await setSchedule(target, false);
    await loadUsers();

    setRaw(data);
    setStatus("스케줄 OFF 완료", "ok");
  }

  async function clhiOn() {
    const target = await resolveTarget();
    setStatus("클히 ON 처리 중...");

    const data = await setClhi(target, true);
    await loadUsers();

    setRaw(data);
    setStatus("클히 ON 완료", "ok");
  }

  async function clhiOff() {
    const target = await resolveTarget();
    setStatus("클히 OFF 처리 중...");

    const data = await setClhi(target, false);
    await loadUsers();

    setRaw(data);
    setStatus("클히 OFF 완료", "ok");
  }

  async function dragonOn() {
    const target = await resolveTarget();
    const payload = basePayload(target.email, getMemo("용차 관리자 ON"));
    payload.is_dragon_car_admin = true;

    setStatus("용차 ON 처리 중...");
    await setAccess(payload);
    setStatus("용차 ON 완료", "ok");
  }

  async function dragonOff() {
    const target = await resolveTarget();
    const payload = basePayload(target.email, getMemo("용차 관리자 OFF"));
    payload.is_dragon_car_admin = false;

    setStatus("용차 OFF 처리 중...");
    await setAccess(payload);
    setStatus("용차 OFF 완료", "ok");
  }

  async function revokeAdmin() {
    const target = await resolveTarget();
    const payload = basePayload(target.email, getMemo("관리자 권한"));

    // 최고관리자만 해제 = 관리자 60으로 강등.
    setRolePayload(payload, 60);

    setStatus("최고관리자 해제 중...");
    await setAccess(payload, { schedule: true });
    setStatus("최고관리자 해제 완료", "ok");
  }

  async function revokeAll() {
    const target = await resolveTarget();

    if (!confirm(`${target.label || target.email}\n\n마루웰 권한을 해제할까요?\n스케줄/클히/용차 권한은 별도 버튼으로 관리됩니다.`)) {
      return;
    }

    const payload = basePayload(target.email, getMemo("마루웰 권한 해제"));
    setRolePayload(payload, 0);

    setStatus("마루웰 해제 중...");
    await setAccess(payload);
    setStatus("마루웰 해제 완료", "ok");
  }

  async function scan() {
    showSchemaGrid();
    setStatus("DB 구조/RLS 스캔 중...");

    const data = await adminFetch("/admin/db-introspect");
    lastSchema = data.schema || data;
    selectedTable = "";

    renderSummary();
    renderTableList();
    setSchemaOutput(lastSchema);
    setStatus("스캔 완료. 테이블을 눌러 상세 확인하세요.", "ok");
  }

  function renderUserList(rows) {
    const list = $("userList");

    if (!Array.isArray(rows) || rows.length === 0) {
      list.innerHTML = `<div class="muted">권한 row가 없습니다.</div>`;
      return;
    }

    list.innerHTML = rows.map(row => {
      const name = displayName(row);
      const email = row.email || "";
      const level = getLevel(row);
      const sched = findSchedule(row);
      const clhi = findClhi(row);
      const isSuper = level >= 90;
      const isManager = level >= 60 || row.is_admin === true;
      const scheduleOnState = isSuper || sched?.can_write === true || row.schedule_can_write === true;
      const clhiOnState = clhi?.can_select === true;
      const cls = isSuper ? "userCard admin" : row.is_maroowell ? "userCard maroowell" : "userCard";

      return `
        <div class="${cls}">
          <div class="userTop">
            <div class="name" data-action="pick" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">${escapeHtml(name)}</div>
            <div class="badges">
              <span class="badge role">${escapeHtml(roleLabel(level))} · ${level}</span>
              ${row.is_maroowell ? `<span class="badge maroowell">마루웰</span>` : `<span class="badge">마루웰 X</span>`}
              ${isManager ? `<span class="badge admin">관리자</span>` : `<span class="badge">관리자 아님</span>`}
              ${isSuper ? `<span class="badge admin">최고관리자</span>` : ``}
              ${row.is_dragon_car_admin ? `<span class="badge dragon">용차</span>` : `<span class="badge">용차 X</span>`}
              ${scheduleReady ? (scheduleOnState ? `<span class="badge schedule">스케줄 ON${isSuper ? "(최고)" : ""}</span>` : `<span class="badge scheduleOff">스케줄 OFF</span>`) : `<span class="badge">스케줄 ?</span>`}
              ${clhiReady ? (clhiOnState ? `<span class="badge clhi">클히 ON</span>` : `<span class="badge clhiOff">클히 OFF</span>`) : `<span class="badge">클히 ?</span>`}
            </div>
          </div>

          <div class="email">${escapeHtml(email)}</div>
          <div class="meta">memo: ${row.memo ? escapeHtml(row.memo) : "-"}</div>
          <div class="meta">schedule_memo: ${sched?.memo ? escapeHtml(sched.memo) : (isSuper ? "최고관리자 자동 허용" : "-")}</div>
          <div class="meta">clhi_memo: ${clhi?.memo ? escapeHtml(clhi.memo) : "-"}</div>
          <div class="meta">updated_at: ${row.updated_at ? escapeHtml(row.updated_at) : "-"}</div>

          <div class="userActions">
            <button class="small ok" data-action="team" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">팀장</button>
            <button class="small ok" data-action="manager" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">관리자</button>
            <button class="small" data-action="super" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">최고관리자</button>
            <button class="small warn" data-action="schedule-on" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">스케줄 ON</button>
            <button class="small warn" data-action="schedule-off" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">스케줄 OFF</button>
            <button class="small purple" data-action="clhi-on" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">클히 ON</button>
            <button class="small purple" data-action="clhi-off" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">클히 OFF</button>
            <button class="small warn" data-action="dragon-on" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">용차 ON</button>
            <button class="small warn" data-action="dragon-off" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">용차 OFF</button>
            <button class="small danger" data-action="revoke" data-email="${escapeHtml(email)}" data-name="${escapeHtml(name)}">마루웰 해제</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderSummary() {
    const tables = Array.isArray(lastSchema?.tables) ? lastSchema.tables : [];
    const funcs = Array.isArray(lastSchema?.functions) ? lastSchema.functions : [];
    const policies = tables.reduce((sum, table) => sum + (Array.isArray(table.policies) ? table.policies.length : 0), 0);
    const rlsOn = tables.filter(table => table.rls_enabled === true).length;

    $("summaryCard").style.display = "block";
    $("statTables").textContent = tables.length;
    $("statRlsOn").textContent = rlsOn;
    $("statPolicies").textContent = policies;
    $("statFuncs").textContent = funcs.length;
  }

  function renderTableList() {
    const tables = Array.isArray(lastSchema?.tables) ? lastSchema.tables : [];

    $("tableList").innerHTML = tables.map(table => {
      const name = `${table.schema || "public"}.${table.table}`;
      const cls = selectedTable === name ? "tableBtn active" : "tableBtn";
      const policies = Array.isArray(table.policies) ? table.policies.length : 0;
      const cols = Array.isArray(table.columns) ? table.columns.length : 0;

      return `
        <button class="${cls}" data-table="${escapeHtml(name)}">
          <div class="tableName">${escapeHtml(name)}</div>
          <div class="mini">RLS ${table.rls_enabled ? "ON" : "OFF"} · 정책 ${policies} · 컬럼 ${cols}</div>
        </button>
      `;
    }).join("");
  }

  function showTable(name) {
    const tables = Array.isArray(lastSchema?.tables) ? lastSchema.tables : [];
    const found = tables.find(table => `${table.schema || "public"}.${table.table}` === name);

    selectedTable = name;
    renderTableList();
    $("detailTitle").textContent = name;
    setSchemaOutput(found || "테이블을 찾지 못했습니다.");
  }

  function run(fn) {
    fn().catch(error => {
      setStatus(error.message, "bad");
      showRawOnly();
      setRaw({
        ok: false,
        error: error.message,
        stack: error.stack || ""
      });
    });
  }

  $("apiBaseInput").value = defaultApiBase;

  $("saveApiBtn").onclick = () => {
    localStorage.setItem(API_STORAGE_KEY, apiBase());
    setStatus("API 주소 저장됨", "ok");
  };

  $("checkMeBtn").onclick = () => run(checkMe);
  $("loadUsersBtn").onclick = () => run(loadUsers);
  $("scanBtn").onclick = () => run(scan);
  $("applyCustomBtn").onclick = () => run(applyCustom);
  $("grant30Btn").onclick = () => run(() => grantRole(30));
  $("grant60Btn").onclick = () => run(() => grantRole(60));
  $("grant90Btn").onclick = () => run(() => grantRole(90));
  $("scheduleOnBtn").onclick = () => run(scheduleOn);
  $("scheduleOffBtn").onclick = () => run(scheduleOff);
  $("clhiOnBtn").onclick = () => run(clhiOn);
  $("clhiOffBtn").onclick = () => run(clhiOff);
  $("dragonOnBtn").onclick = () => run(dragonOn);
  $("dragonOffBtn").onclick = () => run(dragonOff);
  $("revokeAdminBtn").onclick = () => run(revokeAdmin);
  $("revokeAllBtn").onclick = () => run(revokeAll);

  $("copyBtn").onclick = async () => {
    const text = $("rawOnlyCard").style.display !== "none" ? $("rawOutput").textContent : $("output").textContent;
    await navigator.clipboard.writeText(text || "");
    setStatus("복사 완료", "ok");
  };

  $("logoutBtn").onclick = async () => {
    if (!supabaseClient) initSupabase();
    await supabaseClient.auth.signOut();
    location.href = "/login.html";
  };

  $("tableList").onclick = event => {
    const btn = event.target.closest("[data-table]");
    if (btn) showTable(btn.dataset.table);
  };

  $("userList").onclick = event => {
    const el = event.target.closest("[data-action]");
    if (!el) return;

    setTarget(el.dataset.name || "", el.dataset.email || "");

    const action = el.dataset.action;

    if (action === "pick") return;
    if (action === "team") run(() => grantRole(30));
    if (action === "manager") run(() => grantRole(60));
    if (action === "super") run(() => grantRole(90));
    if (action === "schedule-on") run(scheduleOn);
    if (action === "schedule-off") run(scheduleOff);
    if (action === "clhi-on") run(clhiOn);
    if (action === "clhi-off") run(clhiOff);
    if (action === "dragon-on") run(dragonOn);
    if (action === "dragon-off") run(dragonOff);
    if (action === "revoke") run(revokeAll);
  };

  try {
    initSupabase();
    checkMe().catch(() => {});
    loadUsers().catch(() => {});
  } catch (e) {
    setStatus(e.message, "bad");
  }
})();
</script>
<script src="/board-menu.js"></script>
</body>
</html>
