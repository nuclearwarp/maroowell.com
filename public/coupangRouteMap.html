<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="origin" />
  <title>마루웰 라우트 편집기</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />

  <style>
    :root{
      --bg:#0b1220;
      --txt:#e6eefc;
      --muted:#93a4c7;
      --line:rgba(255,255,255,.08);
      --btn:#162744;
      --btn2:#1a2f55;
      --danger:#6b1b1b;
      --ok:#1a5a3a;
      --warn:#6a4b13;
    }
    *{box-sizing:border-box}
    html,body{height:100%; margin:0; font-family:system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif; background:#0a0f1a;}
    .wrap{display:flex; height:100%;}
    .left{
      width:360px; min-width:340px; max-width:420px;
      background:linear-gradient(180deg,var(--bg),#070b13);
      color:var(--txt);
      border-right:1px solid var(--line);
      padding:14px 14px 10px 14px;
      overflow:auto;
    }
    .title{font-size:18px; font-weight:800; letter-spacing:.2px; margin:2px 0 10px; display:flex; align-items:center; gap:8px;}
    .group{background:rgba(255,255,255,.03); border:1px solid var(--line); border-radius:12px; padding:10px; margin:10px 0;}
    .label{font-size:12px; color:var(--muted); margin:6px 0 6px;}
    .label.sectionTitle{text-align:center; font-weight:900; letter-spacing:.2px;}
    input[type="text"]{
      width:100%; padding:10px 10px; border-radius:10px;
      border:1px solid var(--line); background:rgba(0,0,0,.25);
      color:var(--txt); outline:none;
    }
    .row{display:flex; gap:8px; align-items:center;}
    .row > *{flex:1}
    .btn{
      padding:10px 10px; border-radius:999px; border:1px solid var(--line);
      background:var(--btn); color:var(--txt);
      cursor:pointer; font-weight:700; font-size:13px; white-space:nowrap;
    }
    .btn:hover{background:var(--btn2)}
    .btn.danger{background:rgba(107,27,27,.35); border-color:rgba(255,60,60,.22)}
    .btn.ok{background:rgba(26,90,58,.35); border-color:rgba(0,255,140,.18)}
    .btn.warn{background:rgba(106,75,19,.35); border-color:rgba(255,180,0,.18)}
    .sep{height:1px; background:var(--line); margin:10px 0;}

    .kv{border-radius:12px; border:1px solid var(--line); background:rgba(0,0,0,.18); padding:0 10px;}
    .kvRow{display:flex; align-items:center; justify-content:space-between; gap:10px; min-height:40px;}
    .kvRow + .kvRow{border-top:1px solid var(--line);}
    .kvLabel{flex:0 0 92px; height:40px; display:flex; align-items:center; font-size:12px; color:rgba(230,238,252,.72);}
    .kvValue{flex:1 1 auto; height:40px; display:flex; align-items:center; justify-content:flex-end; font-size:13px; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}

    .logWrap{border-radius:12px; border:1px solid var(--line); overflow:hidden; background:rgba(0,0,0,.25); margin-top:10px;}
    .logHeader{padding:8px 10px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; font-size:12px; color:var(--muted);}
    .pill{display:inline-block; padding:3px 8px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.04); font-size:12px; color:var(--muted);}
    .log{height:170px; overflow:auto; padding:8px 10px; font-family:ui-monospace, Menlo, Monaco, Consolas, "Courier New", monospace; font-size:12px; white-space:pre-wrap; color:#d9e5ff;}
    .small{font-size:11px; color:var(--muted);}

    .map{flex:1; position:relative;}
    #mapWrap{position:absolute; inset:0; display:flex; min-width:0; min-height:0;}
    #map,#roadview{flex:1; width:100%; height:100%; min-width:0; min-height:0;}
    #roadview{display:none;}
    #mapWrap.roadview-open #roadview{display:block;}

    .map-controls{
      position:absolute; top:10px; right:10px; z-index:25;
      display:flex; gap:8px; flex-wrap:wrap;
    }
    .map-controls button{
      background:rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.14);
      color:#fff; padding:8px 12px; border-radius:999px;
      cursor:pointer; font-weight:800; font-size:12px;
      backdrop-filter: blur(6px);
    }
    .map-controls .hint{
      padding:8px 10px; border-radius:10px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.55);
      color:#cbd5e1; font-size:12px; display:none;
    }
    .floatingHint{
      position:absolute; top:10px; left:10px; z-index:20;
      background:rgba(0,0,0,.55); color:#fff;
      border:1px solid rgba(255,255,255,.14);
      border-radius:10px; padding:8px 10px; font-size:12px;
      max-width:520px; display:none; pointer-events:none;
    }

    /* 모달 공통 */
    .modal{
      position:fixed; inset:0; background:rgba(0,0,0,.35);
      display:none; align-items:center; justify-content:center;
      z-index:2000; backdrop-filter: blur(2px);
    }
    .modalCard{
      width:min(720px, calc(100% - 40px));
      max-height:min(720px, calc(100% - 40px));
      background:linear-gradient(180deg, rgba(15,26,45,.96), rgba(8,14,26,.96));
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px; box-shadow:0 22px 80px rgba(0,0,0,.55);
      overflow:hidden; display:flex; flex-direction:column;
    }
    .modalTop{padding:14px 14px 10px 14px; border-bottom:1px solid rgba(255,255,255,.10); display:flex; gap:10px; align-items:center; justify-content:space-between;}
    .modalTitle{font-weight:900; color:#eaf2ff; letter-spacing:.2px; white-space:nowrap;}
    .miniBtn{
      height:36px; padding:0 14px; border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(0,0,0,.25); color:#fff; cursor:pointer;
      font-weight:900; font-size:13px; white-space:nowrap;
    }
    .modalMeta{padding:10px 14px; color:rgba(230,238,252,.70); font-size:12px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; justify-content:space-between; align-items:center; gap:10px;}
    .modalBody{flex:1; overflow:auto; padding:12px 14px;}

    /* 결과 카드 */
    .resultCard{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.16);
      border-radius:14px; padding:12px 12px; margin-bottom:10px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      cursor:pointer;
    }
    .resultCard:hover{border-color:rgba(255,255,255,.18); background:rgba(0,0,0,.22);}
    .resultTitle{font-weight:900; color:#fff; margin-bottom:6px; line-height:1.2; word-break:keep-all;}
    .resultSub{color:rgba(230,238,252,.70); font-size:12px; line-height:1.45; white-space:pre-line;}

    .waveGrid{display:grid; grid-template-columns:1fr 1fr; gap:12px; padding:14px;}
    .waveBtn{border-radius:16px; border:1px solid rgba(255,255,255,.14); background:rgba(0,0,0,.20); color:#fff; cursor:pointer; padding:14px 12px; text-align:left; font-weight:900;}
    .waveBtn:hover{background:rgba(0,0,0,.30)}
    .waveBtn .sub{display:block; margin-top:6px; color:rgba(230,238,252,.70); font-size:12px; font-weight:800;}

    .pillRow{display:flex; align-items:center; justify-content:space-between; padding:6px 10px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.04); color:var(--muted); font-size:12px; gap:10px;}
    .pillX{width:22px; height:22px; border-radius:999px; border:1px solid var(--line); background:rgba(255,255,255,.06); color:var(--muted); display:inline-flex; align-items:center; justify-content:center; cursor:pointer;}
    .pillX:hover{background:rgba(255,255,255,.12);}

    .btnSearch{padding:10px 14px; min-width:86px;}
  </style>

  <!-- Kakao Maps -->
  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=add4ce93b38c0ff9d9b9053728e067b3&autoload=false&libraries=services"></script>

  <!-- (선택) Supabase + config: 있으면 auth guard 및 세션 브리지 사용 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/config.js?v=20260316-1"></script>
</head>

<body>
<div class="wrap">
  <div class="left">
    <div class="title">
      <a href="/index.html" style="display:flex;align-items:center">
        <img src="/favicon.ico" alt="Maroowell Logo" style="width:24px;height:24px;transform:translateY(-2px);cursor:pointer" />
      </a>
      <span>마루웰 라우트 편집기</span>
    </div>

    <div class="group">
      <div class="label">캠프 이름 (예: 평양1)</div>
      <input id="campInput" type="text" value="" />

      <div class="label">라우트 코드 (예: 101A,101B) — 비우면 camp 전체 표시</div>
      <input id="codeInput" type="text" value="" />

      <div class="sep"></div>

      <div class="label sectionTitle">벤더 정보(서브라우트 단위)</div>
      <div class="kv">
        <div class="kvRow">
          <div class="kvLabel">주간 (2W)</div>
          <div class="kvValue" id="vendorWeekValue">-</div>
        </div>
        <div class="kvRow">
          <div class="kvLabel">야간 (1W)</div>
          <div class="kvValue" id="vendorNightValue">-</div>
        </div>
      </div>

      <div style="height:10px"></div>
      <div class="row" style="gap:10px;">
        <input id="vendorSearchInput" type="text" placeholder="벤더명/사업자번호 일부 입력 후 Enter" style="flex:1;" />
        <button id="vendorSearchBtn" class="btn btnSearch" type="button">검색</button>
      </div>

      <div style="height:10px"></div>
      <div class="row">
        <button id="vendorSaveBtn" class="btn ok" type="button">벤더 저장</button>
        <button id="vendorClearBtn" class="btn danger" type="button">벤더 비우기</button>
      </div>

      <div style="height:8px"></div>
      <div id="vendorPickedWrap" class="pillRow" style="display:none;margin-top:8px;">
        <div id="vendorPickedText"></div>
        <button id="vendorPickedClearBtn" class="pillX" type="button" title="선택 해제">✕</button>
      </div>

      <div class="sep"></div>

      <div class="label sectionTitle">입차지 정보(서브라우트 단위)</div>
      <div class="row" style="gap:10px;">
        <input id="deliveryNameInput" type="text" placeholder="입차지(모바일캠프명) 검색 후 Enter" style="flex:1;" />
        <button id="deliverySearchBtn" class="btn btnSearch" type="button">검색</button>
      </div>
      <div style="height:8px"></div>
      <input id="deliveryAddrInput" type="text" placeholder="입차지 주소 (camps 테이블에서 자동 조회)" readonly />

      <div style="height:10px"></div>
      <div class="row">
        <button id="deliverySaveBtn" class="btn ok" type="button">입차지 저장</button>
        <button id="deliveryClearBtn" class="btn danger" type="button">입차지 비우기</button>
        <button id="deliveryShowBtn" class="btn" type="button">입차지 표시</button>
      </div>
    </div>

    <div class="group" id="addressListGroup" style="display:none">
      <div class="label">배송지 목록 (입차지→배송지 네비)</div>
      <div id="addressList" style="max-height:300px; overflow-y:auto; margin-top:8px;"></div>
    </div>

    <div class="group">
      <div class="row">
        <button id="loadBtn" class="btn" type="button">불러오기</button>
        <button id="drawNewBtn" class="btn warn" type="button">새로 그리기</button>
        <button id="drawAddBtn" class="btn warn" type="button">구역 추가</button>
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <button id="saveBtn" class="btn ok" type="button">저장</button>
        <button id="deletePolyBtn" class="btn danger" type="button">폴리곤 삭제</button>
        <button id="vendorLabelToggleBtn" class="btn" type="button">벤더 라벨 OFF</button>
      </div>
      <div style="height:8px"></div>
      <div class="row">
        <button id="labelToggleBtn" class="btn" type="button">라우트 라벨 ON</button>
        <button id="resetBtn" class="btn" type="button">지도 초기화</button>
        <button id="shareBtn" class="btn ok" type="button">🔗 공유 링크 생성</button>
      </div>
    </div>

    <div class="logWrap">
      <div class="logHeader">
        <span class="pill" id="statusPill">READY</span>
        <span class="small" id="selectedInfo">선택: 없음</span>
      </div>
      <div class="log" id="log"></div>
    </div>
  </div>

  <div class="map">
    <div id="mapWrap">
      <div id="map"></div>
      <div id="roadview"></div>
    </div>

    <div class="map-controls">
      <button id="toggleMapType" type="button" title="일반/위성 전환">위성</button>
      <button id="toggleRoadview" type="button" title="로드뷰 보기/종료">로드뷰</button>
      <span id="roadviewHint" class="hint">로드뷰: 파란 길 클릭</span>
    </div>

    <div class="floatingHint" id="hint"></div>
  </div>
</div>

<!-- 벤더 선택 모달 -->
<div class="modal" id="vendorModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true" aria-label="벤더 선택">
    <div class="modalTop">
      <div class="modalTitle">벤더 선택</div>
      <button id="vendorModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>클릭: 선택 · ESC: 닫기</div>
      <div id="vendorMetaCount">0개</div>
    </div>
    <div class="modalBody" id="vendorResults"></div>
  </div>
</div>

<!-- 1W/2W 선택 모달 -->
<div class="modal" id="waveModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true" aria-label="1W/2W 선택" style="width:min(520px, calc(100% - 40px)); max-height:none;">
    <div class="modalTop">
      <div class="modalTitle" id="waveModalTitle">저장 구분 선택</div>
      <button id="waveModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>주간/야간 중 하나를 선택하세요</div>
      <div class="pill" id="waveModalVendorPill" style="display:none"></div>
    </div>
    <div class="waveGrid">
      <button id="wave2WBtn" class="waveBtn" type="button">주간 (2W)<span class="sub">2W로 저장</span></button>
      <button id="wave1WBtn" class="waveBtn" type="button">야간 (1W)<span class="sub">1W로 저장</span></button>
    </div>
  </div>
</div>

<!-- 입차지(캠프) 검색/등록 모달 -->
<div class="modal" id="deliveryCampModal" aria-hidden="true">
  <div class="modalCard" role="dialog" aria-modal="true" aria-label="입차지 선택">
    <div class="modalTop">
      <div class="modalTitle">입차지 선택</div>
      <button id="deliveryCampModalCloseBtn" class="miniBtn" type="button" style="background:rgba(255,80,80,.18);border-color:rgba(255,80,80,.26)">닫기</button>
    </div>
    <div class="modalMeta">
      <div>클릭: 선택 · 결과 없으면 아래에서 등록</div>
      <div id="deliveryCampMetaCount">0개</div>
    </div>
    <div class="modalBody" id="deliveryCampResults"></div>
  </div>
</div>

<script type="module">
(() => {
  if (window.__mw_route_page_init) return;
  window.__mw_route_page_init = true;

  const API_BASE = "https://route.maroowell.com";
  const ROUTE_ENDPOINT = `${API_BASE}/route`;
  const ADDRESS_ENDPOINT = `${API_BASE}/addresses`;
  const CAMPS_ENDPOINT = `${API_BASE}/camps`;
  const VENDORS_ENDPOINT = `${API_BASE}/vendors`;

  const $ = (id) => document.getElementById(id);

  const campInput = $("campInput");
  const codeInput = $("codeInput");
  const loadBtn = $("loadBtn");
  const drawNewBtn = $("drawNewBtn");
  const drawAddBtn = $("drawAddBtn");
  const saveBtn = $("saveBtn");
  const deletePolyBtn = $("deletePolyBtn");
  const resetBtn = $("resetBtn");
  const shareBtn = $("shareBtn");
  const labelToggleBtn = $("labelToggleBtn");
  const vendorLabelToggleBtn = $("vendorLabelToggleBtn");
  const deliveryShowBtn = $("deliveryShowBtn");

  const vendorWeekValue = $("vendorWeekValue");
  const vendorNightValue = $("vendorNightValue");
  const deliveryNameInput = $("deliveryNameInput");
  const deliveryAddrInput = $("deliveryAddrInput");

  const logEl = $("log");
  const statusPill = $("statusPill");
  const selectedInfo = $("selectedInfo");
  const hintEl = $("hint");

  const toggleMapTypeBtn = $("toggleMapType");
  const toggleRoadviewBtn = $("toggleRoadview");
  const roadviewHintEl = $("roadviewHint");
  const mapWrapEl = $("mapWrap");

  // ====== 로그/상태 ======
  const ts = () => {
    const d = new Date();
    return `[${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}:${String(d.getSeconds()).padStart(2,"0")}]`;
  };
  function log(msg){
    logEl.textContent += `${ts()} ${msg}\n`;
    logEl.scrollTop = logEl.scrollHeight;
  }
  function setStatus(msg, kind="READY"){
    statusPill.textContent = kind;
    if (msg) log(`${kind} ${msg}`);
  }
  function hint(msg, show=true){
    hintEl.textContent = msg;
    hintEl.style.display = show ? "block" : "none";
  }

  // ====== (선택) Supabase sessionStorage + 세션 브리지 ======
  let sb = null;
  function supabaseAvailable(){
    return !!(window.supabase && window.MW_CONFIG && window.MW_CONFIG.SUPABASE_URL && window.MW_CONFIG.SUPABASE_ANON_KEY);
  }
  function getProjectRef(url){
    try { return new URL(url).hostname.split(".")[0]; } catch { return ""; }
  }
  function getTokenKey(){
    const ref = getProjectRef(window.MW_CONFIG?.SUPABASE_URL || "");
    return ref ? `sb-${ref}-auth-token` : null;
  }
  function startSessionBridge(){
    const CHANNEL = "mw-session-bridge";
    const bc = ("BroadcastChannel" in window) ? new BroadcastChannel(CHANNEL) : null;
    const tokenKey = getTokenKey();

    function respond(target){
      if (!tokenKey) return;
      const cur = sessionStorage.getItem(tokenKey);
      if (!cur) return;
      const entries = [[tokenKey, cur]];
      target({ type:"MW_SESSION_RESPONSE", entries });
    }

    if (bc){
      bc.onmessage = (ev) => {
        const d = ev.data || {};
        if (d.type === "MW_SESSION_REQUEST") respond((payload)=>bc.postMessage(payload));
      };
    }
    window.addEventListener("message",(ev)=>{
      const d = ev.data || {};
      if (d.type === "MW_SESSION_REQUEST"){
        respond((payload)=>ev.source?.postMessage(payload, "*"));
      }
    });

    async function requestCopy(){
      if (!tokenKey) return false;
      if (sessionStorage.getItem(tokenKey)) return true;

      const request = { type:"MW_SESSION_REQUEST" };
      const ok = await new Promise((resolve)=>{
        let done = false;
        const finish = (v)=>{ if (done) return; done=true; resolve(v); };
        const t = setTimeout(()=>finish(false), 700);

        const handler = (ev)=>{
          const d = ev.data || {};
          if (d.type !== "MW_SESSION_RESPONSE") return;
          try{
            (d.entries||[]).forEach(([k,v])=>{ if (k && v) sessionStorage.setItem(k,v); });
            clearTimeout(t); window.removeEventListener("message", handler);
            finish(true);
          }catch{ finish(false); }
        };
        window.addEventListener("message", handler);

        try{ if (bc) bc.postMessage(request); }catch{}
        try{ if (window.opener) window.opener.postMessage(request, "*"); }catch{}
      });

      return ok;
    }

    return { requestCopy };
  }

  async function requireAuthIfConfigured(){
    if (!supabaseAvailable()) return;
    sb = window.supabase.createClient(
      window.MW_CONFIG.SUPABASE_URL,
      window.MW_CONFIG.SUPABASE_ANON_KEY,
      { auth: { storage: window.sessionStorage, persistSession: true, autoRefreshToken: true, detectSessionInUrl: true } }
    );

    const bridge = startSessionBridge();
    await bridge.requestCopy();

    const { data } = await sb.auth.getSession();
    if (!data?.session){
      const next = encodeURIComponent(location.pathname + location.search);
      location.href = `/login.html?next=${next}`;
    }
  }

  // ====== API ======
  async function apiGet(url){
    const res = await fetch(url);
    const text = await res.text();
    const json = (()=>{ try { return text ? JSON.parse(text) : null; } catch { return null; } })();
    if (!res.ok) throw new Error(json?.error || text || `HTTP ${res.status}`);
    return json;
  }
  async function apiJson(method, url, body){
    const res = await fetch(url, {
      method,
      headers: { "Content-Type":"application/json" },
      body: body ? JSON.stringify(body) : undefined
    });
    const text = await res.text();
    const json = (()=>{ try { return text ? JSON.parse(text) : null; } catch { return null; } })();
    if (!res.ok) throw new Error(json?.error || text || `HTTP ${res.status}`);
    return json;
  }

  // ====== 지도/라우트 상태 ======
  let map, geocoder;
  let isSatellite = false;

  let routeRows = [];
  const overlayById = new Map(); // id -> { row, polys: Polygon[] }
  let selectedRouteId = null;

  // 그리기 상태
  let drawMode = null; // "new" | "add"
  let drawPoints = [];
  let drawLine = null;

  // 입차지 핀
  let deliveryPinMarker = null;
  let deliveryPinLabel = null;

  function colorFor(code){
    const str = String(code||"");
    let h = 2166136261;
    for (let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
    const hue = (h>>>0)%360;
    return `hsl(${hue} 55% 55%)`;
  }

  function clearOverlays(){
    for (const pack of overlayById.values()){
      (pack.polys||[]).forEach(p=>p.setMap(null));
    }
    overlayById.clear();
    routeRows = [];
    selectedRouteId = null;
    selectedInfo.textContent = "선택: 없음";
    vendorWeekValue.textContent = "-";
    vendorNightValue.textContent = "-";
  }

  function setVendorDisplayFromRow(row){
    const name1 = row?.vendor_name_1w ?? row?.vendor_1w_name ?? null;
    const name2 = row?.vendor_name_2w ?? row?.vendor_2w_name ?? null;
    vendorNightValue.textContent = (name1 || "-"); // 야간(1W)
    vendorWeekValue.textContent = (name2 || "-");  // 주간(2W)
  }

  function setDeliveryDisplayFromRow(row){
    deliveryNameInput.value = row?.delivery_location_name || "";
    deliveryAddrInput.value = row?.delivery_location_address || "";
  }

  function selectRoute(id){
    const pack = overlayById.get(id);
    if (!pack) return;
    selectedRouteId = id;
    const row = pack.row;
    campInput.value = row.camp || "";
    codeInput.value = row.full_code || row.code || "";
    selectedInfo.textContent = `선택: ${campInput.value} / ${codeInput.value} (id=${id})`;
    setVendorDisplayFromRow(row);
    setDeliveryDisplayFromRow(row);
    setStatus("라우트 선택됨", "OK");
    loadAddresses().catch(e=>log(`주소 로드 실패: ${e.message}`));
  }

  function parsePolygonWgs84(v){
    if (!v) return null;
    if (Array.isArray(v)) return v;
    if (typeof v === "string"){
      try { const p = JSON.parse(v); return Array.isArray(p) ? p : null; } catch { return null; }
    }
    return null;
  }

  function ringsToLatLngs(ring){
    // ring: [[lng,lat],...]
    return (ring||[]).map(([lng,lat])=> new kakao.maps.LatLng(lat, lng));
  }

  function makePolygon(latlngs, color){
    return new kakao.maps.Polygon({
      path: latlngs,
      strokeWeight: 2,
      strokeColor: color,
      strokeOpacity: 0.9,
      fillColor: color,
      fillOpacity: 0.22
    });
  }

  async function loadRoutes(){
    const camp = campInput.value.trim();
    const code = codeInput.value.trim();
    if (!camp){ setStatus("camp가 비었습니다.", "ERR"); return; }
    clearOverlays();
    setStatus("라우트 불러오는 중...", "OK");

    const codes = code ? code.split(/[,\\s]+/).map(s=>s.trim()).filter(Boolean) : [];
    const all = [];

    async function fetchOne(prefix){
      const url = new URL(ROUTE_ENDPOINT);
      url.searchParams.set("camp", camp);
      url.searchParams.set("mode", "prefix");
      if (prefix) url.searchParams.set("code", prefix);
      const data = await apiGet(url.toString());
      return data?.rows || [];
    }

    if (codes.length === 0){
      all.push(...await fetchOne(""));
    } else {
      for (const c of codes){
        try { all.push(...await fetchOne(c)); }
        catch(e){ log(`조회 실패(${c}): ${e.message}`); }
      }
    }

    routeRows = all;
    if (!routeRows.length){
      setStatus("조회된 라우트가 없습니다.", "WARN");
      return;
    }

    const bounds = new kakao.maps.LatLngBounds();
    for (const row of routeRows){
      const id = row.id;
      const poly = parsePolygonWgs84(row.polygon_wgs84);
      const rings = Array.isArray(poly?.[0]?.[0]) ? poly : (poly ? [poly] : []);
      const polys = [];
      const c = colorFor(row.full_code || row.code);

      for (const ring of rings){
        if (!Array.isArray(ring) || ring.length < 3) continue;
        const latlngs = ringsToLatLngs(ring);
        const p = makePolygon(latlngs, c);
        p.setMap(map);
        kakao.maps.event.addListener(p, "click", ()=>{ if (!drawMode) selectRoute(id); });
        polys.push(p);
        latlngs.forEach(ll=>bounds.extend(ll));
      }

      overlayById.set(id, { row, polys });
    }

    map.setBounds(bounds);
    setStatus(`로드 완료: ${routeRows.length}개`, "OK");
  }

  function beginDraw(mode){
    if (!selectedRouteId){
      setStatus("먼저 지도에서 라우트를 클릭해 선택하세요.", "WARN");
      return;
    }
    drawMode = mode;
    drawPoints = [];
    if (drawLine) drawLine.setMap(null);
    drawLine = new kakao.maps.Polyline({
      path: [],
      strokeWeight: 2,
      strokeColor: "#00C2FF",
      strokeOpacity: 0.9,
      strokeStyle: "shortdash"
    });
    drawLine.setMap(map);
    hint("그리기 모드: 지도 클릭으로 점 추가 · Enter 완료 · ESC 취소 · 우클릭 마지막 점 취소", true);
    setStatus(mode === "new" ? "새로 그리기 시작" : "구역 추가 시작", "OK");
  }
  function stopDraw(){
    drawMode = null;
    drawPoints = [];
    if (drawLine){ drawLine.setMap(null); drawLine = null; }
    hint("", false);
  }
  function finishDraw(){
    if (drawPoints.length < 3){
      setStatus("점이 3개 이상 필요합니다.", "WARN"); return;
    }
    const pack = overlayById.get(selectedRouteId);
    if (!pack) return;

    const c = colorFor(pack.row.full_code || pack.row.code);
    const poly = makePolygon(drawPoints.slice(), c);
    poly.setMap(map);
    kakao.maps.event.addListener(poly, "click", ()=>{ if (!drawMode) selectRoute(selectedRouteId); });

    if (drawMode === "new"){
      (pack.polys||[]).forEach(p=>p.setMap(null));
      pack.polys = [poly];
    } else {
      pack.polys = (pack.polys||[]).concat([poly]);
    }

    stopDraw();
    setStatus("폴리곤 생성 완료(저장 버튼으로 반영)", "OK");
  }

  function polysToWgs84(polys){
    // [[ [lng,lat], ... ], ...]
    const out = [];
    for (const p of (polys||[])){
      const path = p.getPath();
      const ring = [];
      for (let i=0;i<path.getLength();i++){
        const ll = path.getAt(i);
        ring.push([ll.getLng(), ll.getLat()]);
      }
      if (ring.length >= 3) out.push(ring);
    }
    return out.length ? out : null;
  }

  async function saveCurrent(){
    if (!selectedRouteId){ setStatus("선택된 라우트가 없습니다.", "WARN"); return; }
    const pack = overlayById.get(selectedRouteId);
    if (!pack){ setStatus("선택 라우트를 찾을 수 없습니다.", "ERR"); return; }

    const camp = (pack.row.camp || campInput.value).trim();
    const code = (pack.row.full_code || pack.row.code || codeInput.value).trim();
    const polygon_wgs84 = polysToWgs84(pack.polys);

    setStatus("저장 중...", "OK");
    await apiJson("POST", ROUTE_ENDPOINT, { id: pack.row.id, camp, code, polygon_wgs84 });
    setStatus("저장 완료(서버 반영)", "OK");
    await loadRoutes();
  }

  async function deletePolygon(){
    if (!selectedRouteId){ setStatus("선택된 라우트가 없습니다.", "WARN"); return; }
    const pack = overlayById.get(selectedRouteId);
    if (!pack) return;
    setStatus("폴리곤 삭제 중...", "OK");
    await apiJson("DELETE", ROUTE_ENDPOINT, { id: pack.row.id });
    setStatus("폴리곤 삭제 완료", "OK");
    await loadRoutes();
  }

  async function loadAddresses(){
    const camp = campInput.value.trim();
    const code = codeInput.value.trim();
    if (!camp) return;
    const url = new URL(ADDRESS_ENDPOINT);
    url.searchParams.set("camp", camp);
    if (code) url.searchParams.set("code", code);
    const data = await apiGet(url.toString());
    const rows = data?.rows || [];
    const group = $("addressListGroup");
    const list = $("addressList");
    if (!rows.length){
      group.style.display = "none";
      list.innerHTML = "";
      return;
    }
    group.style.display = "block";
    list.innerHTML = "";
    rows.forEach((addr, idx)=>{
      const item = document.createElement("div");
      item.style.cssText = `
        padding:8px; margin-bottom:6px;
        background:rgba(0,0,0,0.15);
        border:1px solid var(--line);
        border-radius:8px; font-size:12px;
      `;
      const addressText = addr.address || addr.full_address || "주소 없음";
      item.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center; gap:8px;">
          <div style="flex:1; min-width:0;">
            <div style="font-weight:600; color:var(--txt); margin-bottom:2px;">${idx+1}. ${addressText}</div>
            <div style="color:var(--muted); font-size:11px;">${addr.zipcode ? `우편번호: ${addr.zipcode}` : ""}</div>
          </div>
          <button class="btn" style="padding:6px 12px; font-size:11px; white-space:nowrap;" type="button">네비</button>
        </div>
      `;
      item.querySelector("button").onclick = ()=>openNaviToAddress(addr);
      list.appendChild(item);
    });
  }

  function clearDeliveryPin(){
    if (deliveryPinMarker){ deliveryPinMarker.setMap(null); deliveryPinMarker=null; }
    if (deliveryPinLabel){ deliveryPinLabel.setMap(null); deliveryPinLabel=null; }
  }

  function showDeliveryPin(){
    const addr = deliveryAddrInput.value.trim();
    if (!addr){ setStatus("입차지 주소가 없습니다. 먼저 입차지 검색/선택하세요.", "WARN"); return; }
    geocoder.addressSearch(addr, (result, status)=>{
      if (status !== kakao.maps.services.Status.OK || !result?.length){
        setStatus("입차지 주소를 찾을 수 없습니다.", "ERR"); return;
      }
      clearDeliveryPin();
      const lat = Number(result[0].y), lng = Number(result[0].x);
      const pos = new kakao.maps.LatLng(lat, lng);
      deliveryPinMarker = new kakao.maps.Marker({ position: pos, zIndex: 999 });
      deliveryPinMarker.setMap(map);

      const badge = document.createElement("div");
      badge.style.cssText = "padding:3px 8px;border-radius:10px;background:rgba(255,255,255,.96);border:1px solid rgba(11,18,32,0.18);color:#0b1220;font-size:13px;font-weight:900;white-space:nowrap;box-shadow:0 3px 10px rgba(0,0,0,.22);pointer-events:none;";
      badge.textContent = deliveryNameInput.value.trim() || "입차지";
      deliveryPinLabel = new kakao.maps.CustomOverlay({ position: pos, content: badge, yAnchor: 1.4, zIndex: 999 });
      deliveryPinLabel.setMap(map);

      map.panTo(pos);
      setStatus("입차지 표시 완료", "OK");
    });
  }

  function openNaviToAddress(addr){
    // 간단 구현: PC는 카카오 맵 링크, 모바일은 kakaomap://
    if (!addr?.center_wgs84){ setStatus("배송지 좌표가 없습니다(center_wgs84).", "WARN"); return; }
    const startAddr = deliveryAddrInput.value.trim();
    if (!startAddr){ setStatus("입차지 주소가 없습니다.", "WARN"); return; }

    geocoder.addressSearch(startAddr, (res, st)=>{
      if (st !== kakao.maps.services.Status.OK || !res?.length){
        setStatus("입차지 주소를 찾을 수 없습니다.", "ERR"); return;
      }
      const spLat = Number(res[0].y), spLng = Number(res[0].x);
      let epLat=null, epLng=null;
      const c = addr.center_wgs84;
      if (Array.isArray(c) && c.length>=2){
        // [lng,lat] or [lat,lng] heuristic
        if (Math.abs(c[0]) > Math.abs(c[1])){ epLng=c[0]; epLat=c[1]; } else { epLat=c[0]; epLng=c[1]; }
      } else if (typeof c === "object"){
        epLat = c.lat ?? c.latitude ?? null;
        epLng = c.lng ?? c.lon ?? c.longitude ?? null;
      }
      if (!epLat || !epLng){ setStatus("배송지 좌표 해석 실패.", "ERR"); return; }

      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      const naviUrl = isMobile
        ? `kakaomap://route?sp=${spLat},${spLng}&ep=${epLat},${epLng}&by=CAR`
        : `https://map.kakao.com/link/from/${encodeURIComponent("입차지")},${spLat},${spLng}/to/${encodeURIComponent(addr.address||"배송지")},${epLat},${epLng}`;
      window.open(naviUrl, "_blank");
    });
  }

  function kstYYYYMMDDHHMM(){
    const now = new Date();
    const kst = new Date(now.getTime() + 9*60*60*1000);
    const yyyy = String(kst.getUTCFullYear());
    const mm = String(kst.getUTCMonth()+1).padStart(2,"0");
    const dd = String(kst.getUTCDate()).padStart(2,"0");
    const HH = String(kst.getUTCHours()).padStart(2,"0");
    const MM = String(kst.getUTCMinutes()).padStart(2,"0");
    return `${yyyy}${mm}${dd}${HH}${MM}`;
  }
  function generateShareLink(){
    const camp = campInput.value.trim();
    const code = codeInput.value.trim();
    if (!camp){ setStatus("캠프를 입력하세요.", "WARN"); return; }
    const u = new URL("/share.html", location.origin);
    u.searchParams.set("camp", camp);
    if (code) u.searchParams.set("code", code);
    u.searchParams.set("v", kstYYYYMMDDHHMM());
    const url = u.toString();
    navigator.clipboard.writeText(url)
      .then(()=>setStatus("공유 링크 복사 완료", "OK"))
      .catch(()=>prompt("공유 링크", url));
    log(`공유 링크: ${url}`);
  }

  function setMapTypeSatellite(on){
    isSatellite = !!on;
    map.setMapTypeId(isSatellite ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);
    toggleMapTypeBtn.textContent = isSatellite ? "일반" : "위성";
  }

  // 로드뷰: 간단 토글(파란길 클릭 안내만)
  let roadviewOn = false;
  let roadview, roadviewClient, roadviewClickHandler;
  function ensureRoadview(){
    if (roadview && roadviewClient) return;
    roadview = new kakao.maps.Roadview($("roadview"));
    roadviewClient = new kakao.maps.RoadviewClient();
  }
  function setRoadviewAt(latlng){
    ensureRoadview();
    roadviewClient.getNearestPanoId(latlng, 200, (panoId)=>{
      if (!panoId){ alert("근처 로드뷰가 없습니다."); return; }
      mapWrapEl.classList.add("roadview-open");
      roadview.setPanoId(panoId, latlng);
      roadview.relayout();
    });
  }
  function setRoadviewOn(on){
    roadviewOn = !!on;
    toggleRoadviewBtn.textContent = roadviewOn ? "로드뷰 종료" : "로드뷰";
    roadviewHintEl.style.display = roadviewOn ? "inline-flex" : "none";

    if (!roadviewOn){
      mapWrapEl.classList.remove("roadview-open");
      try{ map.removeOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW); }catch{}
      if (roadviewClickHandler) kakao.maps.event.removeListener(map,"click",roadviewClickHandler);
      roadviewClickHandler = null;
      return;
    }
    try{ map.addOverlayMapTypeId(kakao.maps.MapTypeId.ROADVIEW); }catch{}
    roadviewClickHandler = (e)=>{ if (e?.latLng) setRoadviewAt(e.latLng); };
    kakao.maps.event.addListener(map,"click",roadviewClickHandler);
  }

  // ====== MW_ROUTE: 팝업 모듈이 이 훅으로 라우트에 patch 저장 ======
  async function saveSelectedRoutePatch(patch){
    const pack = selectedRouteId ? overlayById.get(selectedRouteId) : null;
    if (!pack){
      setStatus("선택된 라우트가 없습니다. (지도에서 폴리곤 클릭)", "WARN");
      throw new Error("NO_SELECTED_ROUTE");
    }
    const row = pack.row;
    const payload = { id: row.id, camp: row.camp, code: row.full_code || row.code, ...patch };
    await apiJson("POST", ROUTE_ENDPOINT, payload);
    await loadRoutes();
    // 재선택 시도
    if (overlayById.has(row.id)) selectRoute(row.id);
  }

  async function getAuthHeader(){
    // worker.js 쪽 API는 현재 auth를 강제하지 않는 형태로 보이지만(구성에 따라 변경될 수 있음),
    // 추후 보호 시 Bearer 토큰을 붙일 수 있도록 훅만 제공합니다.
    try{
      if (!sb) return {};
      const { data } = await sb.auth.getSession();
      const token = data?.session?.access_token;
      return token ? { Authorization: `Bearer ${token}` } : {};
    }catch{
      return {};
    }
  }

  window.MW_ROUTE = {
    apiBase: API_BASE,
    endpoints: { ROUTE_ENDPOINT, ADDRESS_ENDPOINT, CAMPS_ENDPOINT, VENDORS_ENDPOINT },
    log, setStatus,
    getRouteContext: ()=>({
      camp: campInput.value.trim(),
      code: codeInput.value.trim(),
      selectedRouteId,
      selectedRoute: selectedRouteId ? overlayById.get(selectedRouteId)?.row : null
    }),
    saveSelectedRoutePatch,
    reloadRoutes: loadRoutes,
    getAuthHeader,
    setVendorDisplayFromRow,
    setDeliveryDisplayFromRow
  };

  // ====== init ======
  async function init(){
    await requireAuthIfConfigured();

    kakao.maps.load(async ()=>{
      map = new kakao.maps.Map($("map"), { center: new kakao.maps.LatLng(37.4936, 126.9019), level: 6 });
      geocoder = new kakao.maps.services.Geocoder();

      // map click / draw
      kakao.maps.event.addListener(map,"click",(e)=>{
        if (!drawMode) return;
        drawPoints.push(e.latLng);
        drawLine.setPath(drawPoints);
      });
      kakao.maps.event.addListener(map,"rightclick",()=>{
        if (!drawMode) return;
        drawPoints.pop();
        drawLine.setPath(drawPoints);
      });

      window.addEventListener("keydown",(e)=>{
        if (e.key === "Escape" && drawMode){ stopDraw(); setStatus("그리기 취소", "WARN"); }
        if (e.key === "Enter" && drawMode){ e.preventDefault(); finishDraw(); }
      });

      // UI bindings
      loadBtn.onclick = ()=>loadRoutes().catch(err=>setStatus(err.message,"ERR"));
      drawNewBtn.onclick = ()=>beginDraw("new");
      drawAddBtn.onclick = ()=>beginDraw("add");
      saveBtn.onclick = ()=>saveCurrent().catch(err=>setStatus(err.message,"ERR"));
      deletePolyBtn.onclick = ()=>deletePolygon().catch(err=>setStatus(err.message,"ERR"));
      resetBtn.onclick = ()=>{ clearOverlays(); clearDeliveryPin(); stopDraw(); setStatus("초기화 완료","OK"); };
      shareBtn.onclick = generateShareLink;
      deliveryShowBtn.onclick = showDeliveryPin;

      toggleMapTypeBtn.onclick = ()=>setMapTypeSatellite(!isSatellite);
      toggleRoadviewBtn.onclick = ()=>setRoadviewOn(!roadviewOn);

      // 모듈 로드(벤더/입차지 팝업): 실패해도 라우트 코어는 동작하도록 try/catch
      try{
        const mod = await import("/mw_route_popups.js");
        if (typeof mod.default === "function"){
          mod.default(window.MW_ROUTE);
          log("mw_route_popups.js 로드 완료");
        } else {
          log("mw_route_popups.js: default export가 함수가 아닙니다.");
        }
      }catch(e){
        log(`mw_route_popups.js 로드 실패: ${e?.message || String(e)}`);
        setStatus("팝업 모듈 로드 실패(벤더/입차지 기능 제한)", "WARN");
      }

      setStatus("지도 로드 완료", "OK");

      // querystring 자동 로드
      const qs = new URLSearchParams(location.search);
      const qc = (qs.get("camp")||"").trim();
      const qcode = (qs.get("code")||"").trim();
      if (qc) campInput.value = qc;
      if (qcode) codeInput.value = qcode;
      if (campInput.value.trim()){
        await loadRoutes().catch(()=>{});
      }
    });
  }

  init().catch(err=>{
    console.error(err);
    setStatus(`초기화 실패: ${err.message}`, "ERR");
  });
})();
</script>
</body>
</html>
