<!doctype html>
<html lang="ko">
<head>

  <meta name="robots" content="index,follow,max-image-preview:large" />

  <meta property="og:site_name" content="Maroowell" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:title" content="배송 지도 공유" />
  <meta property="og:description" content="배송 구역 및 경로를 확인하세요" />
  <meta property="og:url" content="https://maroowell.com/share.html" />

  <meta property="og:image:secure_url" content="https://maroowell.com/assets/og/maroowell-1200x630.png?v=1" />

  <meta property="og:image:alt" content="Maroowell 배송 지도 공유" />
  <link rel="canonical" href="https://maroowell.com/share.html" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />

  <style>
    @font-face{
      font-family:"문경감홍사과체";
      src:
        url("/assets/fonts/MungyeongGamhong.woff2") format("woff2"),
        url("/assets/fonts/MungyeongGamhong.woff") format("woff"),
        url("/assets/fonts/MungyeongGamhong.ttf") format("truetype");
      font-weight:400 1000;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#f6f8fc;
      --surface:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#d8e0ee;
      --blue:#2563eb;
      --green:#16a34a;
      --red:#dc2626;
      --shadow:0 12px 34px rgba(15,23,42,.12);
      --font:"문경감홍사과체","Noto Sans KR",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}
    html,body{
      height:100%;
      margin:0;
      overflow:hidden;
      font-family:var(--font);
      color:var(--text);
      background:#eaf0f8;
      -webkit-font-smoothing:antialiased;
      text-rendering:geometricPrecision;
    }

    .container{
      height:100%;
      display:flex;
      flex-direction:column;
      min-height:0;
      background:#eaf0f8;
    }

    .header{
      flex:0 0 auto;
      background:rgba(255,255,255,.96);
      border-bottom:1px solid var(--line);
      box-shadow:0 6px 20px rgba(15,23,42,.08);
      z-index:30;
      padding:12px;
      backdrop-filter:blur(12px);
    }

    .header-content{
      width:min(960px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
      align-items:center;
    }

    .camp-info{

      display:grid;
      gap:4px;
    }

    .camp-name{
      font-size:19px;
      font-weight:1000;
      letter-spacing:-.04em;
      color:#0f172a;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .camp-name img{
      width:28px;
      height:28px;
      flex:0 0 auto;
      filter:drop-shadow(0 3px 7px rgba(15,23,42,.12));
    }

    .camp-address{
      display:flex;
      align-items:center;
      gap:8px;
      min-width:0;
      color:var(--muted);
      font-size:12px;
      font-weight:900;
      line-height:1.3;
    }

    #campAddress{
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      min-width:0;
    }

    .copy-btn{
      flex:0 0 auto;
      border:1px solid #bfdbfe;
      background:#eff6ff;
      color:#1d4ed8;
      border-radius:999px;
      padding:5px 9px;
      font-family:var(--font);
      font-size:11px;
      font-weight:950;
      cursor:pointer;
    }

    .navi-buttons{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
    }

    .btn{
      min-height:38px;
      border:1px solid #cbd5e1;
      background:#fff;
      color:#0f172a;
      border-radius:999px;
      padding:0 13px;
      font-family:var(--font);
      font-size:12px;
      font-weight:1000;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      white-space:nowrap;
      box-shadow:0 1px 0 rgba(255,255,255,.75);
    }

    .btn:hover{background:#f8fbff;border-color:#93c5fd}
    .btn.primary{
      background:linear-gradient(180deg,#3b82f6,#2563eb);
      color:#fff;
      border-color:#1d4ed8;
      box-shadow:0 8px 18px rgba(37,99,235,.18);
    }
    .btn.green{
      background:linear-gradient(180deg,#22c55e,#16a34a);
      color:#fff;
      border-color:#16a34a;
      box-shadow:0 8px 18px rgba(22,163,74,.16);
    }

    .map-container{
      flex:1 1 auto;
      position:relative;
      min-height:0;
      background:#eaf0f8;
    }

    #map{
      position:absolute;
      inset:0;
    }

    .brand-card{
      position:absolute;
      top:12px;
      left:12px;
      z-index:20;
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      max-width:calc(100% - 104px);
      background:rgba(255,255,255,.96);

      border-radius:18px;

    .brand-title{

      line-height:1.1;
      font-weight:1000;
      color:#0f172a;

    .brand-sub{

      font-size:11px;

      font-weight:900;

      overflow:hidden;
      text-overflow:ellipsis;

    .map-toolbar{

      right:12px;

      flex-direction:column;
      gap:8px;
    }

    .tool-btn{
      min-height:36px;
      border:1px solid #cbd5e1;
      background:rgba(255,255,255,.96);
      color:#0f172a;
      border-radius:999px;
      padding:0 12px;
      font-family:var(--font);
      font-size:12px;
      font-weight:1000;
      cursor:pointer;
      box-shadow:0 6px 18px rgba(15,23,42,.10);
      backdrop-filter:blur(8px);
      white-space:nowrap;
    }

    .tool-btn.on{border-color:#60a5fa;background:#eff6ff;color:#1d4ed8}

    .route-label{

      font-size:12px;

    .address-panel{
      position:absolute;
      left:14px;
      bottom:14px;
      z-index:22;

    .address-panel.visible{display:block}
    .panel-header{

      border-bottom:1px solid #e2e8f0;
      font-size:13px;
      font-weight:1000;
      color:#0f172a;

      align-items:center;

    .address-list{
      max-height:calc(52vh - 44px);
      overflow:auto;
      padding:10px;

      display:grid;

      background:#fff;

      box-shadow:0 2px 8px rgba(15,23,42,.04);

    .address-text{

      overflow-wrap:anywhere;
    }
    .address-meta{

    }
    .address-item .btn{

      border-radius:12px;

    .route-modal{

      background:rgba(15,23,42,.46);
      backdrop-filter:blur(10px);
    }
    .route-modal.visible{display:flex}
    .route-modal-content{
      width:min(520px,100%);
      max-height:min(78vh,720px);
      overflow:auto;
      background:#fff;
      border:1px solid #d8e0ee;
      border-radius:22px;
      box-shadow:0 22px 80px rgba(15,23,42,.22);
      padding:16px;
    }
    .route-modal-title{

      font-size:17px;
      font-weight:1000;
      margin:0 0 12px;
      color:#0f172a;
    }
    .route-item{
      padding:13px 14px;
      margin-bottom:10px;
      background:#f8fafc;
      border:1px solid #e2e8f0;

      color:#1d4ed8;

      color:#64748b;

      line-height:1.4;
    }

    .roadview-wrap{
      position:absolute;
      left:14px;
      right:14px;
      bottom:14px;
      z-index:40;
      height:42vh;

      border:1px solid #d8e0ee;
      border-radius:18px;
      background:#fff;
      box-shadow:var(--shadow);
    }
    .roadview-wrap.visible{display:block}
    .roadview-header{
      height:42px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 12px 0 14px;
      background:#f8fafc;
      border-bottom:1px solid #e2e8f0;
      color:#0f172a;
      font-size:12px;
      font-weight:1000;
    }
    .roadview-actions{display:flex;gap:7px;align-items:center}
    .rv-mini-btn{
      min-height:30px;
      border:1px solid #cbd5e1;
      background:#fff;
      color:#0f172a;
      border-radius:999px;
      padding:0 10px;
      font-family:var(--font);
      font-size:11px;
      font-weight:1000;
      cursor:pointer;
    }
    #roadview{width:100%;height:calc(100% - 42px);background:#000}
    .rv-hint{
      position:absolute;
      left:16px;
      top:58px;
      z-index:50;
      padding:8px 10px;
      border-radius:999px;
      background:rgba(15,23,42,.75);
      color:#fff;
      font-size:12px;
      font-weight:900;
      display:none;
      pointer-events:none;
    }
    .rv-hint.visible{display:block}

    .loading{
      position:absolute;
      inset:0;
      z-index:100;
      background:rgba(246,248,252,.88);
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:12px;
      color:#64748b;
      font-size:13px;
      font-weight:950;
      backdrop-filter:blur(5px);
    }
    .spinner{
      width:38px;
      height:38px;
      border-radius:999px;
      border:4px solid #dbeafe;
      border-top-color:#2563eb;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    @media(max-width:768px){
      .header{
        padding:10px;
      }
      .header-content{
        grid-template-columns:1fr;
        gap:8px;
      }
      .camp-name{
        font-size:17px;
      }
      .camp-address{
        font-size:11px;
      }
      .navi-buttons{
        display:grid;
        grid-template-columns:1fr;
        width:100%;
        gap:7px;
      }
      .btn{
        width:100%;
        min-height:42px;
        font-size:12px;
      }
      .brand-card{
        top:10px;
        left:10px;
        max-width:calc(100% - 96px);
        padding:8px 11px;
        border-radius:16px;
      }
      .brand-card img{width:26px;height:26px}
      .brand-title{font-size:14px}
      .brand-sub{font-size:10px}
      .map-toolbar{
        top:10px;
        right:10px;
      }
      .tool-btn{
        min-height:34px;
        font-size:11px;
        padding:0 10px;
      }
      .address-panel{
        left:10px;
        right:10px;
        bottom:10px;
        width:auto;
        max-height:44vh;
      }
      .address-list{
        max-height:calc(44vh - 44px);
      }
      .roadview-wrap{
        left:10px;
        right:10px;
        bottom:10px;
        height:45vh;
      }
    }
  </style>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=add4ce93b38c0ff9d9b9053728e067b3&autoload=false&libraries=services"></script>
</head>

<body>
<div class="container">
  <div class="header">
    <div class="header-content">
      <div class="camp-info">
        <div class="camp-name" id="campName">

  <div class="route-modal" id="routeModal">

  <div class="map-container">

      <img src="/favicon.ico?v=2" alt="Maroowell" />
      <div style="min-width:0">
        <div class="brand-title" id="mapBrandTitle">배송지도</div>
        <div class="brand-sub">공유 배송지도</div>
      </div>
    </div>

    <div class="map-toolbar">
      <button class="tool-btn" id="mapTypeBtn">위성</button>

      <div class="roadview-header">
        <div>로드뷰</div>

        <span>배송지 목록</span>

    </div>

</div>

<script>
(() => {
  "use strict";

  const API_BASE = "https://route.maroowell.com";
  const ROUTE_ENDPOINT = `${API_BASE}/route`;
  const ADDRESS_ENDPOINT = `${API_BASE}/addresses`;
  const OG_IMAGE_URL = "https://maroowell.com/assets/og/maroowell-1200x630.png?v=1";

  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(location.search);
  const camp = (params.get("camp") || "").trim();
  const codeRaw = (params.get("code") || "").replace(/&.*$/, "").trim();

  const loading = $("loading");
  const naviToCampBtn = $("naviToCampBtn");
  const naviToDeliveryBtn = $("naviToDeliveryBtn");
  const campTitleText = $("campTitleText");
  const mapBrandTitle = $("mapBrandTitle");
  const campAddress = $("campAddress");
  const copyAddressBtn = $("copyAddressBtn");
  const addressPanel = $("addressPanel");
  const addressList = $("addressList");
  const addressCount = $("addressCount");
  const routeModal = $("routeModal");
  const routeList = $("routeList");
  const routeModalTitle = $("routeModalTitle");

  const mapTypeBtn = $("mapTypeBtn");
  const roadviewBtn = $("roadviewBtn");
  const roadviewWrap = $("roadviewWrap");
  const rvCloseBtn = $("rvCloseBtn");
  const rvToCenterBtn = $("rvToCenterBtn");
  const rvHint = $("rvHint");

  let map = null;
  let geocoder = null;
  let roadview = null;
  let roadviewClient = null;
  let roadviewVisible = false;
  let roadviewMarker = null;
  let isSatellite = false;

  let allRoutes = [];
  let routeData = null;
  let addressRows = [];

  const COLOR_PALETTE = [
    "#2563eb","#dc2626","#f59e0b","#16a34a","#7c3aed",
    "#ea580c","#0d9488","#e11d48","#0891b2","#84cc16"
  ];

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function setMeta(selector, attr, value){
    const el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  }

  function updateMeta(title, desc){
    document.title = title;
    setMeta('meta[name="description"]', 'content', desc);
    setMeta('meta[property="og:title"]', 'content', title);
    setMeta('meta[property="og:description"]', 'content', desc);
    setMeta('meta[property="og:url"]', 'content', location.href);
    setMeta('meta[property="og:image"]', 'content', OG_IMAGE_URL);
    setMeta('meta[property="og:image:secure_url"]', 'content', OG_IMAGE_URL);
    setMeta('meta[property="og:image:alt"]', 'content', title);
    setMeta('link[rel="canonical"]', 'href', location.href);
  }

  function parseCodes(raw){
    return String(raw || "")
      .trim()
      .split(/[^0-9a-zA-Z]+/g)
      .map(v => v.trim())
      .filter(Boolean);
  }

  function hashCode(str){
    let h = 0;
    str = String(str || "");
    for (let i=0;i<str.length;i++){
      h = ((h << 5) - h) + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function colorFor(code){
    return COLOR_PALETTE[hashCode(code) % COLOR_PALETTE.length];
  }

  async function apiGet(url){
    const res = await fetch(url, { method:"GET", cache:"no-store" });
    const text = await res.text();
    let json = null;
    try { json = text ? JSON.parse(text) : null; } catch {}
    if (!res.ok) throw new Error(json?.error || json?.message || text || `HTTP ${res.status}`);
    return json;
  }

  function parsePolygonWgs84(v){
    if (!v) return null;
    if (Array.isArray(v)) return v;
    if (typeof v === "string"){
      try {
        const p = JSON.parse(v);
        return Array.isArray(p) ? p : null;
      } catch {}
    }
    return null;
  }

  function normalizeRings(poly){
    if (!Array.isArray(poly) || !poly.length) return [];
    const first = poly[0];

    if (first && typeof first === "object" && "lat" in first && "lng" in first) return [poly];

    if (Array.isArray(first)){
      const ff = first[0];
      if (ff && typeof ff === "object" && "lat" in ff && "lng" in ff) return poly;
      if (Array.isArray(ff) && ff.length >= 2) return poly;
      if (typeof ff === "number") return [poly];
    }

    return [];
  }

  function ringToLatLngs(ring){
    return (ring || []).map(pt => {
      if (pt && typeof pt === "object" && "lat" in pt && "lng" in pt) {
        return new kakao.maps.LatLng(Number(pt.lat), Number(pt.lng));
      }
      if (Array.isArray(pt) && pt.length >= 2) {
        return new kakao.maps.LatLng(Number(pt[1]), Number(pt[0]));
      }
      return null;
    }).filter(Boolean);
  }

  function centroid(latlngs){
    let lat = 0;
    let lng = 0;
    for (const ll of latlngs){
      lat += ll.getLat();
      lng += ll.getLng();
    }
    return new kakao.maps.LatLng(lat / latlngs.length, lng / latlngs.length);
  }

  function centroidLatLngOfPolygonWgs84(polygon_wgs84){
    const poly = parsePolygonWgs84(polygon_wgs84);
    const rings = normalizeRings(poly);
    if (!rings.length) return null;
    const latlngs = ringToLatLngs(rings[0]);
    if (latlngs.length < 3) return null;
    const c = centroid(latlngs);
    return { lat:c.getLat(), lng:c.getLng() };
  }

  function createLabel(text, position, color){
    const el = document.createElement("div");
    el.className = "route-label";
    el.style.borderColor = color;
    el.textContent = text;

    return new kakao.maps.CustomOverlay({
      position,
      content: el,
      yAnchor: 0.5,
      zIndex: 10
    });
  }

  function drawPolygons(rows){
    if (!rows || !rows.length) return;

    const bounds = new kakao.maps.LatLngBounds();
    let hasPolygon = false;

    for (const row of rows){
      const fullCode = String(row.full_code || row.code || "").trim();
      const color = row.color || colorFor(fullCode);
      const poly = parsePolygonWgs84(row.polygon_wgs84);
      const rings = normalizeRings(poly);

      for (const ring of rings){
        const latlngs = ringToLatLngs(ring);
        if (latlngs.length < 3) continue;

        const polygon = new kakao.maps.Polygon({
          path: latlngs,
          strokeWeight: 2,
          strokeColor: color,
          strokeOpacity: 1,
          fillColor: color,
          fillOpacity: 0.22,
          zIndex: 1
        });
        polygon.setMap(map);

        const label = createLabel(fullCode, centroid(latlngs), color);
        label.setMap(map);

        latlngs.forEach(ll => bounds.extend(ll));
        hasPolygon = true;
      }
    }

    if (hasPolygon) map.setBounds(bounds);
  }

  function geocodeAsync(address){
    return new Promise((resolve, reject) => {
      geocoder.addressSearch(address, (result, status) => {
        if (status !== kakao.maps.services.Status.OK || !result?.length) {
          reject(new Error("주소를 찾을 수 없습니다."));
          return;
        }
        resolve({ lat:Number(result[0].y), lng:Number(result[0].x) });
      });
    });
  }

  async function getCampLatLng(){
    if (!routeData) throw new Error("캠프 데이터가 없습니다.");

    const lat = Number(routeData.delivery_location_lat ?? routeData.delivery_lat ?? routeData.lat ?? routeData.y);
    const lng = Number(routeData.delivery_location_lng ?? routeData.delivery_lng ?? routeData.lng ?? routeData.x);

    if (Number.isFinite(lat) && Number.isFinite(lng)) return { lat, lng };

    const addr = routeData.delivery_location_address;
    if (!addr) throw new Error("캠프 주소가 없습니다.");
    return await geocodeAsync(addr);
  }

  function openKakaoRoute({ sp, ep, spName, epName }){
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      let url = "kakaomap://route?by=CAR";
      if (sp) url += `&sp=${sp.lat},${sp.lng}`;
      if (ep) url += `&ep=${ep.lat},${ep.lng}`;
      window.location.href = url;

      setTimeout(() => {
        if (ep) {
          window.location.href = `https://map.kakao.com/link/to/${encodeURIComponent(epName || "목적지")},${ep.lat},${ep.lng}`;
        }
      }, 900);
      return;
    }

    if (sp && ep) {
      const url =
        `https://map.kakao.com/link/from/${encodeURIComponent(spName || "출발")},${sp.lat},${sp.lng}` +
        `/to/${encodeURIComponent(epName || "도착")},${ep.lat},${ep.lng}`;
      window.open(url, "_blank");
    } else if (ep) {
      const url = `https://map.kakao.com/link/to/${encodeURIComponent(epName || "목적지")},${ep.lat},${ep.lng}`;
      window.open(url, "_blank");
    }
  }

  async function openNaviCurrentToCamp(){
    try {
      const ep = await getCampLatLng();
      const epName = routeData?.delivery_location_name || camp || "캠프";
      openKakaoRoute({ ep, epName });
    } catch (e) {
      alert("캠프 길찾기 실패: " + e.message);
    }
  }

  function renderAddressList(){
    if (!addressRows || !addressRows.length) {
      addressPanel.classList.remove("visible");
      addressCount.textContent = "0개";
      return;
    }

    addressCount.textContent = `${addressRows.length.toLocaleString("ko-KR")}개`;
    addressPanel.classList.add("visible");
    addressList.innerHTML = "";

    addressRows.forEach((addr, idx) => {
      const item = document.createElement("div");
      item.className = "address-item";

      const addressText = addr.address || addr.full_address || "주소 없음";
      const dong = addr.dong ? ` (${addr.dong})` : "";
      const zipcode = addr.zipcode ? `우편번호: ${addr.zipcode}` : "";

      item.innerHTML = `
        <div>
          <div class="address-text">${idx + 1}. ${esc(addressText)}${esc(dong)}</div>
          <div class="address-meta">${esc(zipcode)}</div>
        </div>
        <button class="btn green" type="button">캠프 → 이 배송지 길찾기</button>
      `;

      item.querySelector("button").onclick = () => openNaviCampToAddress(addr);
      addressList.appendChild(item);
    });
  }

  function showDeliveryModal(){
    routeModalTitle.textContent = addressRows.length ? "배송지 선택" : "배송 구역 선택";
    routeList.innerHTML = "";

    if (addressRows.length) {
      addressRows.forEach((addr, idx) => {
        const addressText = addr.address || addr.full_address || "주소 없음";
        const zipcode = addr.zipcode ? `우편번호: ${addr.zipcode}` : "";
        const item = document.createElement("div");
        item.className = "route-item";
        item.innerHTML = `
          <div class="route-item-code">${idx + 1}. 배송지</div>
          <div class="route-item-info">${esc(addressText)}${zipcode ? `<br>${esc(zipcode)}` : ""}</div>
        `;
        item.onclick = () => {
          routeModal.classList.remove("visible");
          openNaviCampToAddress(addr);
        };
        routeList.appendChild(item);
      });
      routeModal.classList.add("visible");
      return;
    }

    allRoutes.forEach((r, idx) => {
      const routeCode = r.full_code || r.code || `서브라우트 ${idx + 1}`;
      const item = document.createElement("div");
      item.className = "route-item";
      item.innerHTML = `
        <div class="route-item-code">${esc(routeCode)}</div>
        <div class="route-item-info">캠프 → 선택 구역 중심 길찾기</div>
      `;
      item.onclick = () => {
        routeModal.classList.remove("visible");
        openNaviCampToSubroute(r);
      };
      routeList.appendChild(item);
    });

    if (!allRoutes.length) {
      alert("배송지/라우트 정보가 없습니다.");
      return;
    }

    routeModal.classList.add("visible");
  }

  async function openNaviCampToAddress(addr){
    try {
      const sp = await getCampLatLng();
      const spName = routeData?.delivery_location_name || camp || "캠프";
      const addressText = addr.address || addr.full_address || "배송지";

      const lat = Number(addr.lat ?? addr.latitude ?? addr.y);
      const lng = Number(addr.lng ?? addr.longitude ?? addr.x);

      let ep = null;
      if (Number.isFinite(lat) && Number.isFinite(lng)) ep = { lat, lng };
      else ep = await geocodeAsync(addressText);

      openKakaoRoute({ sp, ep, spName, epName: addressText });
    } catch (e) {
      alert("배송지 길찾기 실패: " + e.message);
    }
  }

  async function openNaviCampToSubroute(route){
    try {
      const sp = await getCampLatLng();
      const spName = routeData?.delivery_location_name || camp || "캠프";
      const routeCode = route.full_code || route.code || "배송구역";
      let ep = null;

      const lat = Number(route.delivery_lat ?? route.delivery_location_lat ?? route.lat ?? route.y);
      const lng = Number(route.delivery_lng ?? route.delivery_location_lng ?? route.lng ?? route.x);

      if (Number.isFinite(lat) && Number.isFinite(lng)) ep = { lat, lng };
      else ep = centroidLatLngOfPolygonWgs84(route.polygon_wgs84);

      if (!ep) throw new Error("배송 구역 좌표를 만들 수 없습니다.");

      openKakaoRoute({ sp, ep, spName, epName: routeCode });
    } catch (e) {
      alert("배송 구역 길찾기 실패: " + e.message);
    }
  }

  function toggleSatellite(){
    isSatellite = !isSatellite;
    map.setMapTypeId(isSatellite ? kakao.maps.MapTypeId.HYBRID : kakao.maps.MapTypeId.ROADMAP);
    mapTypeBtn.textContent = isSatellite ? "일반" : "위성";
    mapTypeBtn.classList.toggle("on", isSatellite);
  }

  function ensureRoadview(){
    if (roadview && roadviewClient) return;
    roadviewClient = new kakao.maps.RoadviewClient();
    roadview = new kakao.maps.Roadview($("roadview"));
    roadviewMarker = new kakao.maps.Marker({ position:map.getCenter() });
  }

  function setRoadviewAt(latlng){
    ensureRoadview();
    roadviewClient.getNearestPanoId(latlng, 80, panoId => {
      if (!panoId) {
        alert("이 위치 근처에 로드뷰가 없습니다.");
        return;
      }
      roadview.setPanoId(panoId, latlng);
      roadviewMarker.setPosition(latlng);
      roadviewMarker.setMap(map);
    });
  }

  function toggleRoadview(){
    roadviewVisible = !roadviewVisible;
    roadviewWrap.classList.toggle("visible", roadviewVisible);
    roadviewBtn.classList.toggle("on", roadviewVisible);
    roadviewBtn.textContent = roadviewVisible ? "로드뷰 ON" : "로드뷰";
    rvHint.classList.toggle("visible", roadviewVisible);

    if (roadviewVisible) setRoadviewAt(map.getCenter());
    else if (roadviewMarker) roadviewMarker.setMap(null);
  }

  async function fetchRoutes(codes){
    const out = [];
    const seen = new Set();

    const run = async singleCode => {
      const u = new URL(ROUTE_ENDPOINT);
      u.searchParams.set("camp", camp);
      u.searchParams.set("mode", "prefix");
      if (singleCode) u.searchParams.set("code", singleCode);
      const d = await apiGet(u.toString());
      for (const r of d?.rows || []) {
        const k = r?.id != null ? String(r.id) : `${r?.camp || ""}/${r?.full_code || r?.code || ""}`;
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(r);
      }
    };

    if (!codes.length) await run("");
    else for (const c of codes) await run(c);

    return out;
  }

  async function fetchAddresses(codes){
    const out = [];
    const seen = new Set();

    const run = async singleCode => {
      const u = new URL(ADDRESS_ENDPOINT);
      u.searchParams.set("camp", camp);
      if (singleCode) {
        u.searchParams.set("code", singleCode);
        u.searchParams.set("mode", "prefix");
      }
      const d = await apiGet(u.toString());
      for (const r of d?.rows || []) {
        const k = r?.id != null ? String(r.id) : `${r?.address || r?.full_address || ""}|${r?.zipcode || ""}|${r?.full_code || ""}`;
        if (seen.has(k)) continue;
        seen.add(k);
        out.push(r);
      }
    };

    if (!codes.length) await run("");
    else for (const c of codes) await run(c);

    return out;
  }

  async function loadData(){
    try {
      if (!camp) throw new Error("camp 파라미터가 없습니다.");

      const codes = parseCodes(codeRaw);
      allRoutes = await fetchRoutes(codes);

      if (!allRoutes.length) throw new Error("라우트 데이터를 찾을 수 없습니다.");

      routeData = allRoutes[0];

      const displayName = routeData.delivery_location_name || "캠프";
      const displayAddress = routeData.delivery_location_address || "주소 정보 없음";
      const displayCode = codeRaw || (allRoutes.length === 1 ? (allRoutes[0].full_code || allRoutes[0].code || "") : "");

      const title = displayCode ? `${camp} ${displayCode}` : `${camp} ${displayName}`;
      campTitleText.textContent = title;
      mapBrandTitle.textContent = title;
      campAddress.textContent = displayAddress;

      updateMeta(title, displayAddress && displayAddress !== "주소 정보 없음"
        ? `${displayAddress} · ${title} 배송 구역을 확인하세요`
        : `${title} 배송 구역을 확인하세요`);

      if (displayAddress && displayAddress !== "주소 정보 없음") {
        copyAddressBtn.style.display = "inline-block";
      }

      drawPolygons(allRoutes);

      try {
        addressRows = await fetchAddresses(codes);
        renderAddressList();
      } catch (e) {
        addressRows = [];
        renderAddressList();
        console.warn("배송지 로드 실패:", e);
      }

      loading.style.display = "none";
    } catch (e) {
      console.error(e);
      loading.innerHTML = `
        <div style="text-align:center;color:#dc2626;padding:24px">
          <div style="font-size:42px;margin-bottom:12px">⚠️</div>
          <div style="font-size:16px;font-weight:1000;margin-bottom:8px">데이터 로드 실패</div>
          <div style="font-size:13px;color:#64748b;font-weight:900;white-space:pre-wrap">${esc(e.message || e)}</div>
        </div>
      `;
    }
  }

  function init(){
    updateMeta(camp && codeRaw ? `${camp} ${codeRaw}` : (camp || "배송 지도 공유"), "배송 구역 및 경로를 확인하세요");

    kakao.maps.load(() => {
      map = new kakao.maps.Map($("map"), {
        center:new kakao.maps.LatLng(37.5665, 126.978),
        level:8,
        draggable:true,
        scrollwheel:true,
        disableDoubleClickZoom:false
      });

      geocoder = new kakao.maps.services.Geocoder();
      map.addControl(new kakao.maps.ZoomControl(), kakao.maps.ControlPosition.RIGHT);

      mapTypeBtn.onclick = toggleSatellite;
      roadviewBtn.onclick = toggleRoadview;
      rvCloseBtn.onclick = () => { if (roadviewVisible) toggleRoadview(); };
      rvToCenterBtn.onclick = () => { if (roadviewVisible) setRoadviewAt(map.getCenter()); };

      kakao.maps.event.addListener(map, "click", e => {
        if (roadviewVisible && e?.latLng) setRoadviewAt(e.latLng);
      });

      routeModal.onclick = e => {
        if (e.target === routeModal) routeModal.classList.remove("visible");
      };

      naviToCampBtn.onclick = () => {
        if (!routeData) return alert("데이터 로딩 중입니다.");
        openNaviCurrentToCamp();
      };

      naviToDeliveryBtn.onclick = () => {
        if (!routeData) return alert("데이터 로딩 중입니다.");
        showDeliveryModal();
      };

      copyAddressBtn.onclick = () => {
        const address = campAddress.textContent || "";
        navigator.clipboard.writeText(address).then(() => {
          const old = copyAddressBtn.textContent;
          copyAddressBtn.textContent = "복사됨";
          setTimeout(() => copyAddressBtn.textContent = old, 1600);
        }).catch(err => alert("복사 실패: " + err.message));
      };

      loadData();
    });
  }

  init();
})();
</script>
