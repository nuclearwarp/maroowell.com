<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>배송 지도 공유</title>
  <meta name="description" content="배송 구역 및 경로를 확인하세요" />

  <!-- Open Graph / 카카오 링크 미리보기 -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Maroowell" />
  <meta property="og:title" content="배송 지도 공유" />
  <meta property="og:description" content="배송 구역 및 경로를 확인하세요" />
  <meta property="og:url" content="https://maroowell.com/share.html" />
  <meta property="og:image" content="https://maroowell.com/maroowell-logo2.png?v=20260315-3" />
  <meta property="og:image:secure_url" content="https://maroowell.com/maroowell-logo2.png?v=20260315-3" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="Maroowell 배송 지도 공유" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="배송 지도 공유" />
  <meta name="twitter:description" content="배송 구역 및 경로를 확인하세요" />
  <meta name="twitter:image" content="https://maroowell.com/maroowell-logo2.png?v=20260315-3" />

  <link rel="canonical" href="https://maroowell.com/share.html" />

  <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2d;
      --txt:#e6eefc;
      --muted:#93a4c7;
      --line:rgba(255,255,255,.08);
      --btn:#162744;
      --btn2:#1a2f55;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html,body{height:100%; font-family:system-ui, -apple-system, "Noto Sans KR", sans-serif; background:var(--bg); color:var(--txt);}
    .container{display:flex; flex-direction:column; height:100vh;}

    .header{
      background:linear-gradient(135deg, #1a2f55 0%, #0f1a2d 100%);
      padding:20px;
      border-bottom:2px solid var(--line);
      box-shadow:0 4px 12px rgba(0,0,0,.3);
      text-align:center;
    }
    .header-content{
      max-width:600px;
      margin:0 auto;
    }
    .camp-info{
      margin-bottom:16px;
    }
    .camp-name{
      font-size:24px;
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:0.3px;
      color:#00C2FF;
    }
    .camp-address{
      font-size:14px;
      color:var(--muted);
      line-height:1.5;
      margin-bottom:4px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .copy-btn{
      background:rgba(0,194,255,.15);
      border:1px solid rgba(0,194,255,.3);
      color:#00C2FF;
      padding:4px 8px;
      border-radius:6px;
      cursor:pointer;
      font-size:12px;
      transition:all 0.2s;
      white-space:nowrap;
    }
    .copy-btn:hover{
      background:rgba(0,194,255,.25);
      border-color:#00C2FF;
    }

    .navi-buttons{
      display:flex;
      gap:8px;
      flex-direction:column;
    }
    .btn{
      width:100%;
      padding:14px 20px;
      border-radius:12px;
      border:1px solid var(--line);
      background:var(--btn);
      color:var(--txt);
      cursor:pointer;
      font-weight:700;
      font-size:15px;
      white-space:nowrap;
      transition:all 0.2s;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
    }
    .btn:hover{background:var(--btn2); transform:translateY(-1px);}
    .btn.primary{
      background:linear-gradient(135deg, #00C2FF 0%, #0088CC 100%);
      border-color:#00C2FF;
      color:#fff;
      box-shadow:0 4px 12px rgba(0,194,255,.25);
      font-size:16px;
      padding:16px 20px;
    }
    .btn.primary:hover{
      box-shadow:0 6px 16px rgba(0,194,255,.35);
    }

    .map-container{flex:1; position:relative;}
    #map{position:absolute; inset:0;}

    .map-toolbar{
      position:absolute;
      top:12px;
      right:12px;
      z-index:200;
      display:flex;
      flex-direction:column;
      gap:8px;
      pointer-events:auto;
    }
    .tool-btn{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(15,26,45,.88);
      backdrop-filter:blur(10px);
      color:var(--txt);
      cursor:pointer;
      font-weight:800;
      font-size:13px;
      box-shadow:0 8px 18px rgba(0,0,0,.30);
      transition:all .15s ease;
      white-space:nowrap;
    }
    .tool-btn:hover{transform:translateY(-1px); border-color:rgba(0,194,255,.35)}
    .tool-btn.on{
      border-color:rgba(0,194,255,.55);
      box-shadow:0 10px 20px rgba(0,194,255,.15);
    }

    .roadview-wrap{
      position:absolute;
      left:10px;
      right:10px;
      bottom:10px;
      height:42vh;
      min-height:260px;
      background:rgba(15,26,45,.96);
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      box-shadow:0 12px 28px rgba(0,0,0,.45);
      z-index:300;
      overflow:hidden;
      display:none;
    }
    .roadview-wrap.visible{display:block;}
    .roadview-header{
      height:44px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 12px 0 14px;
      border-bottom:1px solid rgba(255,255,255,.08);
      color:var(--txt);
      font-weight:800;
      font-size:13px;
      background:rgba(0,0,0,.18);
    }
    .roadview-actions{
      display:flex;
      gap:8px;
      align-items:center;
    }
    .rv-mini-btn{
      padding:8px 10px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.18);
      color:var(--txt);
      cursor:pointer;
      font-weight:800;
      font-size:12px;
    }
    .rv-mini-btn:hover{border-color:rgba(0,194,255,.35)}
    #roadview{
      width:100%;
      height:calc(100% - 44px);
      background:#000;
    }
    .rv-hint{
      position:absolute;
      left:16px;
      top:58px;
      z-index:400;
      padding:8px 10px;
      border-radius:12px;
      background:rgba(0,0,0,.55);
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      font-size:12px;
      font-weight:700;
      display:none;
    }
    .rv-hint.visible{display:block;}

    .address-panel{
      position:absolute;
      bottom:20px;
      left:20px;
      max-width:360px;
      max-height:60vh;
      background:rgba(15,26,45,.95);
      backdrop-filter:blur(10px);
      border:1px solid var(--line);
      border-radius:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.4);
      overflow:hidden;
      display:none;
      z-index:150;
    }
    .address-panel.visible{display:block;}
    .panel-header{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      font-weight:700;
      font-size:15px;
      background:rgba(0,0,0,.2);
    }
    .address-list{
      max-height:calc(60vh - 60px);
      overflow-y:auto;
      padding:10px;
    }
    .address-item{
      padding:14px 16px;
      margin-bottom:8px;
      background:rgba(0,0,0,.15);
      border:1px solid var(--line);
      border-radius:12px;
      font-size:13px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition:all 0.2s;
    }
    .address-item:hover{background:rgba(0,0,0,.25); border-color:#00C2FF;}
    .address-info{flex:1; min-width:0;}
    .address-text{font-weight:600; color:var(--txt); margin-bottom:4px; word-break:break-all;}
    .address-meta{color:var(--muted); font-size:12px;}
    .address-item .btn{
      padding:10px 16px;
      font-size:14px;
      width:100%;
      border-radius:8px;
    }

    .loading{
      position:absolute;
      inset:0;
      background:rgba(11,18,32,.85);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:100;
      flex-direction:column;
      gap:12px;
    }
    .spinner{
      width:40px;
      height:40px;
      border:4px solid rgba(255,255,255,.1);
      border-top-color:#00C2FF;
      border-radius:50%;
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-text{font-size:14px; color:var(--muted);}

    .route-label{
      padding:5px 10px;
      border-radius:12px;
      background:rgba(0,0,0,.10);
      color:#fff;
      font-size:12px;
      border:2px solid rgba(255,255,255,.22);
      white-space:nowrap;
      box-shadow:0 3px 10px rgba(0,0,0,.35);
      font-weight:800;
      letter-spacing:0.2px;
      backdrop-filter:blur(4px);
    }

    .route-modal{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.8);
      backdrop-filter:blur(8px);
      z-index:1000;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .route-modal.visible{display:flex;}
    .route-modal-content{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:16px;
      padding:24px;
      max-width:500px;
      width:100%;
      max-height:80vh;
      overflow-y:auto;
    }
    .route-modal-title{
      font-size:20px;
      font-weight:800;
      margin-bottom:16px;
      text-align:center;
    }
    .route-item{
      padding:16px;
      margin-bottom:12px;
      background:rgba(0,0,0,.2);
      border:1px solid var(--line);
      border-radius:12px;
      cursor:pointer;
      transition:all 0.2s;
    }
    .route-item:hover{
      background:rgba(0,0,0,.3);
      border-color:#00C2FF;
      transform:translateY(-2px);
    }
    .route-item-code{
      font-size:18px;
      font-weight:700;
      color:#00C2FF;
      margin-bottom:8px;
    }
    .route-item-info{
      font-size:13px;
      color:var(--muted);
    }

    @media (max-width: 768px){
      .address-panel{
        left:10px;
        right:10px;
        bottom:10px;
        max-width:none;
      }
      .route-modal-content{
        padding:20px;
      }
      .roadview-wrap{
        left:10px;
        right:10px;
        bottom:10px;
        height:45vh;
      }
      .map-toolbar{
        right:10px;
        top:10px;
      }
    }
  </style>

  <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=add4ce93b38c0ff9d9b9053728e067b3&autoload=false&libraries=services"></script>
</head>

<body>
<div class="container">
  <div class="header">
    <div class="header-content">
      <div class="camp-info">
        <div class="camp-name" id="campName">📍 배송 구역 안내</div>
        <div class="camp-address">
          <span id="campAddress">주소 정보 로딩 중...</span>
          <button class="copy-btn" id="copyAddressBtn" style="display:none;">📋 복사</button>
        </div>
      </div>

      <div class="navi-buttons">
        <button class="btn primary" id="naviToCampBtn">
          🧭 현재위치 → 캠프까지 길찾기
        </button>

        <button class="btn" id="naviToDeliveryBtn"
          style="background:linear-gradient(135deg, #22C55E 0%, #16A34A 100%); border-color:#22C55E; color:#fff;">
          캠프 → 배송지 카카오지도 연동♪
        </button>
      </div>
    </div>
  </div>

  <div class="route-modal" id="routeModal">
    <div class="route-modal-content">
      <div class="route-modal-title" id="routeModalTitle">배송지 선택</div>
      <div id="routeList"></div>
    </div>
  </div>

  <div class="map-container">
    <div id="map"></div>

    <div class="map-toolbar">
      <button class="tool-btn" id="mapTypeBtn">🛰 위성</button>
      <button class="tool-btn" id="roadviewBtn">🧿 로드뷰</button>
    </div>

    <div class="roadview-wrap" id="roadviewWrap">
      <div class="roadview-header">
        <div>🧿 로드뷰 (지도 클릭으로 위치 변경)</div>
        <div class="roadview-actions">
          <button class="rv-mini-btn" id="rvToCenterBtn">📍 지도중심</button>
          <button class="rv-mini-btn" id="rvCloseBtn">닫기</button>
        </div>
      </div>
      <div class="rv-hint" id="rvHint">로드뷰가 켜져 있습니다. 지도에서 보고 싶은 지점을 탭하세요.</div>
      <div id="roadview"></div>
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">지도 데이터 로딩 중...</div>
    </div>

    <div class="address-panel" id="addressPanel">
      <div class="panel-header">📦 배송지 목록</div>
      <div class="address-list" id="addressList"></div>
    </div>
  </div>
</div>

<script>
(() => {
  const API_BASE = "https://route.maroowell.com";
  const ROUTE_ENDPOINT = `${API_BASE}/route`;
  const ADDRESS_ENDPOINT = `${API_BASE}/addresses`;
  const DEFAULT_OG_IMAGE = "https://maroowell.com/maroowell-logo2.png?v=20260315-3";

  const $ = (id) => document.getElementById(id);

  function setMeta(selector, attr, value) {
    const el = document.querySelector(selector);
    if (el) el.setAttribute(attr, value);
  }

  function buildShareUrl() {
    const url = new URL(location.href);
    url.hash = "";
    return url.toString();
  }

  function buildMetaTitle(campValue, displayName, displayCode) {
    let title = `${campValue} ${displayName}`.trim();
    if (displayCode) title += ` ${displayCode}`;
    return title || "배송 지도 공유";
  }

  function updateMetaTags(title, description) {
    const shareUrl = buildShareUrl();
    document.title = title;
    setMeta('meta[name="description"]', 'content', description);
    setMeta('meta[property="og:title"]', 'content', title);
    setMeta('meta[property="og:description"]', 'content', description);
    setMeta('meta[property="og:url"]', 'content', shareUrl);
    setMeta('meta[property="og:image"]', 'content', DEFAULT_OG_IMAGE);
    setMeta('meta[property="og:image:secure_url"]', 'content', DEFAULT_OG_IMAGE);
    setMeta('meta[property="og:image:alt"]', 'content', title);
    setMeta('meta[name="twitter:title"]', 'content', title);
    setMeta('meta[name="twitter:description"]', 'content', description);
    setMeta('meta[name="twitter:image"]', 'content', DEFAULT_OG_IMAGE);
    setMeta('link[rel="canonical"]', 'href', shareUrl);
  }

  const loading = $("loading");
  const naviToCampBtn = $("naviToCampBtn");
  const naviToDeliveryBtn = $("naviToDeliveryBtn");
  const campName = $("campName");
  const campAddress = $("campAddress");
  const copyAddressBtn = $("copyAddressBtn");
  const addressPanel = $("addressPanel");
  const addressList = $("addressList");
  const routeModal = $("routeModal");
  const routeList = $("routeList");
  const routeModalTitle = $("routeModalTitle");

  const mapTypeBtn = $("mapTypeBtn");
  const roadviewBtn = $("roadviewBtn");
  const roadviewWrap = $("roadviewWrap");
  const rvCloseBtn = $("rvCloseBtn");
  const rvToCenterBtn = $("rvToCenterBtn");
  const rvHint = $("rvHint");

  let map, geocoder;

  let roadview = null;
  let roadviewClient = null;
  let roadviewVisible = false;
  let roadviewMarker = null;
  let lastRoadviewLatLng = null;

  let isSatellite = false;

  let allRoutes = [];
  let routeData = null;
  let addressRows = [];

  const params = new URLSearchParams(location.search);
  const camp = params.get("camp") || "";
  const code = (params.get("code") || "").replace(/&.*$/, "").trim();

  const COLOR_PALETTE = [
    "#00C2FF", "#FF4D6D", "#FFD166", "#06D6A0", "#A78BFA",
    "#F97316", "#22C55E", "#E11D48", "#3B82F6", "#F59E0B"
  ];

  function hashCode(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) {
      h = (h << 5) - h + str.charCodeAt(i);
      h |= 0;
    }
    return Math.abs(h);
  }

  function colorFor(code) {
    return COLOR_PALETTE[hashCode(code) % COLOR_PALETTE.length];
  }

  async function apiGet(url) {
    const res = await fetch(url, { method: "GET" });
    const text = await res.text();
    let json = null;
    try { json = text ? JSON.parse(text) : null; } catch {}
    if (!res.ok) {
      const msg = json?.error || text || `HTTP ${res.status}`;
      throw new Error(msg);
    }
    return json;
  }

  function parsePolygonWgs84(v) {
    if (!v) return null;
    if (Array.isArray(v)) return v;
    if (typeof v === "string") {
      try {
        const p = JSON.parse(v);
        if (Array.isArray(p)) return p;
      } catch (e) {}
    }
    return null;
  }

  function centroidOfLatLngs(latlngs) {
    let latSum = 0, lngSum = 0;
    for (const ll of latlngs) {
      latSum += ll.getLat();
      lngSum += ll.getLng();
    }
    return new kakao.maps.LatLng(latSum / latlngs.length, lngSum / latlngs.length);
  }

  function createLabel(text, position, color) {
    const el = document.createElement("div");
    el.className = "route-label";
    el.style.borderColor = color;
    el.style.background = `linear-gradient(135deg, ${color}14, ${color}26)`;
    el.innerHTML = `📦 ${text}`;

    return new kakao.maps.CustomOverlay({
      position,
      content: el,
      yAnchor: 0.5,
      zIndex: 10
    });
  }

  function extractRingLatLngs(poly) {
    if (!poly) return [];
    const first = poly[0];
    let ring = null;

    if (first && typeof first === "object" && "lat" in first && "lng" in first) {
      ring = poly;
    } else if (Array.isArray(first)) {
      const firstOfFirst = first[0];

      if (firstOfFirst && typeof firstOfFirst === "object" && "lat" in firstOfFirst && "lng" in firstOfFirst) {
        ring = first;
      } else if (Array.isArray(firstOfFirst) && firstOfFirst.length >= 2) {
        ring = first;
      } else if (typeof firstOfFirst === "number") {
        ring = poly;
      }
    }

    if (!Array.isArray(ring)) return [];

    return ring.map(pt => {
      if (pt && typeof pt === "object" && "lat" in pt && "lng" in pt) {
        return { lat: Number(pt.lat), lng: Number(pt.lng) };
      }
      if (Array.isArray(pt) && pt.length >= 2) {
        return { lat: Number(pt[1]), lng: Number(pt[0]) };
      }
      return null;
    }).filter(v => v && isFinite(v.lat) && isFinite(v.lng));
  }

  function centroidLatLngOfPolygonWgs84(polygon_wgs84) {
    const poly = parsePolygonWgs84(polygon_wgs84);
    if (!poly) return null;

    const ring = extractRingLatLngs(poly);
    if (!ring || ring.length < 3) return null;

    let latSum = 0, lngSum = 0;
    for (const p of ring) {
      latSum += p.lat;
      lngSum += p.lng;
    }
    return { lat: latSum / ring.length, lng: lngSum / ring.length };
  }

  function drawPolygons(rows) {
    if (!rows || rows.length === 0) return;

    const bounds = new kakao.maps.LatLngBounds();
    let hasPolygon = false;

    for (const row of rows) {
      const fullCode = row.full_code || row.code || "";
      const color = row.color || colorFor(fullCode);
      const poly = parsePolygonWgs84(row.polygon_wgs84);

      if (!poly || !Array.isArray(poly) || poly.length === 0) continue;

      let rings = [];
      const first = poly[0];

      if (first && typeof first === "object" && "lat" in first && "lng" in first) {
        rings = [poly];
      } else if (Array.isArray(first)) {
        const firstOfFirst = first[0];
        if (firstOfFirst && typeof firstOfFirst === "object" && "lat" in firstOfFirst && "lng" in firstOfFirst) {
          rings = poly;
        } else if (Array.isArray(firstOfFirst) && firstOfFirst.length >= 2) {
          rings = poly;
        } else if (typeof firstOfFirst === "number") {
          rings = [poly];
        }
      }

      for (const ring of rings) {
        if (!Array.isArray(ring) || ring.length < 3) continue;

        const latlngs = ring.map(pt => {
          if (pt && typeof pt === "object" && "lat" in pt && "lng" in pt) {
            return new kakao.maps.LatLng(pt.lat, pt.lng);
          } else if (Array.isArray(pt) && pt.length >= 2) {
            return new kakao.maps.LatLng(pt[1], pt[0]);
          }
          return null;
        }).filter(ll => ll !== null);

        if (latlngs.length < 3) continue;

        const polygon = new kakao.maps.Polygon({
          path: latlngs,
          strokeWeight: 2,
          strokeColor: color,
          strokeOpacity: 1.0,
          strokeStyle: "solid",
          fillColor: color,
          fillOpacity: 0.20,
          zIndex: 1
        });
        polygon.setMap(map);

        const center = centroidOfLatLngs(latlngs);
        const label = createLabel(fullCode, center, color);
        label.setMap(map);

        latlngs.forEach(ll => bounds.extend(ll));
        hasPolygon = true;
      }
    }

    if (hasPolygon) {
      map.setBounds(bounds);
    }
  }

  function renderAddressList() {
    if (!addressRows || addressRows.length === 0) {
      addressPanel.classList.remove("visible");
      return;
    }

    addressPanel.classList.add("visible");
    addressList.innerHTML = "";

    addressRows.forEach((addr, idx) => {
      const item = document.createElement("div");
      item.className = "address-item";

      const addressText = addr.address || addr.full_address || "주소 없음";
      const dong = addr.dong ? `(${addr.dong})` : "";
      const zipcode = addr.zipcode ? `우편번호: ${addr.zipcode}` : "";

      item.innerHTML = `
        <div class="address-info">
          <div class="address-text">${idx + 1}. ${addressText} ${dong}</div>
          <div class="address-meta">${zipcode}</div>
        </div>
        <button class="btn">🚗 길찾기</button>
      `;

      const btn = item.querySelector("button");
      btn.onclick = () => openNaviToAddress(addr);

      addressList.appendChild(item);
    });
  }

  routeModal.onclick = (e) => {
    if (e.target === routeModal) {
      routeModal.classList.remove("visible");
    }
  };

  function geocodeAsync(address) {
    return new Promise((resolve, reject) => {
      geocoder.addressSearch(address, (result, status) => {
        if (status !== kakao.maps.services.Status.OK || !result?.length) {
          reject(new Error("주소를 찾을 수 없습니다."));
          return;
        }
        resolve({ lat: Number(result[0].y), lng: Number(result[0].x) });
      });
    });
  }

  async function getCampLatLng() {
    if (!routeData) throw new Error("캠프 데이터가 없습니다.");

    const lat =
      Number(routeData.delivery_location_lat ?? routeData.delivery_lat ?? routeData.lat ?? routeData.y);
    const lng =
      Number(routeData.delivery_location_lng ?? routeData.delivery_lng ?? routeData.lng ?? routeData.x);

    if (isFinite(lat) && isFinite(lng)) return { lat, lng };

    const addr = routeData.delivery_location_address;
    if (!addr) throw new Error("캠프 주소가 없습니다.");
    return await geocodeAsync(addr);
  }

  function openKakaoRoute({ sp, ep, spName, epName }) {
    const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      let url = `kakaomap://route?by=CAR`;
      if (sp) url += `&sp=${sp.lat},${sp.lng}`;
      if (ep) url += `&ep=${ep.lat},${ep.lng}`;
      window.location.href = url;
      return;
    }

    if (sp && ep) {
      const url =
        `https://map.kakao.com/link/from/${encodeURIComponent(spName || "출발")},${sp.lat},${sp.lng}` +
        `/to/${encodeURIComponent(epName || "도착")},${ep.lat},${ep.lng}`;
      window.open(url, "_blank");
    } else if (ep) {
      const url =
        `https://map.kakao.com/link/to/${encodeURIComponent(epName || "목적지")},${ep.lat},${ep.lng}`;
      window.open(url, "_blank");
    }
  }

  async function openNaviCurrentToCamp() {
    try {
      const campLatLng = await getCampLatLng();
      const epName = routeData?.delivery_location_name || camp || "캠프";
      openKakaoRoute({ ep: campLatLng, epName });
    } catch (e) {
      alert("캠프 길찾기 실패: " + e.message);
    }
  }

  function showSubrouteModalForDelivery() {
    if (!allRoutes || allRoutes.length === 0) {
      alert("라우트 정보가 없습니다.");
      return;
    }

    if (allRoutes.length === 1) {
      openNaviCampToSubroute(allRoutes[0]);
      return;
    }

    routeModalTitle.textContent = "배송지 선택(서브라우트)";
    routeList.innerHTML = "";

    allRoutes.forEach((r, idx) => {
      const item = document.createElement("div");
      item.className = "route-item";

      const routeCode = r.full_code || r.code || `서브라우트 ${idx + 1}`;
      const info1 = "캠프 → 선택 구역 중심(좌표) 길찾기";

      item.innerHTML = `
        <div class="route-item-code">${routeCode}</div>
        <div class="route-item-info">${info1}</div>
      `;

      item.onclick = () => {
        routeModal.classList.remove("visible");
        openNaviCampToSubroute(r);
      };

      routeList.appendChild(item);
    });

    routeModal.classList.add("visible");
  }

  async function openNaviCampToSubroute(route) {
    try {
      const sp = await getCampLatLng();
      const spName = routeData?.delivery_location_name || camp || "캠프";

      const lat =
        Number(route.delivery_lat ?? route.delivery_location_lat ?? route.lat ?? route.y);
      const lng =
        Number(route.delivery_lng ?? route.delivery_location_lng ?? route.lng ?? route.x);

      let ep = null;
      if (isFinite(lat) && isFinite(lng)) {
        ep = { lat, lng };
      } else {
        ep = centroidLatLngOfPolygonWgs84(route.polygon_wgs84);
      }

      if (!ep) throw new Error("서브라우트 배송지 좌표를 만들 수 없습니다.");

      const epName = route.full_code || route.code || "배송지";
      openKakaoRoute({ sp, ep, spName, epName });
    } catch (e) {
      alert("배송지 연동 실패: " + e.message);
    }
  }

  function openNaviToAddress(addr) {
    if (!routeData) {
      alert("캠프 데이터 로딩 중입니다.");
      return;
    }

    const addressText = addr.address || addr.full_address;

    const endLat = Number(addr.lat ?? addr.latitude ?? addr.y);
    const endLng = Number(addr.lng ?? addr.longitude ?? addr.x);

    (async () => {
      try {
        const sp = await getCampLatLng();
        const spName = routeData?.delivery_location_name || camp || "캠프";

        if (isFinite(endLat) && isFinite(endLng)) {
          openKakaoRoute({
            sp,
            ep: { lat: endLat, lng: endLng },
            spName,
            epName: addressText || "배송지"
          });
          return;
        }

        if (!addressText) throw new Error("배송지 주소 정보가 없습니다.");
        const ep = await geocodeAsync(addressText);

        openKakaoRoute({
          sp,
          ep,
          spName,
          epName: addressText
        });
      } catch (e) {
        alert("길찾기 실패: " + e.message);
      }
    })();
  }

  function toggleSatellite() {
    isSatellite = !isSatellite;

    if (isSatellite) {
      map.setMapTypeId(kakao.maps.MapTypeId.HYBRID);
      mapTypeBtn.textContent = "🗺 일반";
      mapTypeBtn.classList.add("on");
    } else {
      map.setMapTypeId(kakao.maps.MapTypeId.ROADMAP);
      mapTypeBtn.textContent = "🛰 위성";
      mapTypeBtn.classList.remove("on");
    }
  }

  function ensureRoadview() {
    if (roadview && roadviewClient) return;

    roadviewClient = new kakao.maps.RoadviewClient();
    roadview = new kakao.maps.Roadview($("roadview"));

    roadviewMarker = new kakao.maps.Marker({
      position: map.getCenter()
    });
  }

  function showRoadviewHint(on) {
    rvHint.classList.toggle("visible", !!on);
  }

  function setRoadviewAt(latlng) {
    ensureRoadview();

    lastRoadviewLatLng = latlng;

    roadviewClient.getNearestPanoId(latlng, 50, (panoId) => {
      if (!panoId) {
        alert("이 위치 근처에 로드뷰가 없습니다. (조금 다른 지점을 눌러보세요)");
        return;
      }
      roadview.setPanoId(panoId, latlng);
      roadviewMarker.setPosition(latlng);
      roadviewMarker.setMap(map);
    });
  }

  function toggleRoadview() {
    roadviewVisible = !roadviewVisible;

    if (roadviewVisible) {
      roadviewWrap.classList.add("visible");
      roadviewBtn.classList.add("on");
      roadviewBtn.textContent = "🧿 로드뷰 ON";
      showRoadviewHint(true);

      const center = map.getCenter();
      setRoadviewAt(center);
    } else {
      roadviewWrap.classList.remove("visible");
      roadviewBtn.classList.remove("on");
      roadviewBtn.textContent = "🧿 로드뷰";
      showRoadviewHint(false);

      if (roadviewMarker) roadviewMarker.setMap(null);
    }
  }

  async function loadData() {
    try {
      if (!camp) throw new Error("캠프 정보가 없습니다. (camp 파라미터 필요)");

      const codes = code ? code.split(/[,\s]+/).map(s => s.trim()).filter(Boolean) : [];

      const fetchRoutes = async (singleCode) => {
        const u = new URL(ROUTE_ENDPOINT);
        u.searchParams.set("camp", camp);
        u.searchParams.set("mode", "prefix");
        if (singleCode) u.searchParams.set("code", singleCode);
        const d = await apiGet(u.toString());
        return d?.rows || [];
      };

      let rows = [];
      if (codes.length <= 1) {
        rows = await fetchRoutes(codes[0] || "");
      } else {
        for (const c of codes) {
          const part = await fetchRoutes(c);
          if (part && part.length) rows.push(...part);
        }
        const seen = new Set();
        rows = rows.filter(r => {
          const k = (r && r.id != null) ? String(r.id) : `${r?.camp || ""}/${r?.full_code || r?.code || ""}`;
          if (seen.has(k)) return false;
          seen.add(k);
          return true;
        });
      }

      if (!rows.length) throw new Error("라우트 데이터를 찾을 수 없습니다.");

      allRoutes = rows;
      routeData = rows[0];

      const displayName = routeData.delivery_location_name || "캠프";
      const displayAddress = routeData.delivery_location_address || "주소 정보 없음";
      const displayCode = code || (allRoutes.length === 1 ? (allRoutes[0].full_code || allRoutes[0].code || "") : "");

      campName.textContent = `📍 ${camp} ${displayName}`;
      campAddress.textContent = displayAddress;

      const pageTitle = buildMetaTitle(camp, displayName, displayCode);
      const pageDescription = `${pageTitle} 배송 구역을 확인하세요`;
      updateMetaTags(pageTitle, pageDescription);

      if (displayAddress && displayAddress !== "주소 정보 없음") {
        copyAddressBtn.style.display = "inline-block";
      }

      drawPolygons(allRoutes);

      try {
        let merged = [];

        const fetchAddrs = async (singleCode) => {
          const au = new URL(ADDRESS_ENDPOINT);
          au.searchParams.set("camp", camp);
          if (singleCode) {
            au.searchParams.set("code", singleCode);
            au.searchParams.set("mode", "prefix");
          }
          const ad = await apiGet(au.toString());
          return ad?.rows || [];
        };

        if (codes.length <= 1) {
          merged = await fetchAddrs(codes[0] || "");
        } else {
          for (const c of codes) {
            const part = await fetchAddrs(c);
            if (part && part.length) merged.push(...part);
          }
          const seen = new Set();
          merged = merged.filter(r => {
            const k = (r && r.id != null) ? String(r.id) : (r?.address || r?.full_address || JSON.stringify(r));
            if (seen.has(k)) return false;
            seen.add(k);
            return true;
          });
        }

        addressRows = merged;
        renderAddressList();
      } catch (addrErr) {
        console.warn("배송지 로드 실패(패널):", addrErr);
      }

      loading.style.display = "none";

    } catch (err) {
      console.error(err);
      loading.innerHTML = `
        <div style="text-align:center; color:#FF4D6D;">
          <div style="font-size:48px; margin-bottom:16px;">⚠️</div>
          <div style="font-size:16px; font-weight:700; margin-bottom:8px;">데이터 로드 실패</div>
          <div style="font-size:13px; color:var(--muted);">${err.message}</div>
        </div>
      `;
    }
  }

  function init() {
    const bootTitle = camp && code ? `${camp} ${code}` : (camp || "배송 지도 공유");
    const bootDescription = camp ? `${bootTitle} 배송 구역을 확인하세요` : "배송 구역 및 경로를 확인하세요";
    updateMetaTags(bootTitle, bootDescription);

    kakao.maps.load(() => {
      const center = new kakao.maps.LatLng(37.5665, 126.978);
      map = new kakao.maps.Map($("map"), {
        center,
        level: 8,
        draggable: true,
        scrollwheel: true,
        disableDoubleClickZoom: false
      });
      geocoder = new kakao.maps.services.Geocoder();

      const zoomControl = new kakao.maps.ZoomControl();
      map.addControl(zoomControl, kakao.maps.ControlPosition.RIGHT);

      mapTypeBtn.onclick = toggleSatellite;

      roadviewBtn.onclick = () => {
        toggleRoadview();
      };

      rvCloseBtn.onclick = () => {
        if (roadviewVisible) toggleRoadview();
      };

      rvToCenterBtn.onclick = () => {
        if (!roadviewVisible) return;
        const c = map.getCenter();
        setRoadviewAt(c);
      };

      kakao.maps.event.addListener(map, "click", (mouseEvent) => {
        if (!roadviewVisible) return;
        setRoadviewAt(mouseEvent.latLng);
      });

      naviToCampBtn.onclick = () => {
        if (!routeData) return alert("데이터 로딩 중...");
        openNaviCurrentToCamp();
      };

      naviToDeliveryBtn.onclick = () => {
        if (!routeData) return alert("데이터 로딩 중...");
        showSubrouteModalForDelivery();
      };

      copyAddressBtn.onclick = () => {
        const address = campAddress.textContent;
        navigator.clipboard.writeText(address).then(() => {
          const originalText = copyAddressBtn.textContent;
          copyAddressBtn.textContent = "✓ 복사됨";
          setTimeout(() => { copyAddressBtn.textContent = originalText; }, 2000);
        }).catch(err => {
          alert("복사 실패: " + err.message);
        });
      };

      loadData();
    });
  }

  init();
})();
</script>
</body>
</html>
