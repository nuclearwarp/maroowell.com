<!doctype html>
<html lang="ko">
<head>
  <script src="/config.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>마루웰 권한 관리</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#0b1220;
      --bg2:#070b13;
      --card:#121a2d;
      --line:rgba(255,255,255,.11);
      --txt:#e6eefc;
      --muted:#9fb0d2;
      --blue:#3b82f6;
      --red:#ef4444;
      --green:#22c55e;
      --yellow:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:linear-gradient(180deg,var(--bg),var(--bg2));
      color:var(--txt);
      font-family:system-ui,-apple-system,"Noto Sans KR",Segoe UI,Roboto,Arial,sans-serif;
    }
    .wrap{max-width:1440px;margin:0 auto;padding:22px 18px 40px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
    .brand{display:flex;align-items:center;gap:12px;min-width:0}
    .brand img{width:34px;height:34px}
    .title{font-size:28px;font-weight:950;letter-spacing:-.6px;line-height:1.15}
    .sub{color:var(--muted);font-size:14px;margin-top:5px;line-height:1.45}
    .topRight{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .card{
      background:rgba(18,26,45,.88);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px 20px;
      box-shadow:0 18px 60px rgba(0,0,0,.25);
      margin-bottom:16px;
    }
    .sectionTitle{font-size:17px;font-weight:950;margin:0 0 12px}
    .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    button{
      min-height:42px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(59,130,246,.24);
      color:#fff;
      font-weight:900;
      padding:0 18px;
      cursor:pointer;
      white-space:nowrap;
    }
    button:hover{background:rgba(59,130,246,.36)}
    button.secondary{background:rgba(255,255,255,.07)}
    button.secondary:hover{background:rgba(255,255,255,.12)}
    button.danger{background:rgba(239,68,68,.18);border-color:rgba(239,68,68,.35)}
    button.danger:hover{background:rgba(239,68,68,.28)}
    button.ok{background:rgba(34,197,94,.18);border-color:rgba(34,197,94,.32)}
    button.ok:hover{background:rgba(34,197,94,.28)}
    button.warn{background:rgba(245,158,11,.18);border-color:rgba(245,158,11,.32)}
    button.warn:hover{background:rgba(245,158,11,.28)}
    button.small{min-height:32px;padding:0 12px;font-size:12px}
    input,select{
      height:42px;
      border-radius:12px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.22);
      color:var(--txt);
      padding:0 13px;
      min-width:260px;
      outline:none;
    }
    select option{background:#111827;color:#fff}
    input:focus,select:focus{border-color:rgba(96,165,250,.55);box-shadow:0 0 0 2px rgba(96,165,250,.12)}
    .pill{
      display:inline-flex;
      align-items:center;
      min-height:34px;
      border-radius:999px;
      border:1px solid var(--line);
      padding:0 13px;
      color:var(--muted);
      font-size:13px;
      font-weight:900;
      background:rgba(255,255,255,.05);
    }
    .okText{color:#bbf7d0}
    .badText{color:#fecaca}
    .warnText{color:#fde68a}
    .layout{display:grid;grid-template-columns:450px 1fr;gap:16px}
    .muted{color:var(--muted);line-height:1.5}
    .formGrid{display:grid;grid-template-columns:1fr;gap:10px;margin-top:10px}
    .field label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px;font-weight:900}
    .field input,.field select{width:100%;min-width:0}
    .btnGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
    .btnGrid button{width:100%;padding:0 10px}
    .list{display:grid;gap:9px;margin-top:12px}
    .userCard{border:1px solid var(--line);background:rgba(255,255,255,.045);border-radius:14px;padding:12px}
    .userCard.admin{border-color:rgba(96,165,250,.36);background:rgba(59,130,246,.11)}
    .userCard.maroowell{border-color:rgba(34,197,94,.27)}
    .userTop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
    .email{font-weight:950;word-break:break-all}
    .meta{font-size:12px;color:var(--muted);line-height:1.45;word-break:break-all}
    .badges{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}
    .badge{
      display:inline-flex;
      align-items:center;
      border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.06);
      color:var(--muted);
      padding:4px 8px;
      font-size:11px;
      font-weight:950;
    }
    .badge.admin{color:#bfdbfe;border-color:rgba(96,165,250,.38);background:rgba(59,130,246,.14)}
    .badge.maroowell{color:#bbf7d0;border-color:rgba(34,197,94,.34);background:rgba(34,197,94,.12)}
    .badge.dragon{color:#fde68a;border-color:rgba(245,158,11,.36);background:rgba(245,158,11,.13)}
    .badge.role{color:#ddd6fe;border-color:rgba(168,85,247,.36);background:rgba(168,85,247,.13)}
    .userActions{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px}
    .statGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .stat{border:1px solid var(--line);border-radius:14px;padding:12px;background:rgba(255,255,255,.04)}
    .statNum{font-size:24px;font-weight:950}
    .statLab{font-size:12px;color:var(--muted);margin-top:4px}
    .schemaGrid{display:grid;grid-template-columns:430px 1fr;gap:16px}
    .tableList{display:grid;gap:8px;margin-top:12px}
    .tableBtn{text-align:left;height:auto;min-height:42px;border-radius:12px;background:rgba(255,255,255,.045);padding:10px 12px;width:100%}
    .tableBtn.active{border-color:rgba(59,130,246,.6);background:rgba(59,130,246,.17)}
    .tableName{font-weight:950}
    .mini{font-size:12px;color:var(--muted);margin-top:4px}
    pre{
      white-space:pre-wrap;
      word-break:break-word;
      background:rgba(0,0,0,.28);
      border:1px solid var(--line);
      border-radius:14px;
      padding:14px;
      max-height:620px;
      overflow:auto;
      font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
      color:#dbeafe;
      margin:0;
    }
    @media(max-width:980px){
      .layout,.schemaGrid{grid-template-columns:1fr}
      .statGrid{grid-template-columns:repeat(2,1fr)}
      .top{align-items:flex-start;flex-direction:column}
      .topRight{justify-content:flex-start}
      input,select{min-width:0;width:100%}
      .btnGrid{grid-template-columns:1fr}
      .row button,.row input{width:100%}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="brand">
        <a href="#" id="mwBoardMenuToggle"><img src="/favicon.ico" alt="MarooWell"></a>
        <div>
          <div class="title">🤖 마루웰 권한 관리</div>
          <div class="sub">팀장 / 관리자 / 최고관리자 / 용차 관리자 권한을 통합 관리합니다.</div>
        </div>
      </div>
      <div class="topRight">
        <span class="pill" id="loginPill">세션 확인 전</span>
        <button class="secondary" id="logoutBtn">로그아웃</button>
      </div>
    </div>

    <div class="card">
      <div class="sectionTitle">관리자 API</div>
      <div class="row">
        <input id="apiBaseInput" placeholder="https://admin-access.maroowell.com" />
        <button id="saveApiBtn" class="secondary">API 저장</button>
        <button id="checkMeBtn">관리자 확인</button>
        <button id="loadUsersBtn" class="ok">권한 목록</button>
        <button id="scanBtn" class="warn">DB/RLS 스캔</button>
        <button id="copyBtn" class="secondary">JSON 복사</button>
      </div>
      <div class="sub" id="statusText">대기 중</div>
    </div>

    <div class="layout">
      <div>
        <div class="card">
          <div class="sectionTitle">권한 부여 / 회수</div>
          <div class="muted">
            대상 이메일은 Supabase Auth에 가입되어 있어야 합니다.
            최고관리자는 마루웰 관리자 권한까지 같이 부여됩니다.
          </div>

          <div class="formGrid">
            <div class="field">
              <label>대상 이메일</label>
              <input id="emailInput" type="email" placeholder="user@example.com" autocomplete="off" />
            </div>
            <div class="field">
              <label>메모</label>
              <input id="memoInput" type="text" placeholder="예: 팀장 / 관리자 / 최고관리자 / 권한 해제" autocomplete="off" />
            </div>
            <div class="field">
              <label>권한 등급 직접 선택</label>
              <select id="roleLevelSelect">
                <option value="">변경 안 함</option>
                <option value="0">0 / 마루웰 게시판 권한 해제</option>
                <option value="30">30 / 팀장</option>
                <option value="60">60 / 관리자</option>
                <option value="90">90 / 최고관리자</option>
              </select>
            </div>
            <div class="field">
              <label>용차 관리자 직접 선택</label>
              <select id="dragonSelect">
                <option value="">변경 안 함</option>
                <option value="true">용차 관리자 ON</option>
                <option value="false">용차 관리자 OFF</option>
              </select>
            </div>
          </div>

          <div class="btnGrid">
            <button id="applyCustomBtn">선택값 적용</button>
            <button id="grant30Btn" class="ok">팀장 권한 부여</button>
            <button id="grant60Btn" class="ok">관리자 권한 부여</button>
            <button id="grant90Btn">최고관리자 권한 부여</button>
            <button id="dragonOnBtn" class="warn">용차 관리자 ON</button>
            <button id="dragonOffBtn" class="warn">용차 관리자 OFF</button>
            <button id="revokeAdminBtn" class="warn">최고관리자만 해제</button>
            <button id="revokeAllBtn" class="danger">마루웰 권한 해제</button>
          </div>
        </div>

        <div class="card">
          <div class="sectionTitle">현재 권한 목록</div>
          <div class="muted">권한 목록 버튼을 누르면 표시됩니다.</div>
          <div class="list" id="userList"></div>
        </div>
      </div>

      <div>
        <div class="card" id="summaryCard" style="display:none">
          <div class="sectionTitle">DB/RLS 스캔 요약</div>
          <div class="statGrid">
            <div class="stat"><div class="statNum" id="statTables">0</div><div class="statLab">테이블</div></div>
            <div class="stat"><div class="statNum" id="statRlsOn">0</div><div class="statLab">RLS ON</div></div>
            <div class="stat"><div class="statNum" id="statPolicies">0</div><div class="statLab">정책</div></div>
            <div class="stat"><div class="statNum" id="statFuncs">0</div><div class="statLab">함수</div></div>
          </div>
        </div>

        <div class="schemaGrid" id="schemaGrid" style="display:none">
          <div class="card">
            <div class="sectionTitle">테이블 목록</div>
            <div class="muted">테이블을 누르면 컬럼/제약/RLS 정책을 확인합니다.</div>
            <div class="tableList" id="tableList"></div>
          </div>
          <div class="card">
            <div class="sectionTitle" id="detailTitle">결과</div>
            <pre id="output">아직 결과가 없습니다.</pre>
          </div>
        </div>

        <div class="card" id="rawOnlyCard">
          <div class="sectionTitle">결과</div>
          <pre id="rawOutput">아직 결과가 없습니다.</pre>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  "use strict";

  const $ = (id) => document.getElementById(id);
  const cfg = window.MARUWELL_CONFIG || {};
  const API_STORAGE_KEY = "mw_admin_api_base";
  const defaultApiBase =
    localStorage.getItem(API_STORAGE_KEY) ||
    cfg.ADMIN_API_BASE ||
    "https://admin-access.maroowell.com";

  let supabaseClient = null;
  let lastSchema = null;
  let selectedTable = "";
  let lastUsers = [];

  function setStatus(msg, type = "") {
    $("statusText").textContent = msg;
    $("statusText").className = type === "bad" ? "sub badText" : type === "ok" ? "sub okText" : type === "warn" ? "sub warnText" : "sub";
  }

  function setRaw(obj) {
    $("rawOutput").textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  }

  function setSchemaOutput(obj) {
    $("output").textContent = typeof obj === "string" ? obj : JSON.stringify(obj, null, 2);
  }

  function showRawOnly() {
    $("rawOnlyCard").style.display = "block";
    $("schemaGrid").style.display = "none";
  }

  function showSchemaGrid() {
    $("rawOnlyCard").style.display = "none";
    $("schemaGrid").style.display = "grid";
  }

  function apiBase() {
    return $("apiBaseInput").value.trim().replace(/\/$/, "");
  }

  function initSupabase() {
    const { SUPABASE_URL, SUPABASE_ANON_KEY } = cfg;

    if (!SUPABASE_URL || !SUPABASE_ANON_KEY || !window.supabase?.createClient) {
      throw new Error("config.js의 SUPABASE_URL / SUPABASE_ANON_KEY를 확인하세요.");
    }

    const storage = (() => {
      try { return window.sessionStorage; } catch { return undefined; }
    })();

    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: {
        persistSession: !!storage,
        storage,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  }

  async function getToken() {
    if (!supabaseClient) initSupabase();

    const { data, error } = await supabaseClient.auth.getSession();
    if (error) throw error;

    const token = data?.session?.access_token;
    if (!token) throw new Error("로그인이 필요합니다. 먼저 login.html에서 로그인하세요.");

    return token;
  }

  async function adminFetch(path, options = {}) {
    const token = await getToken();

    const headers = new Headers(options.headers || {});
    headers.set("Authorization", "Bearer " + token);

    if (options.body && !headers.has("Content-Type")) {
      headers.set("Content-Type", "application/json");
    }

    const res = await fetch(apiBase() + path, {
      ...options,
      headers
    });

    const text = await res.text();
    let data = null;

    try {
      data = text ? JSON.parse(text) : null;
    } catch {
      data = text;
    }

    if (!res.ok || data?.ok === false) {
      throw new Error(data?.error || data?.message || text || "요청 실패");
    }

    return data;
  }

  function findUserByEmail(email) {
    const target = String(email || "").trim().toLowerCase();
    return lastUsers.find(row => String(row.email || "").trim().toLowerCase() === target) || null;
  }

  function basePayload(email, memo) {
    const row = findUserByEmail(email);

    return {
      email,
      is_maroowell: row?.is_maroowell === true,
      is_admin: row?.is_admin === true,
      role_level: Number(row?.max_role_level || 0),
      is_dragon_car_admin: row?.is_dragon_car_admin === true,
      memo
    };
  }

  async function checkMe() {
    showRawOnly();
    setStatus("관리자 세션 확인 중...");

    const data = await adminFetch("/admin/me");

    $("loginPill").textContent = data?.user?.email || data?.user?.id || "관리자 확인됨";
    $("loginPill").className = "pill okText";

    setRaw(data);
    setStatus("관리자 확인 완료", "ok");
  }

  async function loadUsers() {
    showRawOnly();
    setStatus("권한 목록 불러오는 중...");

    const data = await adminFetch("/admin/access/users");
    lastUsers = Array.isArray(data.rows) ? data.rows : [];

    renderUserList(lastUsers);
    setRaw(data);
    setStatus(`권한 목록 ${lastUsers.length}건 불러옴`, "ok");
  }

  async function setAccess(payload) {
    showRawOnly();

    const data = await adminFetch("/admin/access/set", {
      method: "POST",
      body: JSON.stringify(payload)
    });

    setRaw(data);
    await loadUsers();

    return data;
  }

  function getTargetEmail() {
    const email = $("emailInput").value.trim().toLowerCase();
    if (!email) throw new Error("대상 이메일을 입력하세요.");
    return email;
  }

  function getMemo(defaultMemo) {
    const memo = $("memoInput").value.trim();
    return memo || defaultMemo;
  }

  async function applyCustom() {
    const email = getTargetEmail();
    const roleRaw = $("roleLevelSelect").value;
    const dragonRaw = $("dragonSelect").value;

    if (roleRaw === "" && dragonRaw === "") {
      throw new Error("권한 등급 또는 용차 관리자 값을 선택하세요.");
    }

    const payload = basePayload(email, getMemo("선택값 적용"));

    if (roleRaw !== "") {
      const roleLevel = Number(roleRaw);
      payload.role_level = roleLevel;
      payload.is_maroowell = roleLevel >= 30;
      payload.is_admin = roleLevel >= 90;
    }

    if (dragonRaw !== "") {
      payload.is_dragon_car_admin = dragonRaw === "true";
    }

    setStatus("선택값 적용 중...");
    await setAccess(payload);
    setStatus("선택값 적용 완료", "ok");
  }

  async function grant30() {
    const email = getTargetEmail();
    const payload = basePayload(email, getMemo("팀장 권한"));
    payload.is_maroowell = true;
    payload.is_admin = false;
    payload.role_level = 30;

    setStatus("팀장 권한 부여 중...");
    await setAccess(payload);
    setStatus("팀장 권한 부여 완료", "ok");
  }

  async function grant60() {
    const email = getTargetEmail();
    const payload = basePayload(email, getMemo("관리자 권한"));
    payload.is_maroowell = true;
    payload.is_admin = false;
    payload.role_level = 60;

    setStatus("관리자 권한 부여 중...");
    await setAccess(payload);
    setStatus("관리자 권한 부여 완료", "ok");
  }

  async function grant90() {
    const email = getTargetEmail();
    const payload = basePayload(email, getMemo("최고관리자 권한"));
    payload.is_maroowell = true;
    payload.is_admin = true;
    payload.role_level = 90;

    setStatus("최고관리자 권한 부여 중...");
    await setAccess(payload);
    setStatus("최고관리자 권한 부여 완료", "ok");
  }

  async function dragonOn() {
    const email = getTargetEmail();
    const payload = basePayload(email, getMemo("용차 관리자 ON"));
    payload.is_dragon_car_admin = true;

    setStatus("용차 관리자 ON 처리 중...");
    await setAccess(payload);
    setStatus("용차 관리자 ON 완료", "ok");
  }

  async function dragonOff() {
    const email = getTargetEmail();
    const payload = basePayload(email, getMemo("용차 관리자 OFF"));
    payload.is_dragon_car_admin = false;

    setStatus("용차 관리자 OFF 처리 중...");
    await setAccess(payload);
    setStatus("용차 관리자 OFF 완료", "ok");
  }

  async function revokeAdmin() {
    const email = getTargetEmail();
    const payload = basePayload(email, getMemo("최고관리자 해제 / 관리자 유지"));
    payload.is_maroowell = true;
    payload.is_admin = false;
    payload.role_level = 60;

    setStatus("최고관리자 권한 해제 중...");
    await setAccess(payload);
    setStatus("최고관리자 권한 해제 완료", "ok");
  }

  async function revokeAll() {
    const email = getTargetEmail();

    const ok = confirm(`${email}\n\n이 사용자의 마루웰 게시판 권한을 해제할까요?\n용차 관리자 권한은 별도 버튼으로 관리됩니다.`);
    if (!ok) return;

    const payload = basePayload(email, getMemo("마루웰 권한 해제"));
    payload.is_maroowell = false;
    payload.is_admin = false;
    payload.role_level = 0;

    setStatus("마루웰 권한 해제 중...");
    await setAccess(payload);
    setStatus("마루웰 권한 해제 완료", "ok");
  }

  async function scan() {
    showSchemaGrid();
    setStatus("DB 구조/RLS 스캔 중...");

    const data = await adminFetch("/admin/db-introspect");

    lastSchema = data.schema || data;
    selectedTable = "";

    renderSummary();
    renderTableList();

    setSchemaOutput(lastSchema);
    setStatus("스캔 완료. 테이블을 눌러 상세 확인하세요.", "ok");
  }

  function roleLabel(level) {
    const n = Number(level || 0);
    if (n >= 90) return "최고관리자";
    if (n >= 60) return "관리자";
    if (n >= 30) return "팀장";
    return "권한 없음";
  }

  function renderUserList(rows) {
    const list = $("userList");

    if (!Array.isArray(rows) || rows.length === 0) {
      list.innerHTML = `<div class="muted">권한 row가 없습니다.</div>`;
      return;
    }

    list.innerHTML = rows.map(row => {
      const email = row.email || "";
      const level = Number(row.max_role_level || 0);
      const cls = row.is_admin ? "userCard admin" : row.is_maroowell ? "userCard maroowell" : "userCard";
      const adminBadge = row.is_admin ? `<span class="badge admin">마루웰 관리자</span>` : `<span class="badge">관리자 아님</span>`;
      const mwBadge = row.is_maroowell ? `<span class="badge maroowell">마루웰</span>` : `<span class="badge">마루웰 아님</span>`;
      const dragonBadge = row.is_dragon_car_admin ? `<span class="badge dragon">용차관리자</span>` : `<span class="badge">용차 X</span>`;
      const roleBadge = `<span class="badge role">${escapeHtml(roleLabel(level))} · ${level}</span>`;
      const memo = row.memo ? escapeHtml(row.memo) : "-";
      const updated = row.updated_at ? escapeHtml(row.updated_at) : "-";

      return `
        <div class="${cls}">
          <div class="userTop">
            <div>
              <div class="email">${escapeHtml(email)}</div>
              <div class="meta">user_id: ${escapeHtml(row.user_id || "")}</div>
            </div>
            <div class="badges">
              ${roleBadge}
              ${mwBadge}
              ${adminBadge}
              ${dragonBadge}
            </div>
          </div>
          <div class="meta">memo: ${memo}</div>
          <div class="meta">updated_at: ${updated}</div>
          <div class="userActions">
            <button class="small ok" data-action="team" data-email="${escapeHtml(email)}">팀장</button>
            <button class="small ok" data-action="manager" data-email="${escapeHtml(email)}">관리자</button>
            <button class="small" data-action="super" data-email="${escapeHtml(email)}">최고관리자</button>
            <button class="small warn" data-action="dragon-on" data-email="${escapeHtml(email)}">용차 ON</button>
            <button class="small warn" data-action="dragon-off" data-email="${escapeHtml(email)}">용차 OFF</button>
            <button class="small danger" data-action="revoke" data-email="${escapeHtml(email)}">마루웰 해제</button>
          </div>
        </div>
      `;
    }).join("");
  }

  function renderSummary() {
    const tables = Array.isArray(lastSchema?.tables) ? lastSchema.tables : [];
    const funcs = Array.isArray(lastSchema?.functions) ? lastSchema.functions : [];
    const policies = tables.reduce((sum, t) => sum + (Array.isArray(t.policies) ? t.policies.length : 0), 0);
    const rlsOn = tables.filter(t => t.rls_enabled === true).length;

    $("summaryCard").style.display = "block";
    $("statTables").textContent = tables.length;
    $("statRlsOn").textContent = rlsOn;
    $("statPolicies").textContent = policies;
    $("statFuncs").textContent = funcs.length;
  }

  function renderTableList() {
    const tables = Array.isArray(lastSchema?.tables) ? lastSchema.tables : [];

    $("tableList").innerHTML = tables.map(t => {
      const name = `${t.schema || "public"}.${t.table}`;
      const cls = selectedTable === name ? "tableBtn active" : "tableBtn";
      const policies = Array.isArray(t.policies) ? t.policies.length : 0;
      const cols = Array.isArray(t.columns) ? t.columns.length : 0;

      return `
        <button class="${cls}" data-table="${escapeHtml(name)}">
          <div class="tableName">${escapeHtml(name)}</div>
          <div class="mini">RLS ${t.rls_enabled ? "ON" : "OFF"} · 정책 ${policies} · 컬럼 ${cols}</div>
        </button>
      `;
    }).join("");
  }

  function showTable(name) {
    const tables = Array.isArray(lastSchema?.tables) ? lastSchema.tables : [];
    const found = tables.find(t => `${t.schema || "public"}.${t.table}` === name);

    selectedTable = name;
    renderTableList();

    $("detailTitle").textContent = name;
    setSchemaOutput(found || "테이블을 찾지 못했습니다.");
  }

  function escapeHtml(v) {
    return String(v ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#39;");
  }

  function run(fn) {
    fn().catch(e => {
      setStatus(e.message, "bad");
      showRawOnly();
      setRaw({ ok:false, error:e.message });
    });
  }

  $("apiBaseInput").value = defaultApiBase;

  $("saveApiBtn").addEventListener("click", () => {
    localStorage.setItem(API_STORAGE_KEY, apiBase());
    setStatus("API 주소 저장됨", "ok");
  });

  $("checkMeBtn").addEventListener("click", () => run(checkMe));
  $("loadUsersBtn").addEventListener("click", () => run(loadUsers));
  $("scanBtn").addEventListener("click", () => run(scan));
  $("applyCustomBtn").addEventListener("click", () => run(applyCustom));
  $("grant30Btn").addEventListener("click", () => run(grant30));
  $("grant60Btn").addEventListener("click", () => run(grant60));
  $("grant90Btn").addEventListener("click", () => run(grant90));
  $("dragonOnBtn").addEventListener("click", () => run(dragonOn));
  $("dragonOffBtn").addEventListener("click", () => run(dragonOff));
  $("revokeAdminBtn").addEventListener("click", () => run(revokeAdmin));
  $("revokeAllBtn").addEventListener("click", () => run(revokeAll));

  $("copyBtn").addEventListener("click", async () => {
    const text =
      $("rawOnlyCard").style.display !== "none"
        ? $("rawOutput").textContent
        : $("output").textContent;

    await navigator.clipboard.writeText(text || "");
    setStatus("복사 완료", "ok");
  });

  $("logoutBtn").addEventListener("click", async () => {
    if (!supabaseClient) initSupabase();
    await supabaseClient.auth.signOut();
    location.href = "/login.html";
  });

  $("tableList").addEventListener("click", e => {
    const btn = e.target.closest("[data-table]");
    if (btn) showTable(btn.dataset.table);
  });

  $("userList").addEventListener("click", e => {
    const btn = e.target.closest("[data-action]");
    if (!btn) return;

    const email = btn.dataset.email || "";
    $("emailInput").value = email;

    const action = btn.dataset.action;

    if (action === "team") run(async () => {
      const payload = basePayload(email, getMemo("팀장 권한"));
      payload.is_maroowell = true;
      payload.is_admin = false;
      payload.role_level = 30;
      setStatus("팀장 권한 부여 중...");
      await setAccess(payload);
      setStatus("팀장 권한 부여 완료", "ok");
    });

    if (action === "manager") run(async () => {
      const payload = basePayload(email, getMemo("관리자 권한"));
      payload.is_maroowell = true;
      payload.is_admin = false;
      payload.role_level = 60;
      setStatus("관리자 권한 부여 중...");
      await setAccess(payload);
      setStatus("관리자 권한 부여 완료", "ok");
    });

    if (action === "super") run(async () => {
      const payload = basePayload(email, getMemo("최고관리자 권한"));
      payload.is_maroowell = true;
      payload.is_admin = true;
      payload.role_level = 90;
      setStatus("최고관리자 권한 부여 중...");
      await setAccess(payload);
      setStatus("최고관리자 권한 부여 완료", "ok");
    });

    if (action === "dragon-on") run(async () => {
      const payload = basePayload(email, getMemo("용차 관리자 ON"));
      payload.is_dragon_car_admin = true;
      setStatus("용차 관리자 ON 처리 중...");
      await setAccess(payload);
      setStatus("용차 관리자 ON 완료", "ok");
    });

    if (action === "dragon-off") run(async () => {
      const payload = basePayload(email, getMemo("용차 관리자 OFF"));
      payload.is_dragon_car_admin = false;
      setStatus("용차 관리자 OFF 처리 중...");
      await setAccess(payload);
      setStatus("용차 관리자 OFF 완료", "ok");
    });

    if (action === "revoke") run(async () => {
      const ok = confirm(`${email}\n\n이 사용자의 마루웰 게시판 권한을 해제할까요?`);
      if (!ok) return;

      const payload = basePayload(email, getMemo("마루웰 권한 해제"));
      payload.is_maroowell = false;
      payload.is_admin = false;
      payload.role_level = 0;

      setStatus("마루웰 권한 해제 중...");
      await setAccess(payload);
      setStatus("마루웰 권한 해제 완료", "ok");
    });
  });

  try {
    initSupabase();
    checkMe().catch(() => {});
    loadUsers().catch(() => {});
  } catch (e) {
    setStatus(e.message, "bad");
  }
})();
</script>
<script src="/board-menu.js"></script>
</body>
</html>
